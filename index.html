 activated in the duodenum. They are collectively referred to as", "marks": 1, "options": ["colitis", "gastric juice", "pancreatic juice", "bile"], "correctIndex": 2, "answer": "pancreatic juice", "explanation": "These enzymes are secreted by the pancreas and are collectively known as pancreatic juice."}, {"type": "mcq", "question": "The large intestine contains normal flora (bacteria that reside normally on or within the body). One of the functions of these bacteria is to", "marks": 1, "options": ["make anal mucous", "make vitamin D", "make calcium", "make vitamin K"], "correctIndex": 3, "answer": "make vitamin K", "explanation": "Colonic bacteria synthesise vitamin K (and some B vitamins) which can then be absorbed."}, {"type": "mcq", "question": "The main function of the colon is to", "marks": 1, "options": ["remove water from the undigested food", "move the undigested food toward the anus", "produce villi", "help with immunity"], "correctIndex": 0, "answer": "remove water from the undigested food", "explanation": "The colon's primary role is to reabsorb water and electrolytes, compacting waste into faeces."}, {"type": "mcq", "question": "The enzyme trypsin", "marks": 1, "options": ["changes proteins", "changes carbohydrates", "changes fats", "changes vitamins and minerals"], "correctIndex": 0, "answer": "changes proteins", "explanation": "Trypsin is a protease that breaks down proteins into smaller peptides and amino acids."}, {"type": "mcq", "question": "Segmentation contractions of the small intestine mix which of the following substances?", "marks": 1, "options": ["pancreatic juice", "intestinal juice", "bile", "chyme"], "correctIndex": 3, "answer": "chyme", "explanation": "Segmentation contractions mix chyme with digestive juices and increase its contact with the absorptive surface."}, {"type": "mcq", "question": "Undigested food is moved along the colon by two processes. These are", "marks": 1, "options": ["haustral contractions and peristalsis", "sphincter muscles", "distention and distortion", "peristalsis only"], "correctIndex": 0, "answer": "haustral contractions and peristalsis", "explanation": "The colon moves contents by haustral contractions (and mass movements) together with peristalsis."}, {"type": "mcq", "question": "There are two sorts of nerves. Parasympathetic nerves work when you are resting. Sympathetic nerves are working when you are active, or when you are scared or frightened. These are the nerves that spur you into action when you are scared! When you want to empty the rectum in order to defecate, which nerves do you think would be functioning more?", "marks": 1, "options": ["sympathetic", "parasympathetic", "both parasympathetic and sympathetic", "neither sympathetic or parasympathetic"], "correctIndex": 1, "answer": "parasympathetic", "explanation": "Defecation is a 'rest and digest' activity driven by the parasympathetic nervous system, which stimulates colonic motility and relaxes sphincters."}, {"type": "mcq", "question": "The majority of nutrient absorption occurs in the", "marks": 1, "options": ["small intestine", "stomach", "large intestine", "mouth"], "correctIndex": 0, "answer": "small intestine", "explanation": "The small intestine, with its villi and microvilli, is the main site of nutrient absorption."}, {"type": "mcq", "question": "When your tummy growls in response to an ad on TV, or the smell of food, which part of the gastric secretion is occurring", "marks": 1, "options": ["intestinal", "cephalic", "gastric", "gastin"], "correctIndex": 1, "answer": "cephalic", "explanation": "The cephalic phase is triggered by the sight, smell, thought or taste of food, before it reaches the stomach."}, {"type": "mcq", "question": "The small intestine is well adapted to absorb nutrients. It has become specialised for this job with the presence of", "marks": 1, "options": ["cilia", "villi and millivanilli", "villi and microvilli", "secretions"], "correctIndex": 2, "answer": "villi and microvilli", "explanation": "Villi and microvilli greatly increase the surface area of the small intestine for absorption."}, {"type": "mcq", "question": "In terms of digestion, the colons greatest contribution would be", "marks": 1, "options": ["regulating the gastric movements", "absorption of water", "exposing chyme to a rich assortment of pancreatic enzymes", "absorption of the primary nutrients"], "correctIndex": 1, "answer": "absorption of water", "explanation": "The colon's main digestive contribution is reabsorbing water (and electrolytes) from undigested residue."}, {"type": "mcq", "question": "Fatty acids known as triglycerides, are absorbed into the", "marks": 1, "options": ["capillaries of the villi", "lacteals of the villi", "colon", "lacteals of the mammary glands"], "correctIndex": 1, "answer": "lacteals of the villi", "explanation": "Re-formed triglycerides (as chylomicrons) enter the lacteals, the lymphatic vessels within the villi, rather than the blood capillaries."}, {"type": "mcq", "question": "The small intestine is so called because", "marks": 1, "options": ["it is smaller in length than the large intestine", "it is narrower in width than the large intestine", "it was named after Professor I. M Small who first discovered it", "it was discovered after the large one that was deemed more important"], "correctIndex": 1, "answer": "it is narrower in width than the large intestine", "explanation": "The small intestine is named for its smaller diameter (width), even though it is much longer than the large intestine."}, {"type": "mcq", "question": "When the small intestine secretes the hormones CCK and secretin, the hormones go into the blood and cause", "marks": 1, "options": ["the chyme to emulsify", "the gallbladder to make bile, and the pancreas to make pancreatic juice", "an increase in peristalsis", "the gallbladder to release bile, and the pancreas to make pancreatic juice"], "correctIndex": 3, "answer": "the gallbladder to release bile, and the pancreas to make pancreatic juice", "explanation": "CCK triggers the gallbladder to release (contract and expel) stored bile while secretin and CCK stimulate the pancreas to secrete pancreatic juice."}, {"type": "mcq", "question": "The liver is least likely to be involved with", "marks": 1, "options": ["removing old RBC", "forming glycogen", "making bile", "making insulin"], "correctIndex": 3, "answer": "making insulin", "explanation": "Insulin is produced by the beta cells of the pancreas, not the liver."}, {"type": "mcq", "question": "Microscopically, the liver is made up of rows of cuboidal cells with small blood spaces running between the cells called", "marks": 1, "options": ["freakasoids", "sinusoids", "rugae", "hepatocytes"], "correctIndex": 1, "answer": "sinusoids", "explanation": "Sinusoids are the wide, leaky blood-filled spaces between the plates of hepatocytes in the liver lobule."}]}, {"id": "12", "title": "Practice learning opportunity for Online Test 3 - Digestion", "topic": "Digestive System", "questions": [{"type": "mcq", "question": "Intrinsic factor produced by the stomach helps", "marks": 1, "options": ["the small intestine absorb vitamin B12", "store fat", "the bones to absorb calcium", "make renin"], "correctIndex": 0, "answer": "the small intestine absorb vitamin B12", "explanation": "Intrinsic factor secreted by gastric parietal cells binds vitamin B12 so it can be absorbed in the ileum of the small intestine."}, {"type": "mcq", "question": "The enzyme that starts the chemical digestion of carbohydrates is", "marks": 1, "options": ["pancreatic amylase", "salivary amylase", "glucagon", "the teeth"], "correctIndex": 1, "answer": "salivary amylase", "explanation": "Salivary amylase (ptyalin) in the mouth is the first enzyme to begin chemical breakdown of starch into smaller sugars. (Pancreatic amylase continues this later in the small intestine, but salivary amylase starts it; glucagon is a hormone and the teeth perform mechanical, not chemical, digestion.)"}, {"type": "mcq", "question": "The laryngopharynx is directly inferior to the", "marks": 1, "options": ["oesophagus", "oral cavity", "ileocaecal valve", "oropharynx"], "correctIndex": 3, "answer": "oropharynx", "explanation": "The pharynx runs from superior to inferior as nasopharynx, oropharynx, then laryngopharynx, so the laryngopharynx sits directly below (inferior to) the oropharynx. The oesophagus is inferior to the laryngopharynx, not superior."}, {"type": "mcq", "question": "CCK when released helps to", "marks": 1, "options": ["release bile from the gall bladder", "cause diarrhoea", "make one feel more hungry", "increase churning in the stomach"], "correctIndex": 0, "answer": "release bile from the gall bladder", "explanation": "Cholecystokinin (CCK) is released in response to fats and proteins in the duodenum; it makes the gall bladder contract to release bile and stimulates the pancreas to secrete enzymes, aiding fat digestion. It also promotes satiety (feeling full), so it would not make one more hungry."}, {"type": "mcq", "question": "When we use iodine in the lab, it turns a blue black colour when we have a positive test for", "marks": 1, "options": ["fats", "starch", "protein", "glucose"], "correctIndex": 1, "answer": "starch", "explanation": "Iodine solution turns blue-black in the presence of starch, which is the standard positive result for the iodine test. (Benedict's test is used for glucose/reducing sugars and Biuret for protein.)"}, {"type": "mcq", "question": "Gastric Juice consists mainly of", "marks": 1, "options": ["HCl and Pepsin", "Gastrin", "Bile and CCK", "Pepsin and Gastrin"], "correctIndex": 0, "answer": "HCl and Pepsin", "explanation": "Gastric juice is mainly hydrochloric acid (from parietal cells) and pepsin (from chief cells, released as pepsinogen and activated by the acid) which together begin protein digestion. Gastrin is a hormone and bile is made by the liver, so they are not components of gastric juice."}, {"type": "mcq", "question": "The teeth, tongue and saliva roll the food around to form a __________ which is easy to swallow.", "marks": 1, "options": ["brolly", "bolus", "boule", "epiglottis"], "correctIndex": 1, "answer": "bolus", "explanation": "A bolus is the soft, moistened ball of chewed food formed in the mouth that is then swallowed. (The epiglottis is the flap that covers the airway during swallowing, not the food ball.)"}, {"type": "mcq", "question": "Deglutition is a scientific word for", "marks": 1, "options": ["swallowing", "pooping", "chewing", "moving food along the alimentary canal"], "correctIndex": 0, "answer": "swallowing", "explanation": "Deglutition is the medical term for swallowing, the process that moves a bolus from the mouth into the oesophagus. (Chewing is mastication, propelling food along the gut is peristalsis, and defecation is the term for passing faeces.)"}, {"type": "mcq", "question": "The small intestine moves semi-digested food back and forth to ensure the enzymes are all mixed in. This process is called", "marks": 1, "options": ["segmentation", "peristalsis", "intestinal massage", "colonscopy"], "correctIndex": 0, "answer": "segmentation", "explanation": "Segmentation is the back-and-forth mixing contraction of the small intestine that blends chyme with digestive enzymes and brings nutrients into contact with the wall, whereas peristalsis is the wave that propels food forward."}, {"type": "mcq", "question": "An important nutrient that seems to be formed in the colon is", "marks": 1, "options": ["vitamin K", "vitamin D", "glucose", "calcium"], "correctIndex": 0, "answer": "vitamin K", "explanation": "Bacteria in the large intestine (colon) synthesise vitamin K (and some B vitamins), which is then absorbed by the body. Vitamin D is made in skin with sunlight, not the colon."}, {"type": "mcq", "question": "The pyloric sphincter", "marks": 1, "options": ["prevents vomiting", "prevents food going back up the oesophagus", "allows semi digested food to move slowly out of the stomach", "allows wastes and undigested food to move into the colon"], "correctIndex": 2, "answer": "allows semi digested food to move slowly out of the stomach", "explanation": "The pyloric sphincter controls the gradual release of chyme (semi-digested food) from the stomach into the duodenum. (Stopping reflux into the oesophagus is the role of the cardiac/lower oesophageal sphincter, and the ileocaecal valve controls movement into the colon.)"}, {"type": "mcq", "question": "When the stomach is empty it forms folds called", "marks": 1, "options": ["ruggae", "villi", "pleats", "crimpage"], "correctIndex": 0, "answer": "ruggae", "explanation": "Rugae are the folds of the stomach lining present when it is empty; they flatten out to allow the stomach to expand when full. (Villi are the finger-like projections of the small intestine that absorb nutrients, not stomach folds.)"}]}, {"id": "13", "title": "Practice learning opportunity for Online Test 3 - Nutrients, Protein Synthesis, and Metabolism", "topic": "Mixed (Practice Test)", "questions": [{"type": "mcq", "question": "What is the function of mRNA?", "marks": 1, "options": ["part of the ribosome that creates a protein based on the template", "carries amino acids for protein synthesis", "used as a template for protein synthesis"], "correctIndex": 2, "answer": "used as a template for protein synthesis", "explanation": "Messenger RNA copies the gene from DNA and carries that code to the ribosome to act as the template for building a protein."}, {"type": "mcq", "question": "What is the function of tRNA?", "marks": 1, "options": ["carries amino acids for protein synthesis", "part of the ribosome that creates a protein based on the template", "used as a template for protein synthesis"], "correctIndex": 0, "answer": "carries amino acids for protein synthesis", "explanation": "Transfer RNA brings the matching amino acids to the ribosome and lines them up against the mRNA codons during translation."}, {"type": "mcq", "question": "What is the function of rRNA?", "marks": 1, "options": ["part of the ribosome that creates a protein based on the template", "used as a template for protein synthesis", "carries amino acids for protein synthesis"], "correctIndex": 0, "answer": "part of the ribosome that creates a protein based on the template", "explanation": "Ribosomal RNA is a structural and functional part of the ribosome, the molecular machine that assembles the protein from the mRNA template."}, {"type": "mcq", "question": "Codons are the groups of 3 bases found on _______, and anticodons are the groups of 3 bases found on _______, and both code for a particular amino acid. The codon and anticodon are complementary and match together. Choose the answer with the correct words for the blanks in the correct order.", "marks": 1, "options": ["mRNA, tRNA", "DNA, rRNA", "tRNA, rRNA", "DNA, mRNA"], "correctIndex": 0, "answer": "mRNA, tRNA", "explanation": "Codons are read on the mRNA template and the complementary anticodons are carried on the tRNA, which delivers the correct amino acid."}, {"type": "mcq", "question": "DNA stores ______ in the form of _______. Choose the answer below which most accurately fills in the blanks.", "marks": 1, "options": ["genes, genetic information", "chromosomes, genes", "protein templates, chromosomes", "genetic information, genes"], "correctIndex": 3, "answer": "genetic information, genes", "explanation": "DNA stores genetic information, and that information is organised in units called genes."}, {"type": "mcq", "question": "Catabolic and Anabolic reactions both happen in the body. For each example, determine if it is catabolic (C) or anabolic (A) and choose the answer in the correct order. 1. Making Glucose from Glycogen; 2. Digesting collagen in the diet to make amino acids; 3. Making Glycogen from Glucose; 4. Protein Synthesis in the cell; 5. Complex Series of Reactions in the cell's metabolism.", "marks": 1, "options": ["C, A, C, A, C", "C, A, A, A, C", "C, A, A, C, C", "C, C, A, A, C"], "correctIndex": 3, "answer": "C, C, A, A, C", "explanation": "Catabolic reactions break larger molecules into smaller ones: making glucose from glycogen (1, glycogenolysis), digesting collagen into amino acids (2, breaking a protein down), and the overall complex series of degradative metabolic reactions (5) are all catabolic. Anabolic reactions build larger molecules from smaller ones: making glycogen from glucose (3, glycogenesis) and protein synthesis (4) are anabolic. This gives C, C, A, A, C."}, {"type": "mcq", "question": "During Alkalosis you have a drop in hydrogen ions and acids in your blood. You can slow your breathing, or breathe into a paper bag. How does slowed breathing or breathing into a paper bag help alkalosis?", "marks": 1, "options": ["both lead to an increase in the amount of carbon dioxide in your blood, this is acidic, and helps to increase your blood pH", "both lead to a decrease in the amount of carbon dioxide in your blood, this is acidic, and helps to decrease your blood pH", "both lead to an increase in the amount of carbon dioxide in your blood, this is acidic, and helps to decrease your blood pH", "both lead to a decrease in the amount of carbon dioxide in your blood, this is acidic, and helps to decrease your blood pH"], "correctIndex": 2, "answer": "both lead to an increase in the amount of carbon dioxide in your blood, this is acidic, and helps to decrease your blood pH", "explanation": "Slowing breathing or rebreathing retains CO2, which forms carbonic acid in the blood, adding hydrogen ions and lowering the raised pH back toward normal."}, {"type": "mcq", "question": "Based on the above question, if your patient were in acidosis due to complications of diabetes, how would the breathing of the person change to try to help?", "marks": 1, "options": ["breathing rate and depth would decrease, as hypoventilation", "no change will occur", "breathing rate and depth will increase, as hyperventilation", "breathing would stop"], "correctIndex": 2, "answer": "breathing rate and depth will increase, as hyperventilation", "explanation": "In acidosis the body hyperventilates to blow off CO2, which removes acid and raises the low blood pH back toward normal (compensatory Kussmaul breathing in diabetic ketoacidosis)."}, {"type": "mcq", "question": "Normal blood pH is?", "marks": 1, "options": ["roughly neutral", "7.12-7.53", "7.4", "7.35-7.45"], "correctIndex": 3, "answer": "7.35-7.45", "explanation": "Normal arterial blood pH is tightly maintained within the range 7.35-7.45 (slightly alkaline), and this range is the most accurate answer."}, {"type": "mcq", "question": "Acidosis would be which of the following pH?", "marks": 1, "options": ["7.28", "7.52", "7.36", "7.44"], "correctIndex": 0, "answer": "7.28", "explanation": "Acidosis is a blood pH below the normal range (below 7.35), so 7.28 is the only acidotic value listed."}, {"type": "mcq", "question": "Alkalosis would be which of the following pH?", "marks": 1, "options": ["7.28", "7.52", "7.44", "7.36"], "correctIndex": 1, "answer": "7.52", "explanation": "Alkalosis is a blood pH above the normal range (above 7.45), so 7.52 is the only alkalotic value listed."}, {"type": "mcq", "question": "A buffer resists changes in pH when adding a base by?", "marks": 1, "options": ["releasing H+ ions to neutralise the base", "soaking up H+ ions to neutralise the base"], "correctIndex": 0, "answer": "releasing H+ ions to neutralise the base", "explanation": "When a base is added (which removes/binds H+), the buffer releases H+ ions to replace them and neutralise the base, keeping the pH stable."}]}], "saqs": [{"topic": "Practice Test (closest to the real test)", "question": "Match the nutrients on the left with the statement on the right that is most relevant: Calcium, Iodine, Vitamins generally, Vitamins A/D/E/K, Kilojoule, Empty kilojoules, trans-fats.", "marks": 3.5, "answer": "Calcium = a mineral needed for strong bones and teeth (and muscle/nerve function). Iodine = a trace mineral needed to make thyroid hormones. Vitamins generally = organic micronutrients needed in small amounts to support body processes (not a source of energy). Vitamins A, D, E and K = the fat-soluble vitamins (stored in body fat/liver). Kilojoule = the unit used to measure the energy in food. Empty kilojoules = energy (kJ) from food that provides little or no useful nutrients (e.g. added sugar/alcohol). trans-fats = unhealthy (often artificial) fats that raise the risk of heart disease."}, {"topic": "Practice Test (closest to the real test)", "question": "Match these statements to the major nutrient they are about: Carbohydrates, Proteins, Water, Lipids.", "marks": 2, "answer": "Carbohydrates = the body's main/preferred source of energy (broken down to glucose). Proteins = used for growth, repair and building body structures (broken down to amino acids; also make enzymes/hormones). Water = the most abundant substance in the body; the medium for chemical reactions, transport and temperature regulation (not an energy source). Lipids = concentrated energy store, insulation, protection of organs and a component of cell membranes (broken down to fatty acids and glycerol)."}, {"topic": "Practice Test (closest to the real test)", "question": "Match the statements about the absorptive and post-absorptive phases: Absorptive, Post Absorptive, Hormone of Absorptive phase, Hormone of Post Absorptive phase.", "marks": 2, "answer": "Absorptive (fed) state = the period during and just after a meal when nutrients are being absorbed and used or stored (glucose is the main energy source; excess stored as glycogen and fat). Post-absorptive (fasting) state = the period between meals when no food is being absorbed, so the body breaks down stores (glycogen, fat) to keep blood glucose normal. Hormone of the absorptive phase = insulin. Hormone of the post-absorptive phase = glucagon."}, {"topic": "Practice Test (closest to the real test)", "question": "True or false: (1) Glucose is a monosaccharide. (2) Glucose is a carbohydrate. (3) Glucose is the same as table sugar (the sugar you put in your tea or coffee). (4) Sucrose is made of 2 glucose molecules joined together.", "marks": 2, "answer": "1. True - glucose is a single sugar unit (monosaccharide). 2. True - glucose is a simple carbohydrate. 3. False - table sugar is sucrose, not glucose. 4. False - sucrose is made of glucose joined to fructose (not two glucose molecules; two glucose units make maltose)."}, {"topic": "Practice Test (closest to the real test)", "question": "Complete the table about DNA and RNA for: Number of strands, Location, Sugar, and Bases.", "marks": 2, "answer": "DNA: Number of strands = 2 (double strand/double helix); Location = the nucleus; Sugar = deoxyribose; Bases = A, T, C, G. RNA: Number of strands = 1 (single strand); Location = made in the nucleus but works in the cytoplasm (e.g. at the ribosome); Sugar = ribose; Bases = A, U, C, G (uracil replaces thymine)."}, {"topic": "Practice Test (closest to the real test)", "question": "What are the names of the bases? Give the names for A, T, C and G.", "marks": 1.5, "answer": "A = adenine, T = thymine, C = cytosine, G = guanine. (In RNA, U = uracil replaces thymine.)"}, {"topic": "Practice Test (closest to the real test)", "question": "Name the 3 parts of a nucleotide.", "marks": 1, "answer": "A nucleotide has three parts:\n1. A phosphate group.\n2. A sugar (deoxyribose in DNA, ribose in RNA).\n3. A nitrogenous base (A, T/U, C or G).\nThe sugar and phosphate form the backbone (the sides of the DNA helix), and the bases pair across the middle as the rungs."}, {"topic": "Practice Test (closest to the real test)", "question": "Put the sequence of events of translation in order (9 steps).", "marks": 2, "answer": "Translation (protein synthesis at the ribosome): 1. mRNA leaves the nucleus and travels to a ribosome in the cytoplasm. 2. The ribosome attaches to the start of the mRNA. 3. The ribosome reads the mRNA in groups of 3 bases (codons), beginning at the start codon. 4. A tRNA carrying an amino acid arrives, and its anticodon pairs with the first mRNA codon. 5. The next tRNA with the matching anticodon brings the next amino acid. 6. A peptide bond forms joining the two amino acids together. 7. The ribosome moves along to the next codon and the empty tRNA is released to collect another amino acid. 8. The process repeats, adding amino acids and growing the polypeptide chain. 9. A stop codon is reached, translation ends and the completed protein is released."}, {"topic": "Practice Test (closest to the real test)", "question": "Put the sequence of events of transcription in order (6 steps).", "marks": 1.5, "answer": "Transcription (making mRNA from DNA in the nucleus): 1. The enzyme RNA polymerase binds to the gene on the DNA. 2. The DNA double helix unwinds and the two strands separate/unzip. 3. One DNA strand is used as the template. 4. RNA polymerase adds complementary RNA bases (A-U, T-A, C-G, G-C) to build the mRNA strand. 5. The mRNA strand is completed and detaches from the DNA. 6. The DNA re-zips/rewinds and the mRNA leaves the nucleus through a nuclear pore to go to the ribosome."}, {"topic": "Practice Test (closest to the real test)", "question": "If the sequence on the DNA is C T G C A A T G C, what is (1) the sequence on the mRNA and (2) the sequence on the tRNA?", "marks": 1, "answer": "1. mRNA (complementary to DNA, with U instead of T) = G A C G U U A C G. 2. tRNA (anticodon, complementary to the mRNA) = C U G C A A U G C. (Note the tRNA sequence matches the original DNA template except T is shown as U.)"}, {"topic": "Practice Test (closest to the real test)", "question": "If the sequence on the mRNA is A U G C C U G C A, what is (1) the sequence on the DNA and (2) the sequence on the tRNA?", "marks": 1, "answer": "1. DNA (complementary to mRNA, with T instead of U) = T A C G G A C G T. 2. tRNA (anticodon, complementary to mRNA, with U) = U A C G G A C G U."}, {"topic": "Practice Test (closest to the real test)", "question": "If the sequence on the tRNA is A U G C C U G C A, what is (1) the sequence on the DNA and (2) the sequence on the mRNA?", "marks": 1, "answer": "First find the mRNA, which is complementary to the tRNA anticodon: 2. mRNA = U A C G G A C G U. 1. DNA (complementary to the mRNA, with T instead of U) = A T G C C T G C A. (The DNA coding strand reads the same as the tRNA except U becomes T.)"}, {"topic": "Practice Test (closest to the real test)", "question": "Using the codon table, what are the amino acid sequences for: mRNA GCU AAU UUG; DNA TAG CAT TAA; tRNA GUA CCC CUG?", "marks": 1, "answer": "mRNA GCU-AAU-UUG = Alanine - Asparagine - Leucine (Ala-Asn-Leu). DNA TAG CAT TAA: transcribe to mRNA (complementary, U for T) = AUC GUA AUU = Isoleucine - Valine - Isoleucine (Ile-Val-Ile). tRNA GUA CCC CUG: the mRNA codons are complementary = CAU GGG GAC = Histidine - Glycine - Aspartic acid (His-Gly-Asp)."}, {"topic": "Practice Test (closest to the real test)", "question": "Match the hormone/nutrient transport statements: Insulin = ? Also match the other statements (promotes breakdown of glucose; helps to raise blood sugar levels; helps transport fatty acids to the mitochondria; facilitates the entry of glucose into the cell by facilitated diffusion).", "marks": 1, "answer": "Insulin = facilitates the entry of glucose into the cell by facilitated diffusion (lowering blood sugar). The other matches: glucagon = helps to raise blood sugar levels; carnitine = helps transport fatty acids to the mitochondria; cellular respiration/glycolysis = promotes the breakdown of glucose."}, {"topic": "Practice Test (closest to the real test)", "question": "Match the nutrient to its breakdown product: Proteins, Carbohydrates, Lipids.", "marks": 1, "answer": "Proteins are broken down to amino acids. Carbohydrates are broken down to monosaccharides (simple sugars such as glucose). Lipids are broken down to fatty acids and glycerol."}, {"topic": "Practice Test (closest to the real test)", "question": "Based on the question above, a reaction that takes a larger molecule and breaks it into smaller molecules is called what? (Catabolic reactions or Anabolic reactions.)", "marks": 1, "answer": "Catabolic reactions - these break larger molecules down into smaller ones and usually release energy. (Anabolic reactions do the opposite: build larger molecules from smaller ones and require energy.)"}, {"topic": "Practice Test (closest to the real test)", "question": "Fill in this table about acids and bases - use the terms High, Low, Sour and Bitter only, for Acids and Bases across pH, Hydrogen concentration (H+), Hydroxide concentration (OH-) and Taste.", "marks": 2, "answer": "Acids: pH = Low; Hydrogen concentration (H+) = High; Hydroxide concentration (OH-) = Low; Taste = Sour. Bases: pH = High; Hydrogen concentration (H+) = Low; Hydroxide concentration (OH-) = High; Taste = Bitter."}, {"topic": "Practice Test (closest to the real test)", "question": "A buffer in the blood forms when CO2 (carbon dioxide) and water mix. What is the name of the acid that forms first, and what are the two ions that form when the acid splits apart?", "marks": 1, "answer": "The acid that forms first is carbonic acid (H2CO3). When it splits/dissociates it forms a hydrogen ion (H+) and a bicarbonate ion (HCO3-)."}, {"topic": "Practice Test (closest to the real test)", "question": "Match the cell transport terms to their correct definition: Osmosis, Active transport, Facilitated diffusion, Diffusion, Endocytosis.", "marks": 2, "answer": "Osmosis = the movement of water across a semi-permeable membrane from low to high solute concentration (down water's concentration gradient); passive, no energy needed. Active transport = movement of a substance against its concentration gradient (low to high) using a carrier protein and energy (ATP). Facilitated diffusion = passive movement of a substance down its concentration gradient with the help of a membrane protein/channel (no energy). Diffusion = passive movement of particles from high to low concentration until evenly spread (no energy). Endocytosis = the cell membrane engulfs/surrounds large particles or fluid and brings them into the cell in a vesicle (uses energy)."}, {"topic": "Practice Test (closest to the real test)", "question": "Put the events of defaecation in the correct order (7 steps).", "marks": 1, "answer": "1. Faeces (waste) moves into and fills the rectum. 2. Stretching of the rectal wall stimulates stretch receptors. 3. These send a signal/nerve impulse to the spinal cord (defaecation reflex). 4. The internal anal sphincter (involuntary/smooth muscle) relaxes. 5. Mass peristalsis/contractions of the rectal walls push the faeces toward the anus. 6. The external anal sphincter (voluntary muscle) is relaxed when it is convenient. 7. Faeces are expelled from the body through the anus (often aided by abdominal muscle contraction/Valsalva)."}, {"topic": "Protein Synthesis", "question": "Using the wordlist provided, fill in the blanks to make the paragraph make correct sense (use lowercase only). Wordlist: proteins, carbohydrates, transcription, translation, nucleus, ribosome, lysosome, nucleolus, triglyceride, amino acids, mRNA, cells, protein, polypeptide chain. Paragraph: Protein synthesis is the process by which cells make ___. It begins in the ___, where the DNA contains the genetic instructions. During a process called ___, a copy of the DNA code is made in the form of ___. This molecule then leaves the nucleus and travels to the ___ in the cytoplasm. At the ribosome, a process called ___ occurs. Here, the genetic code carried by mRNA is used to assemble ___ into a specific sequence. These amino acids are joined together to form a ___, which then folds into a functional ___. Protein synthesis is essential for growth, repair, and normal functioning of the ___.", "marks": 5, "answer": "1) proteins; 2) nucleus; 3) transcription; 4) mRNA; 5) ribosome; 6) translation; 7) amino acids; 8) polypeptide chain; 9) protein; 10) cells."}, {"topic": "Nutrients", "question": "Match the following terms to their definitions: glucose, glucagon, glycogen, glycogenesis, glycogenolysis, gluconeogenesis.", "marks": 1, "answer": "Glucose = the simple sugar (monosaccharide) used as the body's main energy fuel. Glucagon = a pancreatic hormone that raises blood glucose. Glycogen = the stored, branched-chain form of glucose (mainly in liver and muscle). Glycogenesis = the making of glycogen from glucose. Glycogenolysis = the breakdown of glycogen back into glucose. Gluconeogenesis = the making of new glucose from non-carbohydrate sources (e.g. amino acids, glycerol)."}, {"topic": "Digestive System", "question": "Describe the composition of pancreatic juice. Where in the pancreas is this juice produced and how does it reach the duodenum?", "marks": 3, "answer": "Pancreatic juice is an alkaline (bicarbonate-rich) fluid made up of water, bicarbonate ions (HCO3-), and digestive enzymes. The enzymes include pancreatic amylase (digests carbohydrates), pancreatic lipase (digests fats), and proteases secreted as inactive precursors such as trypsinogen and chymotrypsinogen (digest proteins), plus nucleases. It is produced by the exocrine acinar cells of the pancreas (the enzymes) and the duct cells (the bicarbonate-rich watery component). The juice drains through the pancreatic duct, which joins the bile duct at the hepatopancreatic ampulla and empties into the duodenum through the major duodenal papilla, controlled by the sphincter of Oddi."}, {"topic": "Digestive System", "question": "Describe the functions of three enzymes in the pancreatic juice.", "marks": 3, "answer": "Pancreatic amylase breaks down starch (polysaccharides) into smaller carbohydrates such as maltose and other disaccharides. Pancreatic lipase breaks down triglycerides (fats) into fatty acids and monoglycerides. Trypsin (activated from trypsinogen) is a protease that breaks down proteins and polypeptides into smaller peptides and amino acids; chymotrypsin acts similarly on proteins. (Nucleases such as ribonuclease and deoxyribonuclease break down nucleic acids RNA and DNA into nucleotides.)"}, {"topic": "Digestive System", "question": "Describe the composition of gastric juice (name the 4 components). Explain the function of each component.", "marks": 8, "answer": "1) Hydrochloric acid (HCl), secreted by parietal cells: creates the highly acidic environment (about pH 1.5-2), activates pepsinogen into pepsin, denatures proteins, and kills ingested microorganisms. 2) Pepsinogen / pepsin, secreted by chief cells: pepsinogen is the inactive form that HCl converts to active pepsin, the enzyme that begins protein digestion by breaking proteins into smaller peptides. 3) Mucus, secreted by mucous cells (surface mucous cells and mucous neck cells): forms a protective alkaline barrier lining the stomach wall, preventing the acid and pepsin from digesting the stomach lining itself. 4) Intrinsic factor, secreted by parietal cells: a glycoprotein essential for the absorption of vitamin B12 in the ileum (needed for red blood cell production)."}, {"topic": "Digestive System", "question": "Describe the structural and functional differences between the mucosa of the stomach and that of the small intestine.", "marks": 4, "answer": "Stomach mucosa: lined with simple columnar epithelium folded into gastric pits leading to gastric glands; it contains specialised secretory cells (parietal cells producing HCl and intrinsic factor, chief cells producing pepsinogen, mucous cells producing protective mucus, and enteroendocrine cells producing hormones such as gastrin). The stomach wall is also thrown into folds called rugae that allow stomach expansion. Functionally the stomach mucosa is specialised for secretion (acid and enzymes) and chemical digestion of proteins, plus storage and mechanical churning of food, with little absorption. Small intestine mucosa: also simple columnar epithelium but its surface area is hugely increased by circular folds (plicae circulares), villi (finger-like projections each containing a capillary network and a lacteal), and microvilli (the brush border) on the absorptive enterocytes; goblet cells secrete mucus and crypts of Lieberkuhn secrete intestinal juice and contain brush-border enzymes. Functionally the small intestine mucosa is specialised for the final chemical digestion and, above all, for absorption of nutrients into the blood and lymph, which the villi, microvilli and rich blood/lymph supply are adapted for."}, {"topic": "Digestive System", "question": "Name the main organs of the digestive system and state the main function of each.", "marks": 11, "answer": "Salivary glands: secrete saliva containing amylase to begin starch digestion and moisten food into a bolus.\nOesophagus: muscular tube that moves the bolus to the stomach by peristalsis.\nLiver: produces bile to emulsify fats and processes absorbed nutrients.\nStomach: stores food and uses gastric juice (HCl and pepsin) plus churning for mechanical and chemical digestion of protein.\nGall bladder: stores and concentrates bile, releasing it into the duodenum.\nDuodenum: first part of the small intestine where bile and pancreatic juice are added and chemical digestion continues.\nPancreas: secretes pancreatic enzymes (amylase, lipase, proteases) and bicarbonate into the duodenum.\nSmall intestine: completes digestion and absorbs most nutrients through the villi.\nLarge intestine (colon): absorbs water and electrolytes and forms faeces.\nRectum: stores faeces prior to defecation.\nAnus: opening controlled by sphincters that releases faeces (defecation/egestion)."}, {"topic": "Digestive System", "question": "Name ONE place (besides the mouth) where mechanical digestion takes place, and describe how.", "marks": 4, "answer": "The stomach - its muscular wall churns and mixes food into a semi-liquid called chyme. (The small intestine also mechanically mixes chyme by segmentation.) Mechanical digestion changes the size/form of food without changing it chemically."}, {"topic": "Digestive System", "question": "Name THREE places (besides the mouth) where chemical digestion takes place. On a villus, where are (a) fatty acids and (b) glucose & amino acids absorbed?", "marks": 5, "answer": "Three places of chemical digestion (besides the mouth):\n1. Stomach - HCl and pepsin act on protein.\n2. Duodenum - bile and pancreatic enzymes (amylase, lipase, trypsin).\n3. Small intestine - brush-border/intestinal enzymes complete digestion.\nVillus absorption: fatty acids (with monoglycerides) are absorbed into the central lacteal (lymph); glucose and amino acids are absorbed into the blood capillaries."}, {"topic": "Digestive System", "question": "Matching exercise: match each digestive process/secretion to what it does (Breakdown of Food). Items: Salivary amylase in mouth; Pancreatic amylase in duodenum; Pepsin in stomach; Trypsin in duodenum; Erepsin in duodenum; Hydrochloric acid in stomach; Lipase in duodenum; Bile in duodenum; Mastication in mouth; Churning in the stomach and chemical digestion; Enterokinase from brush border of small intestine; Lactase from brush border of small intestine; Maltase from brush border of small intestine; Hydrochloric acid from parietal cells activation function.", "marks": 7, "answer": "Salivary amylase - begins chemical digestion of starch (carbohydrate) to maltose in the mouth. Pancreatic amylase - continues starch digestion to maltose in the duodenum. Pepsin - digests proteins to peptides in the stomach (acidic). Trypsin - digests proteins/peptides to smaller peptides in the duodenum. Erepsin (peptidases) - digests peptides to amino acids. Hydrochloric acid - denatures proteins, activates pepsinogen to pepsin, kills microbes (chemical, not enzymatic). Lipase - digests fats (triglycerides) to fatty acids and glycerol. Bile - emulsifies fats (mechanical/physical breakdown, no enzyme). Mastication - mechanical/physical breakdown of food by chewing. Churning in the stomach - mechanical breakdown mixing food with gastric juice. Enterokinase - activates trypsinogen to trypsin. Lactase - digests lactose to glucose + galactose. Maltase - digests maltose to glucose. HCl activation function - converts inactive pepsinogen into active pepsin."}, {"topic": "Digestive System", "question": "Matching exercise: match each cell or secretion to its product/role. Items: parietal cells in gastric glands; chief cells in gastric pits; G-cells in gastric glands secrete the hormone gastrin into bloodstream; S-cells of duodenum wall secrete the hormone secretin into bloodstream; enteroendocrine cells in the duodenal and jejunal mucosal lining secrete the hormone CCK into bloodstream; alkaline mucus from gastric glands that opens in gastric pits.", "marks": 3, "answer": "Parietal cells - secrete hydrochloric acid (and intrinsic factor). Chief cells - secrete pepsinogen (inactive precursor of pepsin). G-cells - secrete gastrin, which stimulates gastric acid secretion and motility. S-cells of the duodenum - secrete secretin, which stimulates the pancreas to release bicarbonate-rich juice and reduces gastric acid. Enteroendocrine cells (CCK) - secrete cholecystokinin, which stimulates gallbladder contraction (bile release) and pancreatic enzyme secretion. Alkaline mucus (mucous/neck cells) - protects the stomach lining from acid and enzymes."}, {"topic": "Digestive System", "question": "What are the finger-like projections of the small-intestine mucosa called, and what do they do?", "marks": 1, "answer": "Villi - finger-like projections of the small-intestinal mucosa that greatly increase the surface area for absorption. Each villus contains a network of blood capillaries (which absorb glucose and amino acids) and a central lacteal (a lymph vessel that absorbs fatty acids)."}], "caseStudies": [{"name": "Tamara & Kevin", "scenario": "Kevin is moaning to his youngest sister Tamara about how much weight he has put on and how he is going to try fasting. After a few days, Tamara notices that Kevin's breath smells a bit fruity and his rate and depth of breathing feels off. Tamara suspects that Kevin might be heading into ketosis, as he is burning fat since he is fasting, and he is in starvation mode. Kevin's older sister Amelia thinks he needs to go to the GP clinic and takes both siblings along. While waiting, Tamara complains she is hungry and buys a Whittaker's chocolate bar from the vending machine. Amelia worries the chocolate is high in lipids but a poor source of micronutrients like Vitamin C, and notices Tamara looking pale (possible iron deficiency). The questions cover ketosis/acid-base, nutrient functions and deficiencies, carbohydrate digestion, and carbohydrate metabolism.", "questions": [{"q": "1a. Describe what has caused the build-up of fatty acids in the blood.", "marks": 2, "modelAnswer": "Because Kevin is fasting and has used up his stored glucose (glycogen), his blood glucose drops and his body enters the post-absorptive/starvation state. With little glucose available for energy, the body switches to using fat as its main fuel. Hormones (such as glucagon and adrenaline, with low insulin) trigger lipolysis, the breakdown of stored triglycerides in adipose (fat) tissue into glycerol and free fatty acids. These fatty acids are released into the blood to be transported to cells (e.g. the liver) for energy. In the liver, because the limited oxaloacetate is being used up for gluconeogenesis (making new glucose), it cannot carry all the acetyl-CoA from this fat breakdown into the Krebs (citric acid) cycle, so the excess is converted into ketone bodies instead (ketosis) - which is why his breath smells fruity. In short: fasting -> no glucose -> increased fat breakdown (lipolysis) -> excess fatty acids released into the blood."}, {"q": "1b. Explain why Kevin's body is responding by hyperventilating and increased exhalation (breathing out).", "marks": 2, "modelAnswer": "The ketone bodies produced from fat breakdown are acidic, so as they build up they release hydrogen ions (H+) and lower the blood pH, making the blood more acidic (ketoacidosis/metabolic acidosis). To correct this, the respiratory system acts as a buffer/compensation mechanism. The extra H+ combines with bicarbonate to form carbonic acid, which breaks down into water and carbon dioxide (CO2). Kevin therefore breathes faster and more deeply (hyperventilates) to blow off (exhale) more CO2. Removing CO2 reduces the amount of carbonic acid in the blood, which raises the pH back towards normal. So the increased rate and depth of breathing is the body's attempt to get rid of excess acid and restore normal blood pH."}, {"q": "2. The chocolate bar is a great source of lipids. Describe TWO functions of lipids in the diet.", "marks": 2, "modelAnswer": "1. Energy source and storage: Lipids are an concentrated source of energy, providing about 9 kcal (37 kJ) per gram, more than double that of carbohydrates or protein. Excess energy is stored as triglycerides in adipose tissue and can be broken down for fuel when needed (e.g. between meals or during fasting). 2. Insulation and protection / vitamin absorption: Fat stored under the skin and around organs provides insulation to help maintain body temperature and cushions and protects vital organs. Lipids also help the body absorb and transport the fat-soluble vitamins A, D, E and K. (Other acceptable functions: forming the phospholipid bilayer of cell membranes, and providing the building blocks for steroid hormones.)"}, {"q": "3a. What is ONE function of vitamin C in the diet?", "marks": 1, "modelAnswer": "Vitamin C (ascorbic acid) is needed for the production/synthesis of collagen, the protein that gives strength and structure to skin, blood vessels, gums, bones and connective tissue, and helps wounds heal. (Other acceptable single functions: it acts as an antioxidant, supports the immune system, or improves the absorption of iron from the gut.)"}, {"q": "3b. What symptoms might Tamara have if she continues to be lacking in vitamin C?", "marks": 2, "modelAnswer": "A lack of vitamin C leads to scurvy, caused by poor collagen formation. Symptoms include: bleeding, swollen and inflamed gums (and loose teeth); easy bruising and slow/poor wound healing; small bleeds under the skin and bleeding around hair follicles; dry, rough skin; tiredness, weakness and fatigue; aching joints/muscles; and a weakened immune system leading to more frequent infections. Because vitamin C also helps iron absorption, a deficiency can also contribute to anaemia."}, {"q": "4a. What is ONE function of iron in the diet?", "marks": 1, "modelAnswer": "Iron is needed to make haemoglobin, the protein in red blood cells that binds and carries oxygen around the body to the tissues. (Also acceptable: iron forms part of myoglobin which stores oxygen in muscle, and it is a component of enzymes involved in energy/ATP production.)"}, {"q": "4b. Besides a pale appearance, what symptoms might Tamara show if she were lacking in iron?", "marks": 2, "modelAnswer": "A lack of iron causes iron-deficiency anaemia, where there is too little haemoglobin to carry enough oxygen to the tissues. As well as pale skin, symptoms include: tiredness, weakness and lack of energy (fatigue); shortness of breath, especially on exertion; dizziness or light-headedness and headaches; a fast or pounding heartbeat (palpitations); feeling cold (cold hands and feet); reduced ability to concentrate; and brittle nails. These occur because the cells are not receiving enough oxygen to make energy."}, {"q": "5. Describe the mechanical and chemical digestion of only the carbohydrate in the chocolate bar as it moves from Tamara's mouth to the small intestine.", "marks": 4, "modelAnswer": "MOUTH - Mechanical digestion: the teeth chew (masticate) the chocolate, breaking it into smaller pieces, and the tongue mixes it with saliva to form a soft ball called a bolus. This increases the surface area for enzymes to work on. Chemical digestion: saliva contains the enzyme salivary amylase (ptyalin), which begins breaking down starch (a polysaccharide) into smaller carbohydrates such as maltose and shorter chains (dextrins).\n\nSTOMACH - Mechanical digestion: the muscular walls of the stomach churn and mix the food with gastric juice, turning the bolus into a semi-liquid called chyme. Chemical digestion: NONE for carbohydrate. Salivary amylase is destroyed (denatured) by the acidic gastric juice (hydrochloric acid), so carbohydrate digestion essentially stops in the stomach.\n\nDUODENUM (first part of the small intestine) - Mechanical digestion: segmentation (muscle contractions) mixes the chyme with digestive juices and bile, and peristalsis moves it along. Chemical digestion: pancreatic amylase, released from the pancreas, continues breaking down the remaining starch into the disaccharide maltose (and other disaccharides).\n\nSMALL INTESTINE (jejunum/ileum, brush border) - Mechanical digestion: continued segmentation and peristalsis mix the contents with intestinal juice and keep moving it along. Chemical digestion: brush-border enzymes on the wall of the small intestine (maltase, sucrase and lactase) break the disaccharides down into monosaccharides - maltase breaks maltose into glucose, sucrase breaks sucrose into glucose and fructose, and lactase breaks lactose into glucose and galactose. These single sugars (monosaccharides) are now small enough to be absorbed through the villi into the bloodstream."}, {"q": "6. After being digested, the carbohydrate from the chocolate is metabolised. Describe the process of carbohydrate metabolism.", "marks": 5, "modelAnswer": "Carbohydrate metabolism is how the body breaks glucose down to release energy in the form of ATP (this is called cellular respiration). It happens in three main stages:\n\n1. Glycolysis (in the cytoplasm of the cell, anaerobic - no oxygen needed): one molecule of glucose (a 6-carbon sugar) is split into two molecules of pyruvate (a 3-carbon molecule). This produces a small amount of energy - a net gain of 2 ATP - and some hydrogen carriers (NADH).\n\n2. The Krebs cycle (citric acid cycle, in the mitochondria, aerobic - oxygen needed): the pyruvate is first converted to acetyl-CoA, which enters the Krebs cycle. Here it is broken down further, releasing carbon dioxide (CO2) as a waste product and producing a small amount of ATP plus many hydrogen carriers (NADH and FADH2).\n\n3. The electron transport chain / oxidative phosphorylation (on the inner mitochondrial membrane, aerobic): the hydrogen carriers (NADH and FADH2) donate electrons, and oxygen acts as the final electron acceptor, joining with hydrogen to form water (H2O). This stage produces the large majority of the ATP.\n\nOverall, the complete aerobic breakdown of one glucose molecule yields about 36-38 ATP, and the waste products are carbon dioxide and water. The overall equation is: glucose + oxygen -> carbon dioxide + water + energy (ATP). This is a catabolic (decomposition) process because a large molecule (glucose) is broken into smaller molecules to release energy. If there is excess glucose, the body stores it: it is converted to glycogen in the liver and muscles (glycogenesis), and any further excess is converted to fat (lipogenesis). When blood glucose is low, glycogen is broken back down into glucose (glycogenolysis)."}]}, {"name": "Tomasi & Nichole", "scenario": "Tomasi's nan is not very well. She has type 2 diabetes and hasn't been managing it well. Tomasi has taken his Nan to the emergency room at his local clinic as he noticed Nan's depth and rate of breathing increased and her breath smells a bit like nail polish remover (acetone). It seems that Nan hasn't been monitoring her diabetes and there is an increase in fatty acids in the blood. While at the GP clinic, Tomasi runs into his older sister Nichole, who is working as a nurse. While waiting for Nan, they catch up over a packet of salty potato chips.", "questions": [{"q": "1a. Describe what has caused the build-up of fatty acids in the blood.", "marks": 2, "modelAnswer": "In poorly managed type 2 diabetes, the body cannot move glucose from the blood into the cells properly because the cells are resistant to insulin (and/or there is not enough effective insulin). Even though there is plenty of glucose in the blood, the cells are effectively 'starved' of fuel, so the body acts as if it is in a fasting/starvation state. To get an alternative energy source, the body breaks down stored fat (triglycerides in adipose tissue) by lipolysis. This releases large amounts of free fatty acids into the blood. The fatty acids are then sent to the liver to be used for energy, which causes the high level of fatty acids seen in Nan's blood. In the liver, because the limited oxaloacetate is being used up for gluconeogenesis (making new glucose), it cannot carry all the acetyl-CoA from this fat breakdown into the Krebs (citric acid) cycle, so the excess acetyl-CoA is converted into ketone bodies instead (ketosis)."}, {"q": "1b. Explain why Nan's body is responding by hyperventilating and increased exhalation (breathing out).", "marks": 2, "modelAnswer": "When the liver breaks down the large amounts of fatty acids for energy, it produces ketones (ketoacids) as a by-product. These ketones are acidic, so they lower the pH of the blood and cause a metabolic acidosis (this is why her breath smells of acetone, a ketone). To compensate and bring the pH back toward normal, the respiratory system tries to remove acid from the body. Carbon dioxide (CO2) acts as an acid in the blood (it forms carbonic acid). By breathing faster and deeper (hyperventilating), Nan blows off / exhales more CO2, which reduces the carbonic acid and raises the blood pH back toward normal. This deep, rapid breathing is the body's compensatory response to the acidosis (Kussmaul breathing)."}, {"q": "2a. The iodised salt on the chips is a great source of iodine. Describe one function of iodine in the diet.", "marks": 1, "modelAnswer": "Iodine is needed by the thyroid gland to make the thyroid hormones (thyroxine, T4, and T3). These hormones control the body's metabolic rate, helping to regulate how fast the body uses energy as well as supporting normal growth and development."}, {"q": "2b. Describe a symptom that someone with low iodine might have.", "marks": 1, "modelAnswer": "A person low in iodine cannot make enough thyroid hormone, so they may develop a goitre (a visible swelling/enlargement of the thyroid gland in the neck). Other symptoms of low iodine include tiredness/fatigue, feeling cold, weight gain and a slowed metabolism (hypothyroidism)."}, {"q": "3a. What is the function of vitamin D in the diet?", "marks": 1, "modelAnswer": "Vitamin D helps the body absorb calcium (and phosphate) from the small intestine. This is essential for building and maintaining strong, healthy bones and teeth, and for normal nerve and muscle function."}, {"q": "3b. What symptoms might Tomasi have if Tomasi was to be lacking in vitamin D?", "marks": 1, "modelAnswer": "Without enough vitamin D, the body cannot absorb enough calcium, so the bones become weak and soft. In an adult like Tomasi this causes osteomalacia, with symptoms such as bone pain, muscle weakness and an increased risk of fractures. (In children the same deficiency causes rickets, with soft, bowed/deformed bones.)"}, {"q": "5. Describe the mechanical and chemical digestion of only the oils (lipids) in the chips as they move from Tomasi's mouth to the small intestine.", "marks": 4, "modelAnswer": "MOUTH - Mechanical digestion: mastication (chewing) by the teeth and tongue physically breaks the food into smaller pieces and mixes it with saliva to form a bolus. Chemical digestion of lipids: none (there is essentially no significant fat digestion in the mouth at first-year level). STOMACH - Mechanical digestion: the churning/mixing action of the muscular stomach wall (peristalsis) mixes the food with gastric juice and helps break the large fat globules into smaller droplets, turning the food into chyme. Chemical digestion of lipids: none (no significant chemical digestion of fats occurs in the stomach at this level). DUODENUM - Mechanical digestion: bile (made by the liver, stored in the gallbladder) is released into the duodenum and emulsifies the fats - it physically breaks the large fat globules into many tiny droplets, greatly increasing the surface area for enzymes to work on. Chemical digestion: pancreatic lipase (from the pancreas) chemically breaks down the emulsified triglycerides into fatty acids and monoglycerides (and glycerol). SMALL INTESTINE - Mechanical digestion: segmentation and peristalsis continue to mix the chyme and move it along, keeping the fat droplets emulsified and in contact with enzymes. Chemical digestion: lipase continues to break the remaining lipids down into fatty acids and monoglycerides, ready to be absorbed across the villi into the lacteals (lymphatic vessels)."}, {"q": "6. After being digested, the lipids are metabolised. Describe the process of lipid metabolism.", "marks": 5, "modelAnswer": "Lipid metabolism includes both the breakdown of fats for energy (catabolism) and the storage/building of fats (anabolism). DIGESTION & TRANSPORT: After digestion, triglycerides are broken into fatty acids and glycerol (and monoglycerides). These are absorbed into the cells of the small intestine, reassembled into triglycerides, and packaged into chylomicrons (lipoproteins) that travel via the lymphatic system and then the bloodstream to the tissues. STORAGE (anabolism / lipogenesis): When there is excess energy (e.g. in the absorptive state, after a meal), fatty acids and glycerol are joined back together to form triglycerides, which are stored in adipose (fat) tissue for later use. The liver can also convert excess glucose and amino acids into fatty acids and store them as fat. BREAKDOWN FOR ENERGY (catabolism): When the body needs energy (e.g. in the post-absorptive/fasting state), stored triglycerides are broken down by lipolysis into glycerol and fatty acids. Glycerol can be converted into a glucose-type intermediate and used in glycolysis. The fatty acids undergo beta-oxidation, where they are broken down into 2-carbon acetyl-CoA molecules. ENERGY PRODUCTION: The acetyl-CoA enters the citric acid cycle (Krebs cycle) and then the electron transport chain (in the mitochondria), producing large amounts of ATP (energy), along with water and carbon dioxide as waste. KETONE FORMATION: If too much fat is broken down at once (for example in starvation or uncontrolled diabetes), the liver cannot use all the acetyl-CoA, so it is converted into ketones (ketone bodies), which can be used as an alternative fuel but, in excess, make the blood acidic (ketoacidosis)."}]}, {"name": "Ying Ying & Jacob", "scenario": "Ying Ying puts their daughter to bed and sits down to watch TV with Jacob. Jacob notices Ying Ying is hyperventilating (breathing faster than normal) and seems to be huffing out more air than usual. He asks Ying Ying whether she has been eating well. Ying Ying explains she has been fasting to try and beat this virus she has picked up. She has only been drinking water for four days and has had nothing to eat. She is in starvation mode and as a result she has a lot of fatty acids (ketones) in the blood. Worried about his wife, Jacob suggests Ying Ying have some cheese (a great source of protein). While Ying Ying eats the cheese, Jacob munches on a chocolate Mars bar, which is high in carbohydrates but not a great source of micronutrients (for example, it does not contain the recommended daily dose of calcium). Neither of them appears to take in many vitamins, including folate (vitamin B9). They then decide to make some simple sandwiches for dinner: Jacob butters the bread before adding chicken, so the sandwich contains carbohydrates, lipids and proteins.", "questions": [{"q": "1a. Describe what has caused the build-up of fatty acids (ketones) in the blood.", "marks": 2, "modelAnswer": "Because Ying Ying has been fasting (only drinking water) for four days, her body has used up its stored glycogen and run out of glucose, so blood glucose is low. Her body has switched into the post-absorptive / starvation (fasting) state. To get energy, the body breaks down (catabolises) stored fat (triglycerides) in adipose tissue into fatty acids through lipolysis. In the liver, because the limited oxaloacetate is being used up for gluconeogenesis, the acetyl-CoA from this fat breakdown cannot enter the Krebs (citric acid) cycle, so it is converted into ketone bodies instead (ketogenesis) to use as an alternative fuel. Because so much fat is being broken down at once, fatty acids and ketones build up faster than they can be used, so they accumulate in the blood."}, {"q": "1b. Explain why Ying Ying's body is responding by hyperventilating and increased exhalation (breathing out).", "marks": 2, "modelAnswer": "Ketones are acids, so having a lot of them in the blood makes the blood more acidic and lowers the pH (this is a metabolic acidosis). To correct this, the respiratory system acts as a buffer/compensation mechanism. Hydrogen ions (H+) combine with bicarbonate to form carbonic acid, which breaks down into carbon dioxide and water. By hyperventilating (breathing fast and deep), Ying Ying blows off / exhales more carbon dioxide. Removing CO2 reduces the amount of carbonic acid (H+) in the blood, which raises the pH back towards normal. So the increased breathing is the body trying to get rid of acid and restore a normal blood pH."}, {"q": "2. Cheese is a great source of protein. Describe TWO functions of protein in the diet.", "marks": 2, "modelAnswer": "1. Growth and repair: protein provides the amino acids needed to build and repair body tissues (such as muscle, skin and organs) and to make new cells, which is important for healing and growth.\n2. Making enzymes, hormones and antibodies: proteins are used to make enzymes (which speed up chemical reactions), hormones (chemical messengers) and antibodies (which fight infection as part of the immune system).\n(Other acceptable functions: providing structural proteins like collagen; transporting substances in the blood, e.g. haemoglobin carrying oxygen and plasma proteins like albumin maintaining fluid balance; and being used as an energy source when carbohydrates and fats run out.)"}, {"q": "3a. What is ONE function of calcium in the diet?", "marks": 1, "modelAnswer": "Calcium is needed to build and maintain strong bones and teeth. (Other acceptable functions: it is required for normal muscle contraction, for nerve impulse transmission, and for blood clotting.)"}, {"q": "3b. What symptoms might Jacob show if he continues to be lacking in calcium?", "marks": 2, "modelAnswer": "A lack of calcium can lead to weak, soft and brittle bones, increasing the risk of fractures and conditions such as osteoporosis (in children this is rickets). Because calcium is needed for muscle and nerve function, Jacob may also show muscle cramps, twitching or spasms, tingling/numbness, and weakness. Over the long term his bones become more easily broken and his teeth can also be affected."}, {"q": "4a. What is the function of vitamin B9 (folate) in the diet?", "marks": 1, "modelAnswer": "Folate (vitamin B9) is needed to make and repair DNA and is essential for the production of new red blood cells (and other cells). It is especially important in pregnancy for the healthy development of the baby's neural tube (brain and spinal cord)."}, {"q": "4b. What symptoms might the couple show if they continue to be lacking in vitamin B9 (folate)?", "marks": 2, "modelAnswer": "A lack of folate causes anaemia (specifically megaloblastic/folate-deficiency anaemia), where the body cannot make enough healthy red blood cells. This leads to symptoms such as tiredness/fatigue, weakness, pale skin, shortness of breath, dizziness and headaches. In a pregnant person, folate deficiency increases the risk of neural tube defects (such as spina bifida) in the developing baby."}, {"q": "5. Describe the mechanical and chemical digestion of the chicken from the sandwich as it moves from Ying Ying's mouth to the small intestine. (Chicken = protein; complete each body part for mechanical and chemical digestion.)", "marks": 8, "modelAnswer": "MOUTH - Mechanical digestion: the teeth chew (masticate) the chicken, breaking it into smaller pieces, and the tongue mixes it with saliva to form a soft ball called a bolus, which is swallowed. Chemical digestion: there is NO chemical digestion of protein in the mouth. Saliva contains salivary amylase, which only begins to break down carbohydrates, not protein, so the chicken's protein is unchanged here.\n\nSTOMACH - Mechanical digestion: the muscular walls of the stomach contract and churn (mix), combining the food with gastric juice to turn it into a creamy liquid called chyme. Chemical digestion: this is where protein digestion begins. The stomach releases gastric juice containing hydrochloric acid (HCl) and the enzyme pepsin (pepsinogen activated by the acid). The HCl makes the stomach acidic, which kills microbes and activates pepsin; pepsin then breaks the proteins (chicken) down into smaller chains called peptides/polypeptides.\n\nDUODENUM (first part of the small intestine) - Mechanical digestion: segmentation contractions mix the chyme with digestive juices; bile from the liver/gallbladder is added (mainly to emulsify fats, not protein). Chemical digestion: the pancreas releases pancreatic juice containing protein-digesting enzymes (proteases) such as trypsin and chymotrypsin. These continue breaking the peptides/polypeptides into even shorter chains (smaller peptides). Pancreatic juice also contains bicarbonate, which neutralises the acidic chyme so the enzymes can work.\n\nSMALL INTESTINE (jejunum/ileum) - Mechanical digestion: segmentation and peristalsis continue to mix the contents and move them along, keeping them in contact with the absorptive wall. Chemical digestion: enzymes (peptidases, e.g. dipeptidases) on the surface of the intestinal wall (brush border) complete protein digestion by breaking the small peptides into single amino acids. The amino acids are then absorbed across the villi/microvilli into the bloodstream (capillaries) and carried to the liver."}, {"q": "6. After being digested, the proteins in the chicken are metabolised. Describe the process of protein metabolism.", "marks": 5, "modelAnswer": "Once the chicken protein has been digested into amino acids and absorbed into the blood, the amino acids are carried to the liver and body cells, where they can be metabolised (anabolism = building up; catabolism = breaking down).\n\n1. Protein synthesis (anabolism): the body's first priority is to use amino acids to build new proteins. Amino acids are joined together (peptide bonds) following the instructions in DNA/RNA to make body proteins such as enzymes, hormones, antibodies and structural proteins for growth and repair of tissues.\n\n2. The body cannot store excess amino acids, so any that are not needed for building proteins are broken down (catabolism) for energy or converted to other molecules.\n\n3. Deamination: this breakdown happens mainly in the liver. The amino (nitrogen-containing) group (-NH2) is removed from the amino acid. This produces ammonia, which is toxic.\n\n4. Urea formation and excretion: the liver converts the toxic ammonia into urea (a less toxic waste). The urea is carried in the blood to the kidneys and excreted from the body in urine.\n\n5. Use of the remaining carbon skeleton: the leftover part of the amino acid (the keto acid / carbon skeleton) can be used to release energy (entering cellular respiration / the Krebs cycle to make ATP), or it can be converted into glucose (gluconeogenesis) or stored as fat, depending on the body's needs."}]}], "answerBank": {"nutrients": [{"name": "Carbohydrates", "type": "macronutrient", "function": "The body's main and preferred energy source; glucose fuels cells (especially the brain and red blood cells) and provides quick, readily available energy for daily activity.", "deficiency": "Fatigue, weakness, low blood glucose (hypoglycaemia), poor concentration, and breakdown of fat and protein for energy leading to ketosis/weight loss."}, {"name": "Proteins", "type": "macronutrient", "function": "Provide amino acids for growth, repair and maintenance of body tissues, and build enzymes, hormones and antibodies for immune function.", "deficiency": "Muscle wasting, poor wound healing, weakened immunity (frequent infections), oedema (swelling), and stunted growth in children (kwashiorkor/marasmus)."}, {"name": "Lipids / Fats", "type": "macronutrient", "function": "Concentrated energy store, insulate and protect organs, form cell membranes, and enable absorption of fat-soluble vitamins (A, D, E, K).", "deficiency": "Weight loss, fatigue, dry scaly skin, poor absorption of fat-soluble vitamins, and deficiency of essential fatty acids."}, {"name": "Water", "type": "macronutrient", "function": "Main component of body fluids; transports nutrients and wastes, regulates body temperature, and acts as a medium for chemical reactions and digestion.", "deficiency": "Dehydration: thirst, dry mouth and skin, reduced/dark urine, dizziness, confusion, low blood pressure and, if severe, shock."}, {"name": "Dietary Fibre", "type": "macronutrient", "function": "Adds bulk to faeces and promotes regular bowel movements (peristalsis), helping prevent constipation and supporting healthy blood glucose and cholesterol.", "deficiency": "Constipation, hard stools, increased risk of haemorrhoids and diverticular disease, and poorer blood glucose/cholesterol control."}, {"name": "Vitamin A", "type": "vitamin", "function": "Essential for healthy vision (especially in dim light), and maintains healthy skin and the epithelial linings of body surfaces and immune defences.", "deficiency": "Night blindness, dry eyes (xerophthalmia), dry rough skin, and increased susceptibility to infection."}, {"name": "Vitamin C", "type": "vitamin", "function": "Needed for collagen formation (supports skin, blood vessels and wound healing), acts as an antioxidant, and aids iron absorption.", "deficiency": "Scurvy: bleeding/swollen gums, easy bruising, poor wound healing, fatigue, and loose teeth."}, {"name": "Vitamin D", "type": "vitamin", "function": "Promotes absorption of calcium and phosphate from the gut, supporting strong bones and teeth and normal muscle function.", "deficiency": "Rickets in children (soft, bowed bones) and osteomalacia in adults (soft, painful bones); bone pain and muscle weakness."}, {"name": "Vitamin E", "type": "vitamin", "function": "Acts as an antioxidant that protects cell membranes from damage by free radicals and helps maintain healthy cells.", "deficiency": "Rare; may cause nerve and muscle damage, muscle weakness, and impaired vision or coordination."}, {"name": "Vitamin K", "type": "vitamin", "function": "Essential for normal blood clotting (synthesis of clotting factors) and contributes to bone health.", "deficiency": "Increased bleeding and bruising, prolonged clotting time, and difficulty stopping bleeding."}, {"name": "Vitamin B1 (Thiamine)", "type": "vitamin", "function": "Coenzyme needed for carbohydrate metabolism to release energy, and supports healthy nerve and heart function.", "deficiency": "Beriberi: nerve damage (tingling, weakness), muscle wasting, and heart problems; confusion (Wernicke's) in chronic alcohol misuse."}, {"name": "Vitamin B9 (Folate)", "type": "vitamin", "function": "Needed for DNA synthesis and red blood cell formation, and is vital in pregnancy to prevent neural tube defects in the developing baby.", "deficiency": "Megaloblastic (macrocytic) anaemia causing fatigue and weakness; in pregnancy, neural tube defects such as spina bifida."}, {"name": "Vitamin B12", "type": "vitamin", "function": "Needed for red blood cell formation, DNA synthesis, and healthy nerve function (maintains the myelin sheath).", "deficiency": "Pernicious/megaloblastic anaemia (fatigue, pallor) and nerve damage (numbness, tingling, balance problems, memory issues)."}, {"name": "Calcium", "type": "mineral", "function": "Builds and maintains strong bones and teeth, and is needed for muscle contraction, nerve transmission and blood clotting.", "deficiency": "Weak, brittle bones (osteoporosis/osteomalacia, rickets in children), muscle cramps or spasms (tetany), and increased fracture risk."}, {"name": "Iron", "type": "mineral", "function": "Key component of haemoglobin in red blood cells, enabling oxygen transport around the body.", "deficiency": "Iron-deficiency anaemia: fatigue, pallor, shortness of breath, dizziness and increased susceptibility to infection."}, {"name": "Iodine", "type": "mineral", "function": "Needed to make thyroid hormones, which regulate the body's metabolic rate, growth and development.", "deficiency": "Goitre (enlarged thyroid), hypothyroidism (tiredness, weight gain, cold intolerance), and impaired growth/development in children."}, {"name": "Sodium", "type": "mineral", "function": "Main electrolyte in extracellular fluid; regulates fluid balance, blood pressure and nerve impulse transmission.", "deficiency": "Hyponatraemia: muscle cramps, weakness, nausea, headache, confusion and, if severe, seizures."}, {"name": "Potassium", "type": "mineral", "function": "Main intracellular electrolyte; essential for nerve transmission, muscle contraction (including the heartbeat) and fluid balance.", "deficiency": "Hypokalaemia: muscle weakness and cramps, fatigue, and irregular heartbeat (arrhythmias)."}, {"name": "Zinc", "type": "mineral", "function": "Supports wound healing, immune function, and is a cofactor for many enzymes involved in growth and metabolism.", "deficiency": "Poor wound healing, impaired immunity (frequent infections), hair loss, skin problems, loss of taste, and slowed growth in children."}, {"name": "Magnesium", "type": "mineral", "function": "Cofactor for hundreds of enzyme reactions including energy production, and supports normal muscle and nerve function and bone health.", "deficiency": "Muscle cramps, twitching or spasms, weakness, fatigue, and irregular heartbeat."}], "core": [{"title": "1a: What causes the build-up of fatty acids in the blood (2 marks)", "marks": 2, "answer": "There is little or no glucose available for the cells to use as fuel. In fasting/starvation the dietary glucose runs out, and in uncontrolled type-2 diabetes there is not enough effective insulin, so glucose cannot move from the blood into the cells (the cells are 'starving' even though blood glucose is high). Because the cells cannot use glucose, the body switches to its back-up fuel and begins breaking down stored fat (lipolysis of triglycerides in adipose tissue). This releases large amounts of free fatty acids into the bloodstream, causing the build-up of fatty acids in the blood. The fatty acids travel to the liver for energy; but because the limited oxaloacetate is being used up to make new glucose (gluconeogenesis), it cannot carry all the resulting acetyl-CoA into the Krebs (citric acid) cycle, so the excess is converted into ketone bodies instead (ketosis) - which is why ketones build up too."}, {"title": "1b: Why the body responds by hyperventilating / increased exhalation (2 marks)", "marks": 2, "answer": "In the liver the fatty acids are broken down to acetyl-CoA; because glucose is scarce, oxaloacetate is diverted into gluconeogenesis, so this acetyl-CoA cannot enter the Krebs (citric acid) cycle and is converted into ketone bodies (ketoacids) instead. These are acids, so they release hydrogen ions and the blood pH falls, producing a metabolic acidosis (ketoacidosis). The fall in pH (rise in H+) is detected by chemoreceptors and stimulates the respiratory centre in the brainstem. This drives deep, rapid breathing (Kussmaul respirations / hyperventilation) so that more carbon dioxide is breathed out. Removing CO2 lowers the amount of carbonic acid in the blood, which helps raise the pH back towards normal and compensate for the acidosis."}, {"title": "Anabolism vs Catabolism", "marks": 2, "answer": "Anabolism and catabolism are the two halves of metabolism. Anabolism is the building-up phase: small simple molecules are joined together to make larger, more complex ones (e.g. amino acids joined into proteins, glucose stored as glycogen). It requires an input of energy (uses ATP). Catabolism is the breaking-down phase: large complex molecules are broken into smaller simpler ones (e.g. glycogen broken to glucose, fats broken to fatty acids). It releases energy, which is captured as ATP for the body to use. In short: anabolism builds and uses energy; catabolism breaks down and releases energy."}, {"title": "Synthesis vs Decomposition reaction", "marks": 2, "answer": "A synthesis reaction is one in which two or more smaller substances combine to form a larger, more complex product (A + B then forms AB). It is a building-up reaction and generally requires energy, underpinning anabolism. A decomposition reaction is the reverse: a larger, complex substance is broken down into two or more smaller products (AB then forms A + B). It is a breaking-down reaction that usually releases energy, underpinning catabolism. (Digestion of food, e.g. breaking starch into glucose, is a series of decomposition reactions.)"}, {"title": "How acids arise from metabolism, and how pH is buffered + the respiratory response", "marks": 3, "answer": "Normal metabolism constantly produces acids. The main one is carbon dioxide from cellular respiration, which combines with water to form carbonic acid; other 'metabolic' acids include lactic acid (from anaerobic respiration) and ketoacids (from fat breakdown). These acids add hydrogen ions to the blood and would lower the pH. The body keeps blood pH within its narrow normal range (about 7.35-7.45) using three lines of defence. First, chemical buffers (mainly the bicarbonate buffer system) act within seconds to mop up or release H+. Second, the respiratory system responds within minutes: a fall in pH stimulates the respiratory centre to increase the rate and depth of breathing, blowing off more CO2 and so reducing carbonic acid and raising pH (and slowing breathing does the opposite). Third, the kidneys provide slower, longer-term control by excreting H+ and reabsorbing bicarbonate. Together these keep blood pH stable."}], "digestionTables": [{"macronutrient": "Carbohydrate", "rows": [{"part": "Mouth", "mechanical": "Chewing (mastication) by the teeth breaks food into smaller pieces; the tongue mixes it with saliva to form a soft, moist ball (bolus).", "chemical": "Salivary amylase (ptyalin) in saliva begins breaking starch (polysaccharide) into shorter chains and the disaccharide maltose."}, {"part": "Stomach", "mechanical": "Churning by the muscular stomach wall mixes the bolus with gastric juice to form chyme.", "chemical": "None specific to carbohydrate. Salivary amylase keeps working briefly until the acidic gastric juice (HCl) stops it; the stomach makes no carbohydrate enzymes."}, {"part": "Duodenum", "mechanical": "Segmentation (and peristalsis) mixes chyme with pancreatic juice and bile; bile and bicarbonate neutralise the acid so enzymes can work.", "chemical": "Pancreatic amylase digests remaining starch into the disaccharide maltose."}, {"part": "Small intestine", "mechanical": "Segmentation continues mixing and contact with the villi; peristalsis moves contents along.", "chemical": "Brush-border (membrane) enzymes finish digestion: maltase splits maltose, sucrase splits sucrose,
