 lactase splits lactose, giving the monosaccharides glucose, fructose and galactose, which are absorbed through the villi."}]}, {"macronutrient": "Lipid", "rows": [{"part": "Mouth", "mechanical": "Chewing breaks food up and mixes it with saliva to form a bolus, warming the fat slightly.", "chemical": "None of significance in a first-year context (lingual lipase is present but minimal in adults); essentially no fat digestion occurs in the mouth."}, {"part": "Stomach", "mechanical": "Churning physically breaks large fat globules into smaller droplets and mixes them into chyme.", "chemical": "Very little; gastric (and minor lingual) lipase begins limited fat breakdown, but most fat digestion has not yet started."}, {"part": "Duodenum", "mechanical": "Bile salts (from the liver, stored in the gallbladder) emulsify fat, breaking large fat droplets into many tiny droplets to give a larger surface area; segmentation keeps mixing.", "chemical": "Pancreatic lipase digests emulsified triglycerides (fats) into fatty acids and monoglycerides (and glycerol)."}, {"part": "Small intestine", "mechanical": "Continued mixing keeps bile salts in contact with fat; fatty acids and monoglycerides cluster with bile salts into micelles that carry them to the villi.", "chemical": "Digestion is essentially complete; fatty acids and monoglycerides are absorbed into the villi, reassembled into triglycerides, and enter the lacteals (lymph) as chylomicrons."}]}, {"macronutrient": "Protein", "rows": [{"part": "Mouth", "mechanical": "Chewing breaks food into smaller pieces and the tongue mixes it with saliva to form a bolus.", "chemical": "None; there are no protein-digesting enzymes in saliva."}, {"part": "Stomach", "mechanical": "Churning by the stomach muscle mixes the bolus with gastric juice to form chyme.", "chemical": "Hydrochloric acid (HCl) denatures protein and converts pepsinogen into active pepsin; pepsin breaks proteins into shorter chains (polypeptides/peptides)."}, {"part": "Duodenum", "mechanical": "Segmentation mixes chyme with pancreatic juice; bicarbonate in pancreatic juice neutralises the acid so pancreatic enzymes can work.", "chemical": "Pancreatic proteases trypsin and chymotrypsin break polypeptides into shorter peptides; carboxypeptidase removes amino acids from the ends."}, {"part": "Small intestine", "mechanical": "Segmentation continues mixing and bringing peptides into contact with the villi; peristalsis moves contents along.", "chemical": "Brush-border peptidases (e.g. dipeptidases and aminopeptidases) split the remaining peptides into individual amino acids, which are absorbed through the villi into the blood."}]}], "metabolism": [{"macronutrient": "Carbohydrate", "marks": 5, "answer": "Carbohydrates are broken down to glucose, the body's main fuel. (1) Glucose first undergoes GLYCOLYSIS in the cytoplasm, splitting into two molecules of pyruvate and producing a small amount of ATP without needing oxygen. (2) When oxygen IS available (aerobic), pyruvate enters the mitochondria, is converted to acetyl-CoA, and is fed into the KREBS (citric acid) CYCLE, which passes high-energy electrons to the ELECTRON TRANSPORT CHAIN to generate the bulk of the ATP (roughly 36-38 ATP per glucose overall). (3) When oxygen is scarce (anaerobic, e.g. hard exercise), pyruvate is converted to LACTATE so glycolysis can keep making a little ATP. (4) Hormonal control: after a meal (absorptive state) INSULIN lowers blood glucose by driving glucose into cells and storing the excess as glycogen (GLYCOGENESIS) in liver and muscle; between meals (post-absorptive) GLUCAGON raises blood glucose by breaking glycogen back to glucose (GLYCOGENOLYSIS). (5) Overall this involves both catabolism (breaking glucose down to release energy) and anabolism (building glycogen stores), keeping blood glucose stable and supplying ATP for cell work."}, {"macronutrient": "Lipid", "marks": 5, "answer": "Fats (triglycerides) are an energy-dense store, mainly in adipose tissue. (1) When energy is needed (post-absorptive/fasting state, driven by glucagon and adrenaline), triglycerides are broken down by LIPOLYSIS into one GLYCEROL and three FATTY ACIDS, which are released into the blood. This is a catabolic process. (2) The fatty acids are taken up by cells and undergo BETA-OXIDATION in the mitochondria, where they are chopped into many molecules of ACETYL-CoA. (3) That acetyl-CoA enters the KREBS (citric acid) CYCLE and electron transport chain to produce large amounts of ATP, which is why fat yields more energy per gram than carbohydrate or protein. (4) The glycerol portion can be converted to glucose by the liver (gluconeogenesis). (5) When glucose is very scarce (e.g. starvation or uncontrolled diabetes), the liver converts surplus acetyl-CoA into KETONE BODIES, an alternative fuel for the brain and muscles; excess ketones are acidic and can lower blood pH (contributing to metabolic acidosis/ketoacidosis). After a meal (absorptive state, insulin) the reverse anabolic process occurs, storing excess energy as triglycerides."}, {"macronutrient": "Protein", "marks": 5, "answer": "Dietary protein is digested into AMINO ACIDS, which are absorbed and used mainly for building rather than fuel. (1) Their first priority is ANABOLISM: amino acids are reassembled into the body's own proteins (e.g. enzymes, muscle, antibodies, hormones) and for tissue growth and repair. (2) The body cannot store spare amino acids, so any excess (or amino acids needed for energy when carbohydrate and fat are low) are broken down by catabolism. (3) This begins with DEAMINATION in the LIVER, which removes the nitrogen-containing amino group and produces toxic AMMONIA. (4) The liver converts the ammonia into UREA, a safer waste product that travels in the blood to the KIDNEYS to be excreted in urine. (5) The remaining CARBON SKELETON (keto acid) is then used for energy: it can enter the Krebs cycle/be oxidised to make ATP, be converted to glucose by GLUCONEOGENESIS, or be stored as fat. So protein metabolism balances anabolism (rebuilding body proteins) and catabolism (deamination plus safe disposal of nitrogen as urea)."}]}, "notes": [{"topic": "Protein Synthesis", "sections": [{"heading": "DNA Structure (high-yield MCQ)", "points": ["DNA = deoxyribonucleic acid; stores the genetic code (instructions to build proteins).", "Double helix: two strands twisted like a spiral ladder.", "Nucleotide = building block = phosphate + deoxyribose (5-carbon sugar) + nitrogenous base.", "4 bases: Adenine (A), Thymine (T), Cytosine (C), Guanine (G).", "Base pairing rule: A-T and C-G (held by hydrogen bonds). EXAM CATCH: in DNA, A pairs with T (NOT uracil).", "Strands are antiparallel and complementary (one strand templates the other).", "Found in the nucleus (also small amount in mitochondria); too big to leave the nucleus.", "A gene = a segment of DNA coding for one protein/polypeptide."], "shortAnswerLikely": false}, {"heading": "RNA Structure & DNA vs RNA (high-yield MCQ)", "points": ["RNA = ribonucleic acid; carries/uses the DNA code to make protein.", "RNA is single-stranded (DNA is double-stranded).", "RNA sugar = ribose (DNA sugar = deoxyribose).", "RNA bases: A, U, C, G. EXAM CATCH: RNA uses Uracil (U) INSTEAD of Thymine (T).", "RNA base pairing with DNA: A-U, T-A, C-G, G-C.", "3 types: mRNA (messenger - carries code from nucleus), tRNA (transfer - brings amino acids), rRNA (ribosomal - makes up the ribosome).", "Quick contrast: DNA = double / deoxyribose / A-T-C-G / stays in nucleus; RNA = single / ribose / A-U-C-G / can leave nucleus."], "shortAnswerLikely": false}, {"heading": "Transcription (DNA to mRNA, in the nucleus)", "points": ["Definition: copying a gene's DNA code into a strand of mRNA.", "Location: NUCLEUS.", "Enzyme: RNA polymerase.", "Steps: DNA unzips/unwinds -> RNA polymerase reads the template strand -> builds complementary mRNA (using U instead of T).", "mRNA then leaves the nucleus through a nuclear pore and travels to a ribosome.", "EXAM CATCH: transcription happens in the nucleus; translation happens at the ribosome - don't mix them up."], "shortAnswerLikely": true}, {"heading": "Translation (mRNA to protein, at the ribosome)", "points": ["Definition: reading the mRNA code to assemble amino acids into a protein.", "Location: RIBOSOME (in cytoplasm or on rough endoplasmic reticulum).", "Codon = sequence of 3 bases on mRNA = codes for one amino acid.", "Anticodon = 3 bases on tRNA that pair with the codon (complementary).", "tRNA carries a specific amino acid to the ribosome and matches its anticodon to the mRNA codon.", "Amino acids join by peptide bonds to form a polypeptide chain = the protein.", "Start codon AUG begins the chain; stop codons end it.", "EXAM CATCH: codon = on mRNA, anticodon = on tRNA; they are complementary (e.g. codon AUG <-> anticodon UAC)."], "shortAnswerLikely": true}, {"heading": "Big Picture & Key Terms", "points": ["Flow of information: DNA -> mRNA (transcription) -> protein (translation).", "Amino acids = the building blocks (monomers) of proteins; ~20 different ones.", "Protein = chain of amino acids folded into a 3D shape; determines structure & function (enzymes, hormones, antibodies, muscle).", "The sequence of DNA bases determines the order of amino acids, which determines the protein.", "Why nurses care: a change in DNA (mutation) can change the protein -> genetic disease (e.g. faulty enzyme/structural protein)."], "shortAnswerLikely": false}], "flashcards": [{"front": "What does DNA stand for and what is its job?", "back": "Deoxyribonucleic acid; it stores the genetic code with instructions to make proteins."}, {"front": "Name the 4 DNA bases and how they pair.", "back": "Adenine, Thymine, Cytosine, Guanine. A pairs with T; C pairs with G."}, {"front": "Which base does RNA use instead of Thymine?", "back": "Uracil (U). So in RNA, A pairs with U."}, {"front": "Give 3 differences between DNA and RNA.", "back": "DNA: double-stranded, deoxyribose sugar, contains thymine. RNA: single-stranded, ribose sugar, contains uracil."}, {"front": "What are the 3 types of RNA and their roles?", "back": "mRNA carries the code from the nucleus; tRNA brings amino acids to the ribosome; rRNA makes up the ribosome."}, {"front": "What is transcription and where does it occur?", "back": "Copying a gene's DNA code into mRNA; it occurs in the nucleus. Enzyme: RNA polymerase."}, {"front": "What is translation and where does it occur?", "back": "Reading mRNA to assemble amino acids into a protein; it occurs at the ribosome."}, {"front": "What is a codon?", "back": "A sequence of 3 bases on mRNA that codes for one amino acid."}, {"front": "What is an anticodon and where is it found?", "back": "A sequence of 3 bases on tRNA that is complementary to (pairs with) the mRNA codon."}, {"front": "What molecule brings amino acids to the ribosome?", "back": "tRNA (transfer RNA), matching its anticodon to the mRNA codon."}, {"front": "What bond joins amino acids together in a protein?", "back": "A peptide bond, forming a polypeptide chain."}, {"front": "State the flow of genetic information.", "back": "DNA -> mRNA (transcription) -> protein (translation)."}, {"front": "What are the building blocks (monomers) of proteins?", "back": "Amino acids (about 20 different ones)."}, {"front": "What is the start codon for protein synthesis?", "back": "AUG (also codes for the amino acid methionine)."}]}, {"topic": "Nutrients", "sections": [{"heading": "Macronutrients: functions & examples (SHORT-ANSWER LIKELY)", "points": ["Macronutrients = needed in LARGE amounts; provide energy (kcal) + building blocks. The big 3: carbohydrates, lipids (fats), proteins. (Water sometimes included; provides no energy.)", "CARBOHYDRATES: main/preferred energy source. ~4 kcal/g. Broken to GLUCOSE; stored as GLYCOGEN (liver + muscle). Examples: bread, rice, pasta, potatoes, fruit, sugar.", "LIPIDS (FATS): most energy-dense at ~9 kcal/g. Energy store, insulation, cushion organs, make cell membranes (phospholipids), absorb fat-soluble vitamins (A,D,E,K), make steroid hormones. Examples: butter, oils, nuts, avocado, fatty meat.", "PROTEINS: ~4 kcal/g but PRIMARY ROLE is structure/function, NOT energy. Build & repair tissue, enzymes, antibodies, some hormones, transport (haemoglobin). Made of AMINO ACIDS. Examples: meat, fish, eggs, dairy, legumes.", "Catch: protein is used for energy only when carbs/fats are insufficient (e.g. starvation) - leads to muscle breakdown.", "Catch: fat = 9 kcal/g (more than double carbs/protein) - common exam number to remember.", "WATER (a macronutrient by amount): solvent, transport, temperature regulation, chemical reactions - but 0 kcal."], "shortAnswerLikely": true}, {"heading": "Micronutrients: vitamins & minerals (SHORT-ANSWER LIKELY)", "points": ["Micronutrients = needed in SMALL amounts; provide NO energy but are essential for metabolism, growth, repair.", "VITAMINS - organic; FAT-SOLUBLE = A, D, E, K (stored in body fat/liver, can build up to toxic levels). WATER-SOLUBLE = B-complex + C (not stored well, excreted in urine, need regular intake).", "Vitamin examples: Vit C = collagen/wound healing & immunity; Vit D = calcium absorption & bone; Vit K = blood clotting; B vitamins = energy metabolism (coenzymes); Vit A = vision.", "MINERALS - inorganic. Calcium = bones/teeth, muscle contraction, clotting; Iron = haemoglobin/oxygen transport; Sodium & Potassium = fluid balance & nerve/muscle (action potentials); Iodine = thyroid hormones.", "Catch: vitamins are ORGANIC, minerals are INORGANIC.", "Catch: fat-soluble vitamins (A,D,E,K) CAN be stored and cause toxicity; water-soluble generally cannot.", "Many vitamins/minerals act as COENZYMES/COFACTORS - they help enzymes work."], "shortAnswerLikely": true}, {"heading": "How enzymes function", "points": ["Enzymes = biological CATALYSTS (mostly proteins) that SPEED UP reactions by LOWERING activation energy. NOT used up - reusable.", "Each enzyme is SPECIFIC to one substrate - lock-and-key / induced-fit model. Substrate binds the ACTIVE SITE.", "Names usually end in '-ase' and hint at the substrate: amylase (starch), lipase (lipids/fat), protease/peptidase (protein), sucrase (sucrose), lactase (lactose).", "Affected by TEMPERATURE and pH - each has an optimum. Body optimum ~37 C and tissue-specific pH.", "DENATURATION = enzyme loses 3D shape (active site distorted) from excess heat or wrong pH -> stops working (often irreversible).", "pH catch: salivary amylase works in mouth (neutral) but is destroyed by acidic stomach; pepsin (stomach protease) needs acidic pH ~2; pancreatic enzymes need alkaline small intestine.", "Many enzymes need a COFACTOR (mineral) or COENZYME (often vitamin-derived) to function."], "shortAnswerLikely": false}, {"heading": "Regulation of food intake: hunger & satiety", "points": ["Control centre = the HYPOTHALAMUS in the brain. Balances hunger (drive to eat) vs satiety (feeling full).", "GHRELIN = 'hunger hormone'. Made by the STOMACH. RISES when empty -> stimulates hypothalamus -> makes you hungry. (Ghrelin = Growling/Greedy.)", "LEPTIN = 'satiety hormone'. Made by ADIPOSE (fat) tissue. Signals fullness & long-term energy stores -> suppresses appetite. More fat = more leptin.", "Short-term cues: stomach stretch/distension, blood glucose levels (low glucose -> hunger), gut hormones (e.g. CCK from small intestine -> satiety after a meal).", "Catch: GHRELIN = hunger (Goes up when empty); LEPTIN = full (Lessens appetite). Don't mix them up.", "Leptin resistance: in obesity the brain stops responding to leptin, so satiety signal is blunted.", "Negative feedback loop: eating -> stretch + leptin + CCK + rising glucose -> hypothalamus signals satiety -> stop eating."], "shortAnswerLikely": true}, {"heading": "Absorptive vs post-absorptive states", "points": ["ABSORPTIVE (FED) state: during & ~4 hrs after a meal; nutrients being absorbed from gut into blood. Dominant hormone = INSULIN (from pancreatic beta cells).", "Absorptive = ANABOLIC/STORAGE: glucose used for energy + excess stored as GLYCOGEN (glycogenesis) and as FAT (lipogenesis); amino acids -> protein. Blood glucose LOWERED.", "POST-ABSORPTIVE (FASTING) state: between meals / overnight; gut empty, body draws on stores to keep blood glucose stable. Dominant hormone = GLUCAGON (from pancreatic alpha cells).", "Post-absorptive = CATABOLIC/BREAKDOWN: glycogen -> glucose (glycogenolysis), new glucose made from non-carbs (gluconeogenesis), fat broken down (lipolysis). Blood glucose RAISED/maintained.", "Key goal of post-absorptive state = keep BLOOD GLUCOSE NORMAL, especially for the BRAIN (relies on glucose).", "Catch: Insulin = absorptive/fed (stores fuel, lowers glucose). Glucagon = post-absorptive/fasting (releases fuel, raises glucose). Insulin and glucagon are antagonists.", "Catch terms: glycogenESIS = make glycogen (fed); glycogenOLYSIS = break glycogen (fasting); gluconeoGENESIS = make NEW glucose from non-carbs (fasting)."], "shortAnswerLikely": true}, {"heading": "Interpreting food labels", "points": ["NZ/Australia use the NUTRITION INFORMATION PANEL (NIP) - shows energy & nutrients PER SERVE and PER 100g.", "Use PER 100g column to COMPARE products fairly (serving sizes differ between brands).", "Energy is given in KILOJOULES (kJ) in NZ (sometimes kcal). 1 kcal = ~4.2 kJ. Average adult ~8700 kJ/day reference.", "Lists: total fat (and saturated fat), carbohydrate (and sugars), protein, sodium (salt), sometimes fibre.", "INGREDIENTS listed in DESCENDING order by weight - first ingredient = most. If sugar/fat is near the top = high in it.", "Quick guide (per 100g): LOW sugar <=5g, HIGH sugar >=15g; LOW fat <=3g, HIGH fat >=17.5g; LOW salt/sodium <=120mg, HIGH >=600mg.", "Catch: '%DI' = percent Daily Intake (per serve, based on average 8700 kJ diet) - not the same as per 100g.", "Catch: 'sugars' is a sub-set already INCLUDED within total carbohydrate; saturated fat is included within total fat (don't double count)."], "shortAnswerLikely": false}], "flashcards": [{"front": "Name the 3 main macronutrients and their energy value (kcal/g).", "back": "Carbohydrate ~4 kcal/g, Protein ~4 kcal/g, Fat (lipid) ~9 kcal/g."}, {"front": "Which macronutrient is the body's preferred energy source, and what is its storage form?", "back": "Carbohydrate (broken down to glucose); stored as glycogen in liver and muscle."}, {"front": "Primary role of protein (and its building block)?", "back": "Build & repair tissue, make enzymes/antibodies/some hormones - NOT mainly energy. Building block = amino acids."}, {"front": "Difference between vitamins and minerals?", "back": "Vitamins are ORGANIC; minerals are INORGANIC. Both are micronutrients needed in small amounts and provide no energy."}, {"front": "Which vitamins are fat-soluble, and why does it matter?", "back": "A, D, E, K. They are stored in fat/liver and can build up to TOXIC levels (water-soluble B & C are excreted, not stored)."}, {"front": "What is an enzyme and how does it speed up reactions?", "back": "A biological catalyst (usually a protein) that LOWERS activation energy. It is specific (active site/lock-and-key) and is not used up."}, {"front": "What is denaturation of an enzyme?", "back": "Loss of the enzyme's 3D shape (active site distorted) due to excessive heat or wrong pH, so it can no longer work."}, {"front": "Match the enzyme to its substrate: amylase, lipase, protease.", "back": "Amylase -> starch/carbs; Lipase -> lipids/fat; Protease -> protein."}, {"front": "Which brain region regulates food intake, and which hormone does the stomach release to signal hunger?", "back": "Hypothalamus controls intake. The stomach releases GHRELIN ('hunger hormone'), which rises when empty."}, {"front": "What is leptin, where is it made, and what does it do?", "back": "Leptin = satiety hormone made by ADIPOSE (fat) tissue; it suppresses appetite/signals fullness. More fat = more leptin."}, {"front": "Absorptive (fed) state: dominant hormone and what happens to nutrients?", "back": "INSULIN dominates. Anabolic/storage: glucose used + stored as glycogen and fat; amino acids -> protein. Blood glucose lowered."}, {"front": "Post-absorptive (fasting) state: dominant hormone and main goal?", "back": "GLUCAGON dominates. Catabolic: glycogenolysis, gluconeogenesis, lipolysis. Goal = keep blood glucose normal (for the brain)."}, {"front": "Define glycogenesis, glycogenolysis, and gluconeogenesis.", "back": "Glycogenesis = make glycogen (fed). Glycogenolysis = break glycogen into glucose (fasting). Gluconeogenesis = make NEW glucose from non-carbs (fasting)."}, {"front": "On a food label, why use the 'per 100g' column?", "back": "It lets you fairly COMPARE products because serving sizes vary between brands."}, {"front": "In what order are ingredients listed on a food label?", "back": "Descending order by weight - the first ingredient is present in the largest amount."}]}, {"topic": "Metabolism", "sections": [{"heading": "Big Picture: Anabolism vs Catabolism", "points": ["Metabolism = ALL chemical reactions in the body = catabolism + anabolism.", "CATABOLISM = breaking large molecules into small ones; RELEASES energy (exergonic); examples: digestion, glycolysis, cellular respiration.", "ANABOLISM = building large molecules from small ones; REQUIRES energy (endergonic); examples: protein synthesis, glycogenesis, lipogenesis.", "Memory hook: Catabolism = Cut/Crush (releases ATP); Anabolism = Assemble/Add (uses ATP).", "ATP is the energy currency: catabolism makes ATP, anabolism spends ATP.", "Synthesis reaction = small + small to big (A + B to AB) = anabolic; often dehydration/condensation (water removed).", "Decomposition reaction = big to small (AB to A + B) = catabolic; often hydrolysis (water added to split bond).", "Exam catch: 'Synthesis = anabolic, Decomposition = catabolic.' Hydrolysis (water in) breaks bonds; dehydration synthesis (water out) makes bonds."], "shortAnswerLikely": false}, {"heading": "Carbohydrate Metabolism [SAQ]", "points": ["Carbs broken to GLUCOSE = body's preferred/primary fuel; brain & RBCs rely heavily on it.", "Glucose oxidation to make ATP happens in 3 stages: 1) GLYCOLYSIS (cytoplasm, anaerobic, glucose to 2 pyruvate, small net ATP), 2) KREBS/CITRIC ACID CYCLE (mitochondria), 3) ELECTRON TRANSPORT CHAIN (mitochondria, makes most ATP).", "Overall: C6H12O6 + O2 to CO2 + H2O + ATP (aerobic cellular respiration).", "No oxygen (anaerobic): pyruvate to LACTIC ACID (lactate); gives quick ATP but causes acidosis/fatigue.", "GLYCOGENESIS = glucose stored as GLYCOGEN (liver & muscle); anabolic; driven by INSULIN when blood glucose HIGH.", "GLYCOGENOLYSIS = glycogen broken back to glucose; catabolic; driven by GLUCAGON (and adrenaline) when blood glucose LOW.", "GLUCONEOGENESIS = making NEW glucose from non-carbs (amino acids, glycerol, lactate); occurs in liver when carbs/glycogen run low.", "Key hormones: INSULIN lowers blood glucose (storage); GLUCAGON raises blood glucose (release).", "Exam catch: do NOT confuse glycogenESIS (make glycogen) with glycogenOLYSIS (split glycogen) with gluconeoGENESIS (make new glucose from non-carbs)."], "shortAnswerLikely": true}, {"heading": "Lipid Metabolism [SAQ]", "points": ["Triglycerides = 1 glycerol + 3 fatty acids; main stored energy form (adipose tissue), yields MOST energy per gram (~9 kcal/g vs 4 for carbs/protein).", "LIPOLYSIS = breakdown of triglycerides to glycerol + fatty acids (catabolic); stimulated when glucose is low.", "BETA-OXIDATION = fatty acids broken into 2-carbon units (acetyl-CoA) in mitochondria; acetyl-CoA enters Krebs cycle to make ATP.", "Glycerol can be converted to glucose (feeds gluconeogenesis); fatty acids generally cannot become glucose.", "LIPOGENESIS = synthesis/storage of triglycerides from excess glucose & amino acids (anabolic); promoted by INSULIN.", "KETONE BODIES (ketogenesis): when carbs scarce (fasting, starvation, untreated diabetes), liver converts excess acetyl-CoA to ketones for fuel; excess ketones are ACIDIC to ketoacidosis (e.g. DKA).", "Cholesterol transported by lipoproteins: LDL ('bad', deposits in vessels), HDL ('good', removes cholesterol).", "Exam catch: lipids give the most ATP per gram, but fat metabolism without enough carbs to ketosis/ketoacidosis ('fats burn in a carbohydrate flame')."], "shortAnswerLikely": true}, {"heading": "Protein Metabolism [SAQ]", "points": ["Proteins to AMINO ACIDS (20 types; 9 essential = must come from diet).", "Primary roles: building/repair (structure, enzymes, hormones, antibodies); used for energy ONLY as a last resort.", "Amino acids are NOT stored; excess is broken down, not kept as protein.", "DEAMINATION = removal of the amino (NH2) group from amino acids (occurs in liver) so the carbon skeleton can be used for energy or converted to glucose/fat.", "Removing NH2 produces AMMONIA (NH3) = toxic; liver converts ammonia to UREA, excreted by kidneys in urine.", "Deaminated carbon skeletons can enter Krebs cycle, become glucose (gluconeogenesis) or fat.", "PROTEIN SYNTHESIS (anabolic) builds new proteins from amino acids (transcription + translation).", "NITROGEN BALANCE: positive = building (growth, healing, pregnancy); negative = breakdown exceeds intake (starvation, illness, burns).", "Exam catch: deamination removes the nitrogen group, makes toxic ammonia, liver to urea, kidneys excrete. This links protein metabolism to liver and kidney function."], "shortAnswerLikely": true}, {"heading": "Acids from Metabolism & pH Regulation [SAQ]", "points": ["Metabolism constantly produces acids: CO2 (to carbonic acid), lactic acid (anaerobic respiration), ketoacids (fat breakdown), and other metabolic acids.", "CO2 + H2O to (carbonic anhydrase) H2CO3 (carbonic acid) to H+ + HCO3- (bicarbonate) = the key carbonic acid-bicarbonate buffer equation.", "Normal arterial blood pH = 7.35-7.45 (slightly alkaline); must be kept narrow or enzymes fail.", "THREE defences (fast to slow): 1) BUFFERS (seconds), 2) RESPIRATORY (minutes), 3) RENAL/kidneys (hours-days).", "BUFFERS = chemicals that soak up or release H+ to resist pH change; main one is the BICARBONATE buffer system (others: phosphate, protein, haemoglobin).", "RESPIRATORY response: lungs adjust CO2. More CO2 = more acid (lower pH). If blood too acidic to BREATHE FASTER/DEEPER (hyperventilate) to blow off CO2 and raise pH. If too alkaline to breathe slower to retain CO2.", "RENAL response (slowest, most powerful): kidneys excrete H+ and reabsorb/generate HCO3-.", "Acidosis = pH below 7.35; Alkalosis = pH above 7.45.", "Exam catch: know the CO2 + H2O equation BOTH ways and that the LUNGS control CO2 (fast) while KIDNEYS control bicarbonate/H+ (slow but strongest)."], "shortAnswerLikely": true}, {"heading": "Quick Definitions to Nail", "points": ["Metabolic rate / BMR = energy used at rest to keep body alive.", "Glycolysis: glucose to pyruvate, in cytoplasm, anaerobic first step.", "Krebs cycle & ETC: mitochondria, aerobic, make most ATP.", "Oxidation = losing electrons/adding oxygen (how fuel is 'burned' for ATP).", "Acetyl-CoA = central hub molecule; carbs, fats and proteins all funnel into it to enter Krebs cycle.", "Liver = central metabolic organ (glycogen storage, gluconeogenesis, deamination, urea, ketones, cholesterol)."], "shortAnswerLikely": false}], "flashcards": [{"front": "Anabolism vs catabolism (define + energy)?", "back": "Anabolism = building big molecules from small, USES energy (endergonic), e.g. protein synthesis. Catabolism = breaking big into small, RELEASES energy (exergonic), e.g. digestion/glycolysis."}, {"front": "Synthesis vs decomposition reaction?", "back": "Synthesis = small + small to big (A+B to AB), anabolic, dehydration (water out). Decomposition = big to small (AB to A+B), catabolic, hydrolysis (water in)."}, {"front": "The 3 stages of glucose oxidation and where they occur?", "back": "1) Glycolysis (cytoplasm, anaerobic, glucose to pyruvate). 2) Krebs/citric acid cycle (mitochondria). 3) Electron transport chain (mitochondria, makes most ATP)."}, {"front": "Glycogenesis vs glycogenolysis vs gluconeogenesis?", "back": "Glycogenesis = make glycogen from glucose (store, insulin). Glycogenolysis = break glycogen to glucose (glucagon). Gluconeogenesis = make NEW glucose from non-carbs (amino acids, glycerol, lactate)."}, {"front": "Insulin vs glucagon on blood glucose?", "back": "Insulin LOWERS blood glucose (promotes storage: glycogenesis, lipogenesis). Glucagon RAISES blood glucose (promotes release: glycogenolysis, gluconeogenesis)."}, {"front": "What happens to pyruvate without oxygen?", "back": "Anaerobic respiration converts pyruvate to LACTIC ACID (lactate); fast ATP but causes acidosis and muscle fatigue."}, {"front": "What is beta-oxidation?", "back": "Breakdown of fatty acids into 2-carbon acetyl-CoA units in the mitochondria; acetyl-CoA enters the Krebs cycle to make ATP."}, {"front": "Why does fat breakdown without carbs cause acidosis?", "back": "Excess acetyl-CoA is converted by the liver to KETONE BODIES, which are acidic; build-up causes ketoacidosis (e.g. DKA in untreated diabetes)."}, {"front": "What is deamination and what does it produce?", "back": "Removal of the amino (NH2) group from amino acids in the liver. Produces toxic AMMONIA, which the liver converts to UREA for excretion by the kidneys."}, {"front": "When is protein used for energy?", "back": "Only as a LAST resort (starvation/severe illness) after carbs and fats; amino acids must first be deaminated. Protein's main job is building/repair."}, {"front": "Write the carbonic acid-bicarbonate buffer equation.", "back": "CO2 + H2O to H2CO3 to H+ + HCO3- (carbonic anhydrase speeds the first step). Reversible; shifts to control pH."}, {"front": "Normal blood pH and the 3 lines of pH defence?", "back": "pH 7.35-7.45. 1) Buffers (seconds, e.g. bicarbonate). 2) Respiratory/lungs (minutes, adjust CO2). 3) Renal/kidneys (hours-days, excrete H+, reabsorb HCO3-)."}, {"front": "How do the lungs correct acidosis?", "back": "Hyperventilate (breathe faster/deeper) to blow off CO2, lowering carbonic acid and RAISING pH. (Too alkaline = breathe slower to retain CO2.)"}, {"front": "Which molecule do carbs, fats and proteins all funnel into for the Krebs cycle?", "back": "Acetyl-CoA (the central metabolic hub)."}, {"front": "Acidosis vs alkalosis values?", "back": "Acidosis = blood pH below 7.35. Alkalosis = blood pH above 7.45."}]}, {"topic": "Digestive System", "sections": [{"heading": "Overview & 3 Big Jobs", "points": ["Digestion = breaking food into small absorbable units; Absorption = moving those units into blood/lymph; Egestion (defecation) = eliminating undigested waste as faeces.", "GI tract (alimentary canal) = continuous tube mouth -> oesophagus -> stomach -> small intestine -> large intestine -> anus (about 9 m long).", "Accessory organs (NOT part of tube, food never passes through): salivary glands, pancreas, liver, gall bladder. They add secretions into the tube.", "Two types of digestion: MECHANICAL (physical breakdown, no bonds broken) and CHEMICAL (enzymes break chemical bonds).", "Catch: teeth/tongue/stomach churning = mechanical; enzymes/acid/bile = chemical."], "shortAnswerLikely": false}, {"heading": "6 Processes of Digestion", "points": ["1. Ingestion = taking food into the mouth.", "2. Propulsion = moving food along: includes swallowing (deglutition) + PERISTALSIS (waves of smooth muscle contraction pushing food onward).", "3. Mechanical digestion = chewing (mastication), tongue mixing, stomach churning, segmentation in small intestine (mixing, not propelling).", "4. Chemical digestion = enzymes break large molecules into monomers.", "5. Absorption = end products move from gut lumen into blood/lymph (mainly small intestine).", "6. Defecation = elimination of indigestible residue (faeces).", "Catch: segmentation mixes; peristalsis propels."], "shortAnswerLikely": true}, {"heading": "Functional Anatomy: Mouth -> Anus", "points": ["MOUTH (oral cavity): teeth (mechanical), tongue (mixing, taste, swallowing), saliva starts carb digestion.", "PHARYNX & OESOPHAGUS: muscular tube; peristalsis moves bolus to stomach; no digestion, just transport.", "STOMACH: J-shaped; stores food, churns it, secretes gastric juice; converts bolus to CHYME; rugae = folds allowing expansion.", "SMALL INTESTINE (duodenum -> jejunum -> ileum): main site of chemical digestion AND absorption; receives bile + pancreatic juice in duodenum.", "LARGE INTESTINE (caecum, colon, rectum, anal canal): absorbs water & electrolytes, forms/stores faeces; houses gut bacteria (make some vitamin K & B).", "Sphincters to know: cardiac/lower oesophageal (stomach entry), pyloric (stomach -> duodenum), ileocaecal valve (small -> large), internal & external anal sphincters."], "shortAnswerLikely": false}, {"heading": "Accessory Organs", "points": ["SALIVARY GLANDS (parotid, submandibular, sublingual): make saliva, secreted into mouth.", "PANCREAS: makes pancreatic juice (enzymes + bicarbonate), secreted into duodenum; also endocrine (insulin/glucagon).", "LIVER: makes BILE continuously; many metabolic roles (processes absorbed nutrients).", "GALL BLADDER: STORES and CONCENTRATES bile, then releases it into the duodenum when fatty food arrives.", "Catch: liver MAKES bile, gall bladder STORES it."], "shortAnswerLikely": false}, {"heading": "Digestive Juices: Composition & Function", "points": ["SALIVA: water, mucus, salivary amylase (ptyalin), lysozyme, bicarbonate. Functions: moistens food, begins STARCH digestion, lubricates for swallowing, antibacterial (lysozyme), keeps mouth clean.", "GASTRIC JUICE: HCl, pepsinogen->pepsin, mucus, intrinsic factor. Functions: HCl kills microbes + activates pepsin + denatures protein; pepsin digests PROTEIN; intrinsic factor needed to absorb vitamin B12.", "PANCREATIC JUICE: bicarbonate (neutralises acid chyme) + enzymes (pancreatic amylase = carbs, lipase = fats, trypsin/proteases = proteins, nucleases). Alkaline; secreted into duodenum.", "BILE: bile salts, bile pigments (bilirubin), cholesterol; NO enzymes. Function: EMULSIFIES fats (breaks big fat globs into tiny droplets = bigger surface area for lipase). Also excretes bilirubin (from old RBC breakdown).", "Catch: bile contains NO enzymes and does NOT chemically digest fat; it emulsifies (mechanical-style) so lipase can work."], "shortAnswerLikely": true}, {"heading": "Protection of Gastric Mucosa (Mucosal Barrier)", "points": ["Stomach lining must survive HCl (about pH 2) and pepsin without digesting itself.", "1. Thick alkaline MUCUS layer coats and protects epithelium.", "2. Bicarbonate trapped in mucus neutralises acid at the surface.", "3. Tight junctions between epithelial cells stop acid leaking between cells.", "4. Rapid replacement of epithelial cells (shed & replaced every few days).", "5. Pepsin secreted as inactive PEPSINOGEN, only activated by HCl in lumen (not inside the cell).", "Catch: break the barrier (e.g. H. pylori, NSAIDs) -> peptic ulcer."], "shortAnswerLikely": true}, {"heading": "Clinical Terms", "points": ["ENTERITIS = inflammation of the intestine (esp. small intestine); often infection; causes diarrhoea, cramps.", "GASTROENTERITIS = inflammation of stomach + intestine (vomiting + diarrhoea).", "PEPTIC ULCER = erosion/break in the mucosa of stomach (gastric ulcer) or duodenum (duodenal ulcer) exposed to acid/pepsin.", "Main causes of peptic ulcers: Helicobacter pylori infection and NSAID use (both damage the protective mucosal barrier).", "Catch: ulcer = barrier failure, NOT just too much acid."], "shortAnswerLikely": false}, {"heading": "Mechanical Digestion [SAQ]", "points": ["Definition: physical breakdown of food into smaller pieces WITHOUT breaking chemical bonds; increases surface area for enzymes.", "MOUTH: mastication (chewing by teeth) + tongue mixing food with saliva into a bolus.", "STOMACH: churning by smooth muscle mixes bolus with gastric juice -> chyme.", "SMALL INTESTINE: SEGMENTATION = rhythmic constrictions that mix chyme with digestive juices and increase contact with absorptive wall.", "Throughout tube: PERISTALSIS physically moves and mixes contents.", "Why it matters: more surface area = faster, more efficient chemical digestion."], "shortAnswerLikely": true}, {"heading": "Chemical Digestion by Nutrient [SAQ - name chemical / where made / where secreted / action]", "points": ["CARBOHYDRATES: Salivary amylase (made in salivary glands, secreted into mouth) starts starch -> maltose. Pancreatic amylase (made in pancreas, secreted into duodenum) continues starch -> maltose. Brush-border enzymes (made & act in small intestine lining): maltase, sucrase, lactase -> glucose/fructose/galactose (monosaccharides).", "PROTEINS: Pepsin (from pepsinogen, made in stomach, secreted into stomach, activated by HCl) breaks proteins -> peptides. Trypsin/proteases (made in pancreas, secreted into duodenum) -> smaller peptides. Peptidases (small intestine brush border) -> amino acids.", "LIPIDS: Bile (made in liver, stored in gall bladder, secreted into duodenum) EMULSIFIES fat (no chemical bonds broken). Lipase (made in pancreas, secreted into duodenum) breaks emulsified fats -> fatty acids + monoglycerides.", "End products: carbs -> monosaccharides; proteins -> amino acids; fats -> fatty acids + glycerol/monoglycerides; nucleic acids -> nucleotides.", "Catch: enzymes are SUBSTRATE-SPECIFIC (amylase only carbs, lipase only fats, protease only proteins). Catch: optimum pH differs - pepsin likes acid (stomach), pancreatic enzymes like alkaline (duodenum)."], "shortAnswerLikely": true}, {"heading": "Absorption Through Villi", "points": ["Main site = SMALL INTESTINE; wall adapted for huge surface area.", "Surface area boosters (in order, small->large): MICROVILLI (brush border on each cell) -> VILLI (finger-like projections) -> circular folds (plicae).", "Each villus contains: a capillary network (absorbs glucose & amino acids -> hepatic portal vein -> liver) and a LACTEAL (lymph capillary, absorbs fatty acids/fats as chylomicrons -> lymph).", "Glucose & amino acids = water-soluble -> blood capillaries -> liver. Fats = into lacteal (lymph) first, then into bloodstream.", "Thin (single-cell) epithelium = short diffusion distance; rich blood supply keeps concentration gradient steep.", "Catch: water-soluble nutrients go to BLOOD; fats go to LYMPH (lacteal). Most water is absorbed in small intestine; remaining water in large intestine."], "shortAnswerLikely": true}, {"heading": "Physiology of Defecation", "points": ["Faeces = undigested food, water, bacteria, dead cells; stored in rectum.", "Stretch of rectal wall triggers the DEFECATION REFLEX (spinal reflex).", "Internal anal sphincter = SMOOTH muscle, INVOLUNTARY (relaxes via reflex).", "External anal sphincter = SKELETAL muscle, VOLUNTARY (we choose to relax it).", "Valsalva manoeuvre: contracting abdominal muscles + diaphragm raises intra-abdominal pressure to aid expulsion.", "Mass movements (in colon) push faeces toward rectum, often after meals (gastrocolic reflex).", "Catch: internal sphincter = involuntary/smooth; external = voluntary/skeletal."], "shortAnswerLikely": false}], "flashcards": [{"front": "Name the 6 processes of digestion.", "back": "Ingestion, propulsion, mechanical digestion, chemical digestion, absorption, defecation."}, {"front": "Difference between mechanical and chemical digestion?", "back": "Mechanical = physical breakdown (chewing, churning, segmentation), no bonds broken, increases surface area. Chemical = enzymes break chemical bonds into monomers."}, {"front": "Which 4 organs are accessory organs, and which makes vs stores bile?", "back": "Salivary glands, pancreas, liver, gall bladder. Liver MAKES bile; gall bladder STORES & concentrates it."}, {"front": "What enzyme is in saliva and what does it digest?", "back": "Salivary amylase (ptyalin) - begins digestion of starch (carbohydrate) into maltose."}, {"front": "Components of gastric juice and their jobs?", "back": "HCl (kills microbes, denatures protein, activates pepsin), pepsin (digests protein), mucus (protects lining), intrinsic factor (needed to absorb vitamin B12)."}, {"front": "What does bile do, and does it contain enzymes?", "back": "Bile EMULSIFIES fats (breaks large globules into small droplets = more surface area for lipase). It contains NO enzymes; made in liver, stored in gall bladder, secreted into duodenum."}, {"front": "What does pancreatic juice contain?", "back": "Bicarbonate (neutralises acidic chyme) plus enzymes: amylase (carbs), lipase (fats), trypsin/proteases (proteins), nucleases. Secreted into the duodenum."}, {"front": "Name 3 ways the gastric mucosa is protected from HCl.", "back": "Thick alkaline mucus layer; bicarbonate neutralising acid at the surface; tight junctions between cells; rapid cell replacement; pepsin secreted as inactive pepsinogen."}, {"front": "Define enteritis and peptic ulcer.", "back": "Enteritis = inflammation of the intestine. Peptic ulcer = a break/erosion in the mucosa of the stomach or duodenum exposed to acid/pepsin; usual causes H. pylori and NSAIDs."}, {"front": "Which enzyme digests protein in the stomach, and how is it activated?", "back": "Pepsin. Made and secreted as inactive pepsinogen, then activated by HCl in the stomach lumen."}, {"front": "Trace carbohydrate chemical digestion to its end product.", "back": "Starch -> (salivary amylase in mouth, pancreatic amylase in duodenum) -> maltose -> (brush-border maltase/sucrase/lactase) -> monosaccharides (glucose, fructose, galactose)."}, {"front": "What 3 features increase the small intestine's surface area for absorption?", "back": "Circular folds (plicae), villi (finger-like projections), and microvilli (brush border) on each epithelial cell."}, {"front": "What does each villus contain and which nutrients go where?", "back": "A blood capillary network (absorbs glucose & amino acids -> hepatic portal vein -> liver) and a lacteal/lymph capillary (absorbs fats -> lymph)."}, {"front": "Compare the internal and external anal sphincters.", "back": "Internal = smooth muscle, involuntary (controlled by defecation reflex). External = skeletal muscle, voluntary (consciously controlled)."}, {"front": "Peristalsis vs segmentation?", "back": "Peristalsis = waves of muscle contraction that PROPEL food along the tube. Segmentation = rhythmic constrictions that MIX chyme with juices and boost contact with the wall (no net propulsion)."}]}], "glossary": [{"term": "Absorption", "definition": "The passage of digested nutrients, water, and electrolytes from the gut lumen into the blood or lymph, occurring mainly across the small intestine wall.", "topic": "Digestive System"}, {"term": "Absorptive state", "definition": "The fed state after a meal when nutrients are being absorbed, glucose is the main fuel, and excess is stored under the influence of insulin.", "topic": "Metabolism"}, {"term": "Acetyl-CoA", "definition": "A key two-carbon molecule formed from carbohydrates, fats, and proteins that enters the Krebs cycle to be fully oxidised for energy.", "topic": "Metabolism"}, {"term": "Acid", "definition": "A substance that releases hydrogen ions (H+) in solution, lowering pH.", "topic": "Metabolism"}, {"term": "Acidosis", "definition": "A condition in which blood pH falls below the normal range (below 7.35), becoming too acidic.", "topic": "Metabolism"}, {"term": "Active site", "definition": "The specific region of an enzyme where the substrate binds and the chemical reaction takes place.", "topic": "Enzymes"}, {"term": "Active transport", "definition": "The movement of substances across a membrane against their concentration gradient (low to high) using energy from ATP and carrier proteins.", "topic": "General"}, {"term": "Adenine (A)", "definition": "A nitrogenous base found in DNA and RNA that pairs with thymine in DNA or with uracil in RNA.", "topic": "Protein Synthesis"}, {"term": "Aerobic", "definition": "A process or condition that requires oxygen; aerobic respiration yields large amounts of ATP.", "topic": "Metabolism"}, {"term": "Alkalosis", "definition": "A condition in which blood pH rises above the normal range (above 7.45), becoming too alkaline.", "topic": "Metabolism"}, {"term": "Amino acid", "definition": "The building block of proteins; about 20 different types are joined in a specific order to make each protein.", "topic": "Protein Synthesis"}, {"term": "Anabolism", "definition": "The constructive phase of metabolism in which small molecules are joined to build larger, more complex ones, requiring energy (ATP).", "topic": "Metabolism"}, {"term": "Anaemia", "definition": "A condition in which there are too few red blood cells or too little haemoglobin, reducing the blood's oxygen-carrying capacity and causing fatigue and pallor.", "topic": "Clinical"}, {"term": "Anaerobic", "definition": "A process or condition that does not require oxygen; anaerobic metabolism yields little ATP and produces lactic acid.", "topic": "Metabolism"}, {"term": "Anal sphincters", "definition": "The internal (involuntary smooth muscle) and external (voluntary skeletal muscle) rings that control the release of faeces during defecation.", "topic": "Digestive System"}, {"term": "Anticodon", "definition": "The sequence of three bases on a tRNA molecule that pairs with a complementary mRNA codon to deliver the correct amino acid.", "topic": "Protein Synthesis"}, {"term": "Antioxidant", "definition": "A substance (such as vitamin C or E) that protects cells by neutralising harmful free radicals.", "topic": "Nutrients"}, {"term": "Anus", "definition": "The external opening of the GI tract through which faeces are expelled, controlled by the anal sphincters.", "topic": "Digestive System"}, {"term": "Appendix (vermiform appendix)", "definition": "A small blind-ended tube attached to the caecum, containing lymphoid tissue, that can become inflamed (appendicitis).", "topic": "Digestive System"}, {"term": "ATP (adenosine triphosphate)", "definition": "The cell's main energy-carrying molecule, releasing usable energy when its terminal phosphate bond is broken to form ADP.", "topic": "Metabolism"}, {"term": "Basal metabolic rate (BMR)", "definition": "The energy the body uses at complete rest to maintain basic life functions such as breathing, circulation, and temperature.", "topic": "Metabolism"}, {"term": "Base (alkali)", "definition": "A substance that accepts hydrogen ions (H+) or releases hydroxide ions (OH-), raising pH.", "topic": "Metabolism"}, {"term": "Base pair", "definition": "Two nitrogenous bases held together by hydrogen bonds across the two strands of DNA, such as A with T and C with G.", "topic": "Protein Synthesis"}, {"term": "Beta-oxidation", "definition": "The breakdown of fatty acids into acetyl-CoA units within mitochondria so they can enter the Krebs cycle for ATP production.", "topic": "Metabolism"}, {"term": "Bicarbonate", "definition": "The alkaline ion (HCO3-) that acts as a base in the bicarbonate buffer system to neutralise excess acid in blood, and is secreted in pancreatic juice and bile to neutralise acidic chyme in the small intestine.", "topic": "Metabolism"}, {"term": "Bicarbonate buffer system", "definition": "The body's main extracellular buffer, in which carbonic acid and bicarbonate (HCO3-) interconvert to keep blood pH within its normal range.", "topic": "Metabolism"}, {"term": "Bile", "definition": "A greenish fluid produced by the liver and stored in the gallbladder that emulsifies fats into smaller droplets so enzymes can digest and absorb them more efficiently.", "topic": "Digestive System"}, {"term": "Bile duct (common bile duct)", "definition": "The tube that carries bile from the liver and gallbladder into the duodenum to aid fat digestion.", "topic": "Digestive System"}, {"term": "Bile salts", "definition": "The components of bile that emulsify large fat globules into smaller droplets, increasing the surface area for lipase action.", "topic": "Digestive System"}, {"term": "Bolus", "definition": "The soft, rounded mass of chewed food mixed with saliva that is swallowed and moved through the oesophagus.", "topic": "Digestive System"}, {"term": "Brunner glands", "definition": "Glands in the duodenum that secrete alkaline mucus to neutralise acidic chyme arriving from the stomach and protect the intestinal lining.", "topic": "Digestive System"}, {"term": "Brush border", "definition": "The dense layer of microvilli on intestinal cells that holds digestive enzymes (brush border enzymes) and is the final site of carbohydrate and protein breakdown.", "topic": "Digestive System"}, {"term": "Brush-border enzymes", "definition": "Digestive enzymes attached to the microvilli of small-intestine cells (such as maltase, sucrase, lactase, and peptidases) that complete the breakdown of carbohydrates and peptides at the absorptive surface.", "topic": "Digestive System"}, {"term": "Buffer", "definition": "A chemical system that resists changes in pH by absorbing or releasing hydrogen ions when acid or base is added.", "topic": "Metabolism"}, {"term": "Caecum", "definition": "The pouch at the start of the large intestine that receives chyme from the ileum and connects to the appendix.", "topic": "Digestive System"}, {"term": "Calcium", "definition": "A mineral essential for building bones and teeth and for nerve transmission, muscle contraction, and blood clotting.", "topic": "Nutrients"}, {"term": "Carbohydrate", "definition": "A macronutrient made of sugars, starches, and fibre that is the body's main and fastest source of energy, supplying about 17 kilojoules per gram.", "topic": "Nutrients"}, {"term": "Carbonic acid", "definition": "A weak acid (H2CO3) formed when carbon dioxide combines with water, acting as the acid component of the bicarbonate buffer system.", "topic": "Metabolism"}, {"term": "Cardiac sphincter (lower oesophageal sphincter)", "definition": "The ring of muscle between the oesophagus and stomach that prevents reflux of acidic stomach contents back into the oesophagus.", "topic": "Digestive System"}, {"term": "Catabolism", "definition": "The destructive phase of metabolism in which large molecules are broken down into smaller ones, releasing energy.", "topic": "Metabolism"}, {"term": "Catalyst", "definition": "A substance that speeds up the rate of a chemical reaction without being consumed or permanently changed by it.", "topic": "Enzymes"}, {"term": "Cellular respiration", "definition": "The overall process by which cells break down glucose and other fuels to produce ATP, comprising glycolysis, the Krebs cycle, and the electron transport chain.", "topic": "Metabolism"}, {"term": "Chemical digestion", "definition": "The breakdown of large food molecules into smaller absorbable units by enzymes and other secretions.", "topic": "Digestive System"}, {"term": "Chief cells", "definition": "Stomach cells that secrete pepsinogen, the inactive precursor of the protein-digesting enzyme pepsin.", "topic": "Digestive System"}, {"term": "Cholecystokinin (CCK)", "definition": "A hormone released by the small intestine in response to fats and proteins that triggers gallbladder contraction (bile release) and pancreatic enzyme secretion.", "topic": "Digestive System"}, {"term": "Cholesterol", "definition": "A waxy lipid used to build cell membranes and make hormones and bile, carried by LDL (harmful in excess) and HDL (protective).", "topic": "Nutrients"}, {"term": "Chromosome", "definition": "A tightly coiled structure of DNA and protein found in the nucleus that carries many genes.", "topic": "Protein Synthesis"}, {"term": "Chylomicron", "definition": "A lipid-protein droplet formed in intestinal cells that transports absorbed fats into the lymphatic system and then the bloodstream.", "topic": "Digestive System"}, {"term": "Chyme", "definition": "The semi-liquid, acidic mixture of partially digested food and gastric juices that leaves the stomach for the small intestine.", "topic": "Digestive System"}, {"term": "Chymotrypsin", "definition": "A pancreatic protein-digesting enzyme (activated by trypsin) that breaks peptides into smaller peptides and amino acids.", "topic": "Digestive System"}, {"term": "Codon", "definition": "A sequence of three bases on mRNA that codes for one specific amino acid (or a start/stop signal).", "topic": "Protein Synthesis"}, {"term": "Colon", "definition": "The main part of the large intestine (ascending, transverse, descending, sigmoid) where water and electrolytes are reabsorbed and faeces are compacted.", "topic": "Digestive System"}, {"term": "Complementary bases", "definition": "Bases that always pair together because of their matching shapes: adenine with thymine (or uracil in RNA) and guanine with cytosine.", "topic": "Protein Synthesis"}, {"term": "Complementary proteins", "definition": "Two or more incomplete plant proteins eaten together (such as beans and rice) that combine to supply all essential amino acids.", "topic": "Nutrients"}, {"term": "Complete protein", "definition": "A protein source that contains all nine essential amino acids in adequate amounts, typically from animal foods such as meat, eggs, and dairy.", "topic": "Nutrients"}, {"term": "Concentration gradient", "definition": "The difference in the concentration of a substance between two areas, which drives the movement of particles from high to low concentration.", "topic": "General"}, {"term": "Condensation reaction", "definition": "A chemical reaction that joins smaller molecules into a larger one by removing water, the reverse of hydrolysis.", "topic": "Metabolism"}, {"term": "Cytosine (C)", "definition": "A nitrogenous base found in DNA and RNA that always pairs with guanine.", "topic": "Protein Synthesis"}, {"term": "Deamination", "definition": "The removal of an amino (NH2) group from an amino acid in the liver, allowing the remainder to be used for energy and producing ammonia.", "topic": "Metabolism"}, {"term": "Decomposition reaction", "definition": "A reaction in which a complex molecule is broken down into simpler substances (catabolic, often energy-releasing).", "topic": "Metabolism"}, {"term": "Defecation", "definition": "The elimination of faeces from the body through the anus, controlled by the anal sphincters.", "topic": "Digestive System"}, {"term": "Deficiency", "definition": "A lack or shortage of a nutrient (such as a vitamin or mineral) in the body, which can lead to disease or impaired function.", "topic": "Nutrients"}, {"term": "Denature", "definition": "The permanent change in the shape (structure) of a protein or enzyme caused by heat, pH, or chemicals, which stops it functioning.", "topic": "Enzymes"}, {"term": "Deoxyribose", "definition": "The five-carbon sugar that forms part of the backbone of DNA.", "topic": "Protein Synthesis"}, {"term": "Diabetes mellitus", "definition": "A chronic condition of high blood glucose caused by insufficient insulin production or the body's reduced response to insulin.", "topic": "Clinical"}, {"term": "Dietary fibre", "definition": "Indigestible plant carbohydrate that adds bulk to stool, aids bowel regularity, and helps control blood glucose and cholesterol.", "topic": "Nutrients"}, {"term": "Diffusion", "definition": "The passive movement of particles from an area of higher concentration to an area of lower concentration until evenly spread, requiring no energy.", "topic": "General"}, {"term": "Digestive system (gastrointestinal tract)", "definition": "The continuous muscular tube from mouth to anus, plus accessory organs (salivary glands, liver, gallbladder, pancreas), that ingests food, breaks it down mechanically and chemically, absorbs nutrients, and eliminates waste.", "topic": "Digestive System"}, {"term": "Disaccharide", "definition": "A sugar made of two monosaccharides joined together, such as maltose, sucrose, or lactose.", "topic": "Digestive System"}, {"term": "DNA (deoxyribonucleic acid)", "definition": "The double-stranded molecule found in the cell nucleus that stores the genetic instructions for building proteins and is passed on during cell division.", "topic": "Protein Synthesis"}, {"term": "Double helix", "definition": "The twisted-ladder shape of DNA formed by two strands wound around each other and joined by paired bases.", "topic": "Protein Synthesis"}, {"term": "Duodenum", "definition": "The first and shortest section of the small intestine where chyme mixes with bile and pancreatic enzymes to continue digestion.", "topic": "Digestive System"}, {"term": "Egestion", "definition": "The expulsion of undigested and unabsorbed waste material from the body as faeces.", "topic": "Digestive System"}, {"term": "Electrolyte", "definition": "A mineral that carries an electrical charge in body fluids (such as sodium, potassium, and chloride) and regulates fluid balance, nerves, and muscles.", "topic": "Nutrients"}, {"term": "Electron transport chain", "definition": "A series of carriers on the inner mitochondrial membrane that uses electrons from NADH and FADH2 to generate the bulk of cellular ATP, with oxygen as the final electron acceptor.", "topic": "Metabolism"}, {"term": "Empty kilojoules", "definition": "Energy from foods high in sugar, fat, or alcohol that provide little or no useful nutrients such as vitamins, minerals, or fibre.", "topic": "Nutrients"}, {"term": "Emulsification", "definition": "The breaking up of large fat globules into smaller droplets by bile salts, increasing the surface area for fat digestion by lipase.", "topic": "Digestive System"}, {"term": "Endocytosis", "definition": "The process by which a cell takes in large particles or fluid by engulfing them in a portion of its membrane to form a vesicle, using energy.", "topic": "General"}, {"term": "Enteritis", "definition": "Inflammation of the small intestine, often caused by infection, that typically causes diarrhoea, abdominal pain, and cramping.", "topic": "Clinical"}, {"term": "Enterocytes", "definition": "The absorptive epithelial cells lining the small intestine that take up digested nutrients across their microvilli-covered brush border.", "topic": "Digestive System"}, {"term": "Enterokinase", "definition": "A brush-border enzyme of the small intestine that activates trypsinogen into trypsin.", "topic": "Digestive System"}, {"term": "Enzyme", "definition": "A biological catalyst, usually a protein, that speeds up a specific chemical reaction in the body without being used up.", "topic": "Enzymes"}, {"term": "Essential amino acid", "definition": "An amino acid the body cannot make and so must obtain from the diet; there are nine of them.", "topic": "Nutrients"}, {"term": "Essential nutrient", "definition": "A nutrient the body cannot make in sufficient amounts and so must obtain from the diet.", "topic": "Nutrients"}, {"term": "Exocytosis", "definition": "The process by which a cell releases large molecules (such as hormones or wastes) by fusing a vesicle with the cell membrane, using energy.", "topic": "General"}, {"term": "Facilitated diffusion", "definition": "The passive movement of substances down their concentration gradient with the help of carrier or channel proteins in the membrane, requiring no energy.", "topic": "General"}, {"term": "Fasting", "definition": "A period of going without food, during which the body uses stored glycogen and then fat for energy.", "topic": "Metabolism"}, {"term": "Fat-soluble vitamins", "definition": "Vitamins A, D, E, and K that dissolve in fat, are stored in the liver and fatty tissue, and can build up to toxic levels if taken in excess.", "topic": "Nutrients"}, {"term": "Fatty acids", "definition": "Long hydrocarbon-chain molecules released from fat digestion that, with monoglycerides, are absorbed and used for energy or storage.", "topic": "Digestive System"}, {"term": "Folate (vitamin B9)", "definition": "A water-soluble B vitamin needed for DNA synthesis and red blood cell formation, and crucial in early pregnancy to prevent neural tube defects.", "topic": "Nutrients"}, {"term": "Food label", "definition": "The required packaging information listing serving size, energy (kilojoules), nutrients, and ingredients to help consumers make informed food choices.", "topic": "Nutrients"}, {"term": "Gallbladder", "definition": "The small sac beneath the liver that stores and concentrates bile, releasing it into the duodenum to emulsify fats.", "topic": "Digestive System"}, {"term": "Gastric glands", "definition": "Glands in the stomach lining containing parietal, chief, and mucous cells that produce gastric juice for digestion.", "topic": "Digestive System"}, {"term": "Gastric juice", "definition": "The acidic fluid secreted by the stomach lining, containing hydrochloric acid, pepsinogen, intrinsic factor, and mucus.", "topic": "Digestive System"}, {"term": "Gastric mucosa", "definition": "The inner lining of the stomach wall that secretes mucus, acid, and digestive enzymes and protects the stomach from its own acid.", "topic": "Digestive System"}, {"term": "Gastrin", "definition": "A hormone released by the stomach that stimulates secretion of gastric juice (acid) and increases gastric motility.", "topic": "Digestive System"}, {"term": "Gene", "definition": "A segment of DNA that carries the coded instructions for making one particular protein (or polypeptide).", "topic": "Protein Synthesis"}, {"term": "Gene expression", "definition": "The overall process by which the information in a gene is used to make a functional protein through transcription and translation.", "topic": "Protein Synthesis"}, {"term": "Genetic code", "definition": "The set of rules by which sequences of three mRNA bases (codons) are translated into specific amino acids.", "topic": "Protein Synthesis"}, {"term": "Glucagon", "definition": "A hormone from the pancreatic alpha cells that raises blood glucose by stimulating glycogenolysis and gluconeogenesis (dominant in the post-absorptive state).", "topic": "Metabolism"}, {"term": "Gluconeogenesis", "definition": "The production of new glucose from non-carbohydrate sources such as amino acids, glycerol, and lactate, mainly in the liver.", "topic": "Metabolism"}, {"term": "Glucose", "definition": "A simple sugar (monosaccharide) that is the body's main fuel for cells, the form of carbohydrate carried in the blood, and the key end product of carbohydrate digestion.", "topic": "Nutrients"}, {"term": "Glycerol", "definition": "A small three-carbon molecule that forms the backbone of fats and is released during fat digestion.", "topic": "Digestive System"}, {"term": "Glycogen", "definition": "The branched storage form of glucose, held mainly in the liver and skeletal muscle.", "topic": "Metabolism"}, {"term": "Glycogenesis", "definition": "The formation of glycogen from excess glucose for storage, mainly in the liver and skeletal muscle.", "topic": "Metabolism"}, {"term": "Glycogenolysis", "definition": "The breakdown of stored glycogen back into glucose to raise blood glucose when needed.", "topic": "Metabolism"}, {"term": "Glycolysis", "definition": "The breakdown of one glucose molecule into two pyruvate molecules in the cytoplasm, yielding a small net amount of ATP without requiring oxygen.", "topic": "Metabolism"}, {"term": "Goblet cells", "definition": "Mucus-secreting cells in the lining of the intestines and other tracts that produce protective, lubricating mucus.", "topic": "Digestive System"}, {"term": "Goitre", "definition": "An enlargement of the thyroid gland, commonly caused by iodine deficiency, seen as a swelling at the front of the neck.", "topic": "Clinical"}, {"term": "Guanine (G)", "definition": "A nitrogenous base found in DNA and RNA that always pairs with cytosine.", "topic": "Protein Synthesis"}, {"term": "Homeostasis", "definition": "The maintenance of a stable, constant internal environment in the body (e.g. temperature, blood glucose, pH) despite changes in external conditions.", "topic": "General"}, {"term": "Hormone", "definition": "A chemical messenger produced by an endocrine gland and carried in the blood to target cells, where it regulates a specific body function.", "topic": "General"}, {"term": "Hydrochloric acid (HCl)", "definition": "The strong acid in gastric juice (secreted by parietal cells) that creates a low pH to kill microbes and activate pepsinogen into pepsin.", "topic": "Digestive System"}, {"term": "Hydrogen bond", "definition": "A weak chemical bond that holds complementary bases together between the two strands of DNA.", "topic": "Protein Synthesis"}, {"term": "Hydrolysis", "definition": "A chemical reaction that breaks a large molecule into smaller ones by adding water, as occurs during digestion.", "topic": "Metabolism"}, {"term": "Ileocecal valve", "definition": "The sphincter between the ileum and caecum that controls passage of material into the large intestine and prevents backflow.", "topic": "Digestive System"}, {"term": "Ileum", "definition": "The final section of the small intestine that absorbs vitamin B12, bile salts, and remaining nutrients before emptying into the large intestine.", "topic": "Digestive System"}, {"term": "Incomplete protein", "definition": "A protein source that lacks or is low in one or more essential amino acids, typically from plant foods such as beans, grains, and nuts.", "topic": "Nutrients"}, {"term": "Ingestion", "definition": "The taking of food and fluids into the body through the mouth.", "topic": "Digestive System"}, {"term": "Insulin", "definition": "A hormone from the pancreatic beta cells that lowers blood glucose by promoting cellular glucose uptake, glycogenesis, and fat storage (dominant in the absorptive state).", "topic": "Metabolism"}, {"term": "Intrinsic factor", "definition": "A protein secreted by the stomach's parietal cells that is needed for the absorption of vitamin B12 in the small intestine.", "topic": "Digestive System"}, {"term": "Iodine", "definition": "A trace mineral needed to make thyroid hormones that control metabolism; deficiency causes goitre and impaired growth.", "topic": "Nutrients"}, {"term": "Iron", "definition": "A mineral needed to make haemoglobin so red blood cells can carry oxygen; deficiency causes iron-deficiency anaemia.", "topic": "Nutrients"}, {"term": "Jejunum", "definition": "The middle section of the small intestine that is the primary site for absorption of most nutrients.", "topic": "Digestive System"}, {"term": "Ketoacidosis", "definition": "A dangerous fall in blood pH caused by excessive ketone production, classically seen in uncontrolled type 1 diabetes (diabetic ketoacidosis).", "topic": "Metabolism"}, {"term": "Ketones (ketone bodies)", "definition": "Acidic molecules produced by the liver from fatty acids when glucose is unavailable, used as an alternative fuel by the brain and muscles.", "topic": "Metabolism"}, {"term": "Kilojoule", "definition": "The metric unit used to measure the energy content of food and the energy the body uses, where about 4.2 kilojoules equal 1 calorie.", "topic": "Nutrients"}, {"term": "Krebs cycle (citric acid cycle)", "definition": "An aerobic series of reactions in the mitochondria that breaks down acetyl-CoA to release CO2 and produce high-energy electron carriers (NADH and FADH2) plus some ATP.", "topic": "Metabolism"}, {"term": "Kussmaul breathing", "definition": "Deep, rapid, laboured breathing that blows off carbon dioxide to compensate for metabolic acidosis, classically seen in diabetic ketoacidosis.", "topic": "Clinical"}, {"term": "Lactase", "definition": "A brush-border enzyme that breaks the disaccharide lactose into glucose and galactose.", "topic": "Digestive System"}, {"term": "Lacteal", "definition": "A small lymphatic capillary inside each villus that absorbs digested fats (chylomicrons) and transports them into the lymphatic system.", "topic": "Digestive System"}, {"term": "Lactic acid", "definition": "A product of anaerobic glucose breakdown that accumulates when oxygen is insufficient, causing muscle fatigue and lowering blood pH.", "topic": "Metabolism"}, {"term": "Large intestine", "definition": "The wider final region of the GI tract (caecum, colon, rectum, anal canal) that absorbs water and electrolytes and forms and stores faeces.", "topic": "Digestive System"}, {"term": "Lipid (fat)", "definition": "A macronutrient that stores energy densely (about 37 kilojoules per gram), insulates and cushions the body, and is needed to absorb fat-soluble vitamins.", "topic": "Nutrients"}, {"term": "Lipogenesis", "definition": "The formation and storage of fat (triglycerides) from excess glucose or other nutrients.", "topic": "Metabolism"}, {"term": "Lipolysis", "definition": "The breakdown of stored triglycerides (fat) into glycerol and free fatty acids for use as fuel.", "topic": "Metabolism"}, {"term": "Liver", "definition": "The large accessory organ that produces bile, processes absorbed nutrients, detoxifies substances, and stores glycogen and vitamins.", "topic": "Digestive System"}, {"term": "Macronutrient", "definition": "A nutrient the body needs in large amounts to provide energy, namely carbohydrates, proteins, and lipids (fats); water is sometimes included.", "topic": "Nutrients"}, {"term": "Malnutrition", "definition": "A condition resulting from an inadequate, excessive, or unbalanced intake of nutrients, leading to impaired health.", "topic": "Nutrients"}, {"term": "Maltase", "definition": "A brush-border enzyme that breaks the disaccharide maltose into two glucose molecules.", "topic": "Digestive System"}, {"term": "Mastication", "definition": "Chewing; the mechanical breakdown of food by the teeth and tongue to form a bolus.", "topic": "Digestive System"}, {"term": "Mechanical digestion", "definition": "The physical breakdown of food into smaller pieces (e.g. chewing, churning) without changing its chemical structure.", "topic": "Digestive System"}, {"term": "Mesentery", "definition": "A double fold of peritoneum that anchors the intestines to the posterior abdominal wall and carries blood vessels, nerves, and lymphatics to the gut.", "topic": "Digestive System"}, {"term": "Metabolism", "definition": "The sum of all chemical reactions occurring in the body, including both the building up (anabolism) and breaking down (catabolism) of molecules.", "topic": "Metabolism"}, {"term": "Micronutrient", "definition": "A nutrient the body needs in only small amounts, namely vitamins and minerals, which do not provide energy but support essential body functions.", "topic": "Nutrients"}, {"term": "Microvilli", "definition": "Microscopic projections on the surface of enterocytes that form the brush border and further increase absorptive surface area.", "topic": "Digestive System"}, {"term": "Mineral", "definition": "An inorganic micronutrient (such as calcium, iron, or iodine) needed in small amounts for functions like bone structure, fluid balance, and nerve and muscle activity.", "topic": "Nutrients"}, {"term": "Monoglyceride", "definition": "A glycerol molecule with one fatty acid attached, produced by lipase during fat digestion and absorbed by intestinal cells.", "topic": "Digestive System"}, {"term": "Monosaccharide", "definition": "A single-sugar unit (e.g. glucose, fructose, galactose) that is the absorbable end product of carbohydrate digestion.", "topic": "Digestive System"}, {"term": "Mouth (oral cavity)", "definition": "The entry point of the digestive tract where mechanical digestion begins with chewing (mastication) and chemical digestion starts via salivary amylase acting on carbohydrates.", "topic": "Digestive System"}, {"term": "mRNA (messenger RNA)", "definition": "The type of RNA that carries a copy of the gene's instructions from the nucleus to the ribosome, where it is read to make a protein.", "topic": "Protein Synthesis"}, {"term": "Mucosa", "definition": "The innermost layer of the GI tract wall that secretes mucus and enzymes and absorbs nutrients.", "topic": "Digestive System"}, {"term": "Mucus", "definition": "A thick, slippery secretion that lubricates food and protects the lining of the digestive tract from acid and enzymes.", "topic": "Digestive System"}, {"term": "Mutation", "definition": "A change in the DNA base sequence that can alter the protein produced and may affect how the cell or body functions.", "topic": "Protein Synthesis"}, {"term": "NADH and FADH2", "definition": "High-energy electron carriers made during glycolysis and the Krebs cycle that donate electrons to the electron transport chain to drive ATP production.", "topic": "Metabolism"}, {"term": "Nitrogenous base", "definition": "The part of a nucleotide (A, T/U, G, or C) whose sequence forms the genetic code and which pairs with a complementary base.", "topic": "Protein Synthesis"}, {"term": "Nucleic acid", "definition": "A large molecule (DNA or RNA) made of chains of nucleotides that stores or carries genetic information.", "topic": "Protein Synthesis"}, {"term": "Nucleotide", "definition": "The basic building block of DNA and RNA, made of a sugar, a phosphate group, and a nitrogenous base.", "topic": "Protein Synthesis"}, {"term": "Nucleus", "definition": "The membrane-bound control centre of the cell that contains the DNA and is where transcription takes place.", "topic": "Protein Synthesis"}, {"term": "Nutrient", "definition": "A chemical substance in food that the body uses for energy, growth, repair, and to regulate body processes.", "topic": "Nutrients"}, {"term": "Oesophagus", "definition": "The muscular tube that transports the bolus from the pharynx to the stomach using rhythmic waves of muscle contraction called peristalsis.", "topic": "Digestive System"}, {"term": "Omentum", "definition": "A fold of peritoneum hanging from the stomach that stores fat, supports abdominal organs, and helps wall off infection.", "topic": "Digestive System"}, {"term": "Osmosis", "definition": "The passive movement of water across a semi-permeable membrane from a region of lower solute concentration to a region of higher solute concentration.", "topic": "General"}, {"term": "Osteoporosis", "definition": "A condition in which bones become weak, brittle, and porous due to loss of bone density, increasing the risk of fractures.", "topic": "Clinical"}, {"term": "Pancreas", "definition": "An accessory organ that secretes digestive enzymes and bicarbonate into the duodenum (exocrine) and releases insulin and glucagon into the blood (endocrine).", "topic": "Digestive System"}, {"term": "Pancreatic amylase", "definition": "A pancreatic enzyme that breaks down starch into disaccharides such as maltose.", "topic": "Digestive System"}, {"term": "Pancreatic juice", "definition": "The alkaline fluid from the pancreas containing digestive enzymes and bicarbonate, released into the small intestine.", "topic": "Digestive System"}, {"term": "Pancreatic lipase", "definition": "A pancreatic enzyme that breaks down fats (triglycerides) into fatty acids and monoglycerides.", "topic": "Digestive System"}, {"term": "Parietal cells", "definition": "Stomach cells that secrete hydrochloric acid (creating an acidic environment and killing microbes) and intrinsic factor for vitamin B12 absorption.", "topic": "Digestive System"}, {"term": "Passive transport", "definition": "Movement of substances across a membrane without using cellular energy, following the concentration gradient (e.g. diffusion, osmosis, facilitated diffusion).", "topic": "General"}, {"term": "Pepsin", "definition": "The active stomach enzyme that begins protein digestion by breaking proteins into shorter peptide chains.", "topic": "Digestive System"}, {"term": "Pepsinogen", "definition": "The inactive precursor of pepsin secreted by stomach chief cells, activated to pepsin by hydrochloric acid.", "topic": "Digestive System"}, {"term": "Peptic ulcer", "definition": "An open sore in the lining of the stomach or duodenum, commonly caused by Helicobacter pylori infection or NSAID use eroding the mucosa.", "topic": "Clinical"}, {"term": "Peptidase", "definition": "A brush-border enzyme that breaks small peptides into individual amino acids.", "topic": "Digestive System"}, {"term": "Peptide bond", "definition": "The chemical bond that joins one amino acid to the next, forming a polypeptide chain.", "topic": "Protein Synthesis"}, {"term": "Peristalsis", "definition": "Coordinated waves of involuntary smooth-muscle contraction and relaxation that propel food along the digestive tract.", "topic": "Digestive System"}, {"term": "Peritoneum", "definition": "The serous membrane lining the abdominal cavity (parietal layer) and covering the abdominal organs (visceral layer), secreting fluid that reduces friction.", "topic": "Digestive System"}, {"term": "Peyer patches", "definition": "Clusters of lymphoid tissue in the wall of the ileum that monitor gut contents and mount immune responses against pathogens.", "topic": "Digestive System"}, {"term": "pH", "definition": "A scale from 0 to 14 measuring the hydrogen ion concentration of a solution, where lower is more acidic and higher is more alkaline.", "topic": "Metabolism"}, {"term": "Pharynx", "definition": "The muscular passage at the back of the throat shared by the respiratory and digestive tracts that moves a swallowed bolus from the mouth into the oesophagus.", "topic": "Digestive System"}, {"term": "Phosphate group", "definition": "The part of a nucleotide that links with the sugar of the next nucleotide to form the backbone of DNA and RNA.", "topic": "Protein Synthesis"}, {"term": "Plicae circulares (circular folds)", "definition": "Permanent circular folds of the small intestine's wall that increase surface area and slow food movement to improve absorption.", "topic": "Digestive System"}, {"term": "Polypeptide", "definition": "A chain of amino acids joined together by peptide bonds, which folds to form a functional protein.", "topic": "Protein Synthesis"}, {"term": "Polysaccharide", "definition": "A large carbohydrate made of many monosaccharide units joined together, such as starch or glycogen.", "topic": "Digestive System"}, {"term": "Post-absorptive state", "definition": "The fasting state between meals when stored fuels are broken down to maintain blood glucose under the influence of glucagon.", "topic": "Metabolism"}, {"term": "Potassium", "definition": "A mineral and electrolyte essential for nerve signals, muscle contraction (including the heartbeat), and balancing the effects of sodium.", "topic": "Nutrients"}, {"term": "Propulsion", "definition": "The movement of food through the digestive tract, including swallowing and peristalsis.", "topic": "Digestive System"}, {"term": "Protein", "definition": "A macronutrient and large molecule made of amino acids (folded polypeptide chains) that builds and repairs tissue and makes enzymes, hormones, and antibodies, providing about 17 kilojoules per gram.", "topic": "Nutrients"}, {"term": "Pyloric sphincter", "definition": "The ring of muscle at the stomach's exit that regulates the release of chyme into the duodenum.", "topic": "Digestive System"}, {"term": "RDI (Recommended Dietary Intake)", "definition": "The average daily amount of a nutrient considered enough to meet the needs of almost all healthy people in a given group.", "topic": "Nutrients"}, {"term": "Rectum", "definition": "The terminal section of the large intestine that stores faeces until defecation.", "topic": "Digestive System"}, {"term": "Ribose", "definition": "The five-carbon sugar that forms part of the backbone of RNA.", "topic": "Protein Synthesis"}, {"term": "Ribosome", "definition": "The cell structure (made of rRNA and protein) that reads mRNA and assembles amino acids into a protein during translation.", "topic": "Protein Synthesis"}, {"term": "Rickets", "definition": "A childhood disease caused by vitamin D (or calcium) deficiency that leads to soft, weak, and deformed bon
