es.", "topic": "Clinical"}, {"term": "RNA (ribonucleic acid)", "definition": "A single-stranded nucleic acid that copies and carries the genetic message from DNA so it can be used to build proteins.", "topic": "Protein Synthesis"}, {"term": "RNA polymerase", "definition": "The enzyme that unzips DNA and builds a complementary mRNA strand during transcription.", "topic": "Protein Synthesis"}, {"term": "rRNA (ribosomal RNA)", "definition": "The type of RNA that, together with proteins, makes up the structure of the ribosome and helps join amino acids together.", "topic": "Protein Synthesis"}, {"term": "Rugae", "definition": "The folds of the stomach lining that allow the stomach to stretch as it fills with food.", "topic": "Digestive System"}, {"term": "Saliva", "definition": "The watery fluid secreted by salivary glands that moistens food, begins starch digestion, and contains mucus and salivary amylase.", "topic": "Digestive System"}, {"term": "Salivary amylase", "definition": "An enzyme in saliva that begins the chemical digestion of starch into smaller sugars such as maltose.", "topic": "Digestive System"}, {"term": "Salivary glands", "definition": "The paired glands (parotid, submandibular, sublingual) that secrete saliva containing amylase, mucus, and lysozyme to moisten food and begin starch digestion.", "topic": "Digestive System"}, {"term": "Saturated fat", "definition": "A fat with no double bonds between carbon atoms that is usually solid at room temperature and, in excess, raises LDL cholesterol and heart-disease risk.", "topic": "Nutrients"}, {"term": "Scurvy", "definition": "A disease caused by vitamin C deficiency, leading to impaired collagen formation with bleeding gums, poor wound healing, and fatigue.", "topic": "Clinical"}, {"term": "Secretin", "definition": "A hormone released by the small intestine that stimulates the pancreas and liver to secrete bicarbonate, neutralising acidic chyme.", "topic": "Digestive System"}, {"term": "Segmentation", "definition": "Localised, back-and-forth contractions of the intestinal wall that mix chyme with digestive juices and increase contact with the absorptive surface.", "topic": "Digestive System"}, {"term": "Selectively permeable membrane", "definition": "A membrane that controls which substances can pass through it based on size, charge, or solubility; another name for a semi-permeable membrane.", "topic": "General"}, {"term": "Semi-permeable membrane", "definition": "A membrane that allows some substances (such as water and small molecules) to pass through while blocking others; also called selectively permeable.", "topic": "General"}, {"term": "Small intestine", "definition": "The long, coiled tube (duodenum, jejunum, ileum) that is the main site of chemical digestion and nutrient absorption.", "topic": "Digestive System"}, {"term": "Sodium", "definition": "A mineral and electrolyte that controls fluid balance, nerve impulses, and muscle function; excess intake raises blood pressure.", "topic": "Nutrients"}, {"term": "Solute", "definition": "A substance that is dissolved in a solvent to form a solution.", "topic": "General"}, {"term": "Solvent", "definition": "A substance (usually a liquid such as water) in which a solute dissolves to form a solution.", "topic": "General"}, {"term": "Starch", "definition": "A plant polysaccharide made of many glucose units that is digested by amylase into smaller sugars.", "topic": "Digestive System"}, {"term": "Start codon", "definition": "The codon AUG on mRNA that signals where translation should begin and codes for the amino acid methionine.", "topic": "Protein Synthesis"}, {"term": "Starvation state", "definition": "A prolonged lack of food in which the body, having used up glycogen and fat reserves, begins breaking down its own muscle protein for energy.", "topic": "Metabolism"}, {"term": "Stomach", "definition": "A J-shaped muscular organ that stores food, mixes it with gastric acid and enzymes to form chyme, and begins protein digestion.", "topic": "Digestive System"}, {"term": "Stop codon", "definition": "A codon (UAA, UAG, or UGA) that signals the ribosome to end translation and release the finished polypeptide.", "topic": "Protein Synthesis"}, {"term": "Submucosa", "definition": "The connective tissue layer beneath the mucosa containing blood vessels, lymphatics, and nerves that supply the gut wall.", "topic": "Digestive System"}, {"term": "Substrate", "definition": "The specific reactant molecule that an enzyme acts upon to convert into a product.", "topic": "Enzymes"}, {"term": "Sucrase", "definition": "A brush-border enzyme that breaks the disaccharide sucrose into glucose and fructose.", "topic": "Digestive System"}, {"term": "Sugar-phosphate backbone", "definition": "The structural side rails of DNA and RNA formed by alternating sugar and phosphate groups, with the bases attached pointing inward.", "topic": "Protein Synthesis"}, {"term": "Synthesis reaction", "definition": "A reaction in which two or more simple substances combine to form a larger, more complex molecule (anabolic, energy-requiring).", "topic": "Metabolism"}, {"term": "Template strand", "definition": "The DNA strand that is read by RNA polymerase to build a complementary mRNA molecule during transcription.", "topic": "Protein Synthesis"}, {"term": "Thymine (T)", "definition": "A nitrogenous base found only in DNA that pairs with adenine.", "topic": "Protein Synthesis"}, {"term": "Trans fat", "definition": "An unsaturated fat artificially hardened by hydrogenation that raises bad (LDL) cholesterol and lowers good (HDL) cholesterol, making it the least healthy fat.", "topic": "Nutrients"}, {"term": "Transcription", "definition": "The first stage of protein synthesis in which DNA is copied into mRNA inside the nucleus.", "topic": "Protein Synthesis"}, {"term": "Translation", "definition": "The second stage of protein synthesis in which the ribosome reads the mRNA codons and joins amino acids into a polypeptide.", "topic": "Protein Synthesis"}, {"term": "tRNA (transfer RNA)", "definition": "A type of RNA that brings the correct amino acid to the ribosome and matches its anticodon to the mRNA codon during translation.", "topic": "Protein Synthesis"}, {"term": "Trypsin", "definition": "An active pancreatic enzyme that digests proteins and peptides into smaller peptides and amino acids.", "topic": "Digestive System"}, {"term": "Trypsinogen", "definition": "The inactive precursor of trypsin secreted by the pancreas, activated to trypsin by enterokinase in the small intestine.", "topic": "Digestive System"}, {"term": "Type 1 diabetes", "definition": "An autoimmune form of diabetes in which the pancreas produces little or no insulin, requiring lifelong insulin replacement.", "topic": "Clinical"}, {"term": "Type 2 diabetes", "definition": "A form of diabetes in which cells become resistant to insulin (and insulin output may decline), usually linked to lifestyle and developing in adulthood.", "topic": "Clinical"}, {"term": "Unsaturated fat", "definition": "A fat with one or more double bonds that is usually liquid at room temperature and is generally considered heart-healthy, found in oils, nuts, and fish.", "topic": "Nutrients"}, {"term": "Uracil (U)", "definition": "A nitrogenous base found only in RNA that replaces thymine and pairs with adenine.", "topic": "Protein Synthesis"}, {"term": "Urea", "definition": "A nitrogen-containing waste made in the liver from ammonia produced by amino acid breakdown, then excreted by the kidneys.", "topic": "Metabolism"}, {"term": "Villi", "definition": "Tiny finger-like projections of the small intestine's mucosa that greatly increase surface area for nutrient absorption.", "topic": "Digestive System"}, {"term": "Vitamin", "definition": "An organic micronutrient needed in small amounts to regulate body processes such as metabolism, immunity, and tissue maintenance, which usually cannot be made by the body and must come from the diet.", "topic": "Nutrients"}, {"term": "Vitamin A", "definition": "A fat-soluble vitamin needed for healthy vision (especially night vision), skin, and immune function.", "topic": "Nutrients"}, {"term": "Vitamin B12", "definition": "A water-soluble vitamin needed for red blood cell production and nerve function, found mainly in animal foods; deficiency causes pernicious anaemia.", "topic": "Nutrients"}, {"term": "Vitamin C", "definition": "A water-soluble vitamin (ascorbic acid) needed to make collagen, support wound healing and immunity, and act as an antioxidant; deficiency causes scurvy.", "topic": "Nutrients"}, {"term": "Vitamin D", "definition": "A fat-soluble vitamin made in skin from sunlight that helps absorb calcium and phosphorus for strong bones; deficiency causes rickets or osteomalacia.", "topic": "Nutrients"}, {"term": "Vitamin E", "definition": "A fat-soluble vitamin that acts as an antioxidant, protecting cell membranes from damage.", "topic": "Nutrients"}, {"term": "Vitamin K", "definition": "A fat-soluble vitamin essential for blood clotting and bone health.", "topic": "Nutrients"}, {"term": "Water-soluble vitamins", "definition": "Vitamins C and the B-complex that dissolve in water, are not stored well so excess is excreted in urine, and must be consumed regularly.", "topic": "Nutrients"}, {"term": "Zinc", "definition": "A trace mineral needed for immune function, wound healing, growth, and enzyme activity.", "topic": "Nutrients"}], "images": {"digestive": "data:image/svg+xml;base64,PD94bWwgdmVyc2lvbj0iMS4wIiBlbmNvZGluZz0iVVRGLTgiIHN0YW5kYWxvbmU9Im5vIj8+CjxzdmcgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIiB4bWxuczp4bGluaz0iaHR0cDovL3d3dy53My5vcmcvMTk5OS94bGluayIgdmlld0JveD0iMCAwIDY0NC4yNTE5NiA4OTIuMDg2NTQiPgogIDxkZWZzPgogICAgPGxpbmVhckdyYWRpZW50IGlkPSJiIiB4MT0iNDUyLjE0NzQ5IiB4Mj0iMzUzLjEzNzciIHkxPSI1NTcuOTE2MDIiIHkyPSI4NjQuNTcxMjkiIGdyYWRpZW50VW5pdHM9InVzZXJTcGFjZU9uVXNlIj4KICAgICAgPHN0b3Agb2Zmc2V0PSIwIiBzdG9wLWNvbG9yPSIjNmM5ZDMxIi8+CiAgICAgIDxzdG9wIG9mZnNldD0iLjI5 <script>
/* ---------- helpers ---------- */
const $ = (s,r=document)=>r.querySelector(s);
const $$ = (s,r=document)=>[...r.querySelectorAll(s)];
const esc = s => (s==null?"":String(s)).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
/* turn a freeform answer string into nicely formatted HTML (lists, paragraphs, bold labels) */
function fmtAnswer(raw){
  let t=(raw==null?"":String(raw)).replace(/\r/g,"").trim();
  if(!t) return "";
  const inl=s=>{ s=s.replace(/^([^\n=:–—-]{2,64}?)(\s*[=:–—-]\s)/,"<b>$1</b>$2");
    return s.replace(/\b(Mechanical digestion|Chemical digestion|Physical digestion)\b/g,"<b>$1</b>"); };
  const blocks=t.split(/\n+/).map(b=>b.trim()).filter(Boolean);
  let html="", buf=[], bt="";
  const flush=()=>{ if(buf.length){ html+="<"+bt+" class='ans'>"+buf.map(i=>"<li>"+inl(esc(i))+"</li>").join("")+"</"+bt+">"; buf=[]; bt=""; } };
  const push=(type,item)=>{ if(bt&&bt!==type) flush(); bt=type; buf.push(item); };
  for(const b of blocks){
    const nums=b.match(/(?:^|\s)\(?\d{1,2}[.)]\s/g);
    if(nums && nums.length>=2){            // a single block holding several "1) .. 2) .." or "(1) .. (2) .." items
      flush();
      const parts=b.split(/(?:^|\s)(?=\(?\d{1,2}[.)]\s)/).map(x=>x.trim()).filter(Boolean);
      let intro=""; if(!/^\(?\d{1,2}[.)]/.test(parts[0])) intro=parts.shift();
      if(intro) html+="<p>"+inl(esc(intro))+"</p>";
      html+="<ol class='ans'>"+parts.map(p=>"<li>"+inl(esc(p.replace(/^\(?\d{1,2}[.)]\s*/,"")))+"</li>").join("")+"</ol>";
      continue;
    }
    let m;
    if((m=b.match(/^\(?\d{1,2}[.)]\s+([\s\S]*)/))){ push("ol", m[1]); }   // one numbered item (multi-block list)
    else if((m=b.match(/^[-•*]\s+([\s\S]*)/))){ push("ul", m[1]); }
    else{ flush(); html+="<p>"+inl(esc(b))+"</p>"; }
  }
  flush();
  return html;
}
const LS = {
  get(k,d){try{return JSON.parse(localStorage.getItem("cram3_"+k))??d}catch(e){return d}},
  set(k,v){try{localStorage.setItem("cram3_"+k,JSON.stringify(v))}catch(e){}}
};
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
let tutorMode="explain", tutorPrefill="", tutorItems=[];

/* ---------- flatten MCQ pool ---------- */
const ALLQ = [];
(DATA.quizzes||[]).forEach(q=>{
  (q.questions||[]).forEach((it,i)=>{
    if(it.type==="mcq" && Array.isArray(it.options) && it.options.length){
      ALLQ.push({uid:q.id+"_"+i, topic:q.topic, quiz:q.title, ...it});
    }
  });
});
const TOPICS = [...new Set(ALLQ.map(q=>q.topic))].sort();

/* ---------- tabs ---------- */
const TABS = [
  {k:"plan", label:"🎯 Pass Plan"},
  {k:"search", label:"🔎 Search"},
  {k:"tutor", label:"🤖 AI Tutor"},
  {k:"vault", label:"📝 Case Vault"},
  {k:"mcq", label:"❓ MCQ Trainer"},
  {k:"saq", label:"✍️ Short Answer"},
  {k:"exam", label:"🎓 Exam Mode"},
  {k:"sheet", label:"🧠 Cram Sheet"},
  {k:"diagrams", label:"🗺️ Diagrams"},
  {k:"cards", label:"🃏 Flashcards"},
];
function setView(k){
  $$(".tab").forEach(t=>t.classList.toggle("active",t.dataset.k===k));
  $$(".view").forEach(v=>v.classList.toggle("active",v.dataset.view===k));
  LS.set("tab",k);
  window.scrollTo({top:0});
}
const tabsEl = $("#tabs");
TABS.forEach(t=>{
  const b=document.createElement("button");
  b.className="tab";b.dataset.k=t.k;b.textContent=t.label;
  b.onclick=()=>setView(t.k);
  tabsEl.appendChild(b);
});

/* ---------- PASS PLAN ---------- */
function renderPlan(){
  const seen = LS.get("seen",{}); const correct = LS.get("correct",{});
  const nSeen=Object.keys(seen).length, nCorr=Object.values(correct).filter(Boolean).length;
  const pct = ALLQ.length? Math.round(nCorr/ALLQ.length*100):0;
  $("#view-plan").innerHTML = `
  <div class="card">
    <h2>🎯 Your pass plan</h2>
    <p class="lead">You need <b>50%</b> to pass. The fastest route: lock the short-answer section (it's predictable) and grind the MCQs. Here's the order. <i>(Stuck on any word? The <b>🔎 Search</b> tab defines every term.)</i></p>
    <div class="grid two" style="margin:14px 0">
      <div class="stat"><b>${ALLQ.length}</b><span>MCQs to practise</span></div>
      <div class="stat"><b>${nCorr}/${ALLQ.length}</b><span>answered correctly · ${pct}%</span></div>
    </div>
    <div class="prog"><i style="width:${pct}%"></i></div>

    <h3>① Memorise the Case Vault first <span class="badge">HIGHEST YIELD</span></h3>
    <ul class="tight">
      <li>The 3 case studies are the <b>same template with names swapped</b>. Same 6 questions every time.</li>
      <li><b>Q1a/1b never change</b> — learn the ketosis + hyperventilation answer once (it's in the Answer Bank).</li>
      <li>Q2–4 = function + deficiency of one nutrient → the Answer Bank has <b>every nutrient</b> they could pick.</li>
      <li>Q5 = a digestion table (carb / lipid / protein) — all three are filled in for you.</li>
      <li>Q6 = metabolism of that macronutrient (5 marks) — all three model answers are written out.</li>
    </ul>

    <h3>② Drill the Short Answer tab <span class="badge">THE OTHER HALF OF THE TEST</span></h3>
    <ul class="tight">
      <li>These are the written/matching questions <b>with model answers</b> — the bit MCQs can't save you on.</li>
      <li>The <b>Practice Test</b> group mirrors the real test most closely (protein synthesis, codons, acid–base, defecation order).</li>
    </ul>

    <h3>③ Do the MCQ Trainer until you're green</h3>
    <ul class="tight">
      <li>Start with <b>Metabolism</b> and <b>Digestive System</b> (most questions).</li>
      <li>Use "Retry wrong only" to mop up what you keep missing.</li>
    </ul>

    <h3>④ Pressure-test yourself in Exam Mode</h3>
    <ul class="tight">
      <li>Timed mock paper (random MCQs + a case study), auto-marked and scored against the 50% line — do a couple until you're clearing it comfortably.</li>
      <li>Stuck on anatomy? The <b>Diagrams</b> tab has the digestive system, villus and DNA figures labelled.</li>
    </ul>

    <h3>⑤ Night before / on the way in</h3>
    <ul class="tight">
      <li>Hit <b>🖨 (top right)</b> to print or save the <b>1-page cheat sheet</b> as a PDF.</li>
      <li>Anything flagged <span class="badge">SHORT ANSWER</span> in the Cram Sheet is a likely written question — prioritise it.</li>
      <li>Run the Flashcards on your phone on the way in.</li>
    </ul>

    <div class="note" style="margin-top:14px">⚠️ Answers were generated and fact-checked by AI from your unanswered quiz PDFs. They're solid for a first-year pass, but if anything contradicts your lecturer, trust your lecturer.</div>
  </div>`;
}

/* ---------- CASE VAULT ---------- */
function renderVault(){
  const b = DATA.answerBank||{};
  let html = `<div class="card"><h2>📝 Case Study Vault</h2>
    <p class="lead">The real test reuses these almost word-for-word. Learn the model answers, then use the Master Answer Bank below to handle whichever nutrient/macronutrient they swap in.</p></div>`;

  // case studies
  (DATA.caseStudies||[]).forEach(c=>{
    html += `<details class="acc"><summary>${esc(c.name)}</summary><div class="body">
      <p class="muted" style="font-style:italic">${esc(c.scenario)}</p>`;
    (c.questions||[]).forEach(q=>{
      html += `<div class="qa"><div class="q">${esc(q.q)}${q.marks?`<span class="marks">(${q.marks} mark${q.marks>1?"s":""})</span>`:""}</div>
        <div class="a">${fmtAnswer(q.modelAnswer)}</div></div>`;
    });
    html += `</div></details>`;
  });

  // master answer bank
  html += `<div class="card"><h2>📒 Master Answer Bank</h2><p class="lead">Pre-written answers for every variant they could throw at you.</p></div>`;

  // core
  if(b.core&&b.core.length){
    html += `<details class="acc" open><summary>🔁 Core answers (same in every case study)</summary><div class="body">`;
    b.core.forEach(c=>{ html += `<div class="qa"><div class="q">${esc(c.title)}${c.marks?`<span class="marks">(${c.marks} marks)</span>`:""}</div><div class="a">${fmtAnswer(c.answer)}</div></div>`; });
    html += `</div></details>`;
  }
  // nutrients
  if(b.nutrients&&b.nutrients.length){
    html += `<details class="acc"><summary>🥗 Nutrient functions + deficiencies</summary><div class="body">
      <input class="searchbox" id="nutSearch" placeholder="Search a nutrient (e.g. iron, vitamin C, protein)…">
      <table id="nutTable"><thead><tr><th>Nutrient</th><th>Function in the diet</th><th>If lacking (deficiency)</th></tr></thead><tbody>`;
    b.nutrients.forEach(n=>{ html += `<tr><td><b>${esc(n.name)}</b><br><span class="muted" style="font-size:12px">${esc(n.type)}</span></td><td>${esc(n.function)}</td><td>${esc(n.deficiency)}</td></tr>`; });
    html += `</tbody></table></div></details>`;
  }
  // digestion tables
  if(b.digestionTables&&b.digestionTables.length){
    html += `<details class="acc"><summary>🍽️ Digestion tables (mechanical + chemical)</summary><div class="body">`;
    b.digestionTables.forEach(t=>{
      html += `<h3>${esc(t.macronutrient)}</h3><table><thead><tr><th>Body part</th><th>Mechanical (physical)</th><th>Chemical</th></tr></thead><tbody>`;
      (t.rows||[]).forEach(r=>{ html += `<tr><td><b>${esc(r.part)}</b></td><td>${esc(r.mechanical)}</td><td>${esc(r.chemical)}</td></tr>`; });
      html += `</tbody></table>`;
    });
    html += `</div></details>`;
  }
  // metabolism
  if(b.metabolism&&b.metabolism.length){
    html += `<details class="acc"><summary>⚡ Metabolism model answers (5 marks each)</summary><div class="body">`;
    b.metabolism.forEach(m=>{ html += `<div class="qa"><div class="q">${esc(m.macronutrient)} metabolism<span class="marks">(${m.marks||5} marks)</span></div><div class="a">${fmtAnswer(m.answer)}</div></div>`; });
    html += `</div></details>`;
  }

  $("#view-vault").innerHTML = html;
  const ns = $("#nutSearch");
  if(ns) ns.oninput = ()=>{
    const v = ns.value.toLowerCase();
    $$("#nutTable tbody tr").forEach(tr=> tr.style.display = tr.textContent.toLowerCase().includes(v)?"":"none");
  };
}

/* ---------- MCQ TRAINER ---------- */
let mcqState = {pool:[], idx:0, filter:"all", wrongOnly:false};
function buildPool(){
  let pool = ALLQ;
  if(mcqState.filter!=="all") pool = pool.filter(q=>q.topic===mcqState.filter);
  if(mcqState.wrongOnly){ const wr=LS.get("wrong",{}); pool = pool.filter(q=>wr[q.uid]); }
  mcqState.pool = shuffle(pool);

function renderQ(){
  const body=$("#mcqBody");
  const correct=LS.get("correct",{});
  const nCorr=Object.values(correct).filter(Boolean).length;
  $("#mcqKpi").textContent = `${mcqState.pool.length} in this set · ${nCorr}/${ALLQ.length} correct overall`;
  if(!mcqState.pool.length){ body.innerHTML=`<p class="muted">No questions here. ${mcqState.wrongOnly?"You have no wrong ones logged — nice. 🎉":""}</p>`; $("#mcqProg").style.width="0";return; }
  if(mcqState.idx>=mcqState.pool.length){
    const setCorr = mcqState.pool.filter(q=>correct[q.uid]).length;
    body.innerHTML=`<div class="center" style="padding:18px 0">
      <div class="big">${setCorr}/${mcqState.pool.length}</div>
      <p class="muted">set complete</p>
      <button class="btn" id="againBtn">Go again</button>
      <button class="btn ghost" id="wrongBtn">Retry wrong only</button></div>`;
    $("#mcqProg").style.width="100%";
    $("#againBtn").onclick=()=>{buildPool();renderQ();};
    $("#wrongBtn").onclick=()=>{mcqState.wrongOnly=true;$("#wrongChk").checked=true;buildPool();renderQ();};
    return;
  }
  const q=mcqState.pool[mcqState.idx];
  $("#mcqProg").style.width = (mcqState.idx/mcqState.pool.length*100)+"%";
  const isMulti = q.multi && Array.isArray(q.correctIndexes);
  let h=`<div class="qmeta">${esc(q.topic)} · Q${mcqState.idx+1} of ${mcqState.pool.length}${isMulti?` · <b style="color:var(--acc2)">SELECT ALL THAT APPLY (${q.correctIndexes.length})</b>`:""}</div>
    <div class="qtext">${esc(q.question)}</div>`;
  q.options.forEach((o,i)=>{ h+=`<button class="opt" data-i="${i}">${esc(o)}<span class="mk"></span></button>`; });
  h+=`<div class="expl" id="expl"></div>
    <div class="row" style="margin-top:10px;justify-content:flex-end">
      ${isMulti?`<button class="btn ghost" id="checkBtn">Check answer</button>`:""}
      <button class="btn" id="nextBtn" disabled>Next →</button></div>`;
  body.innerHTML=h;

  function grade(ok, correctSet){
    $$("#mcqBody .opt").forEach((b,bi)=>{
      b.onclick=null;
      if(correctSet.includes(bi)){b.classList.add("correct");b.querySelector(".mk").textContent="✓";}
      else if(b.classList.contains("sel")){b.classList.add("wrong");b.querySelector(".mk").textContent="✗";}
    });
    const seen=LS.get("seen",{});seen[q.uid]=1;LS.set("seen",seen);
    const corr=LS.get("correct",{});corr[q.uid]=ok;LS.set("correct",corr);
    const wr=LS.get("wrong",{}); if(ok){delete wr[q.uid]}else{wr[q.uid]=1} LS.set("wrong",wr);
    const ex=$("#expl"); ex.classList.add("show");
    ex.innerHTML=`<b>${ok?"✅ Correct":"❌ Not quite"}.</b> ${esc(q.explanation||("Answer: "+correctSet.map(i=>q.options[i]).join(", ")))}`;
    $("#nextBtn").disabled=false;
    $("#mcqKpi").textContent = `${mcqState.pool.length} in this set · ${Object.values(LS.get("correct",{})).filter(Boolean).length}/${ALLQ.length} correct overall`;
  }

  if(isMulti){
    const cset=q.correctIndexes.slice().sort((a,b)=>a-b);
    $$("#mcqBody .opt").forEach(btn=>{ btn.onclick=()=>btn.classList.toggle("sel"); });
    $("#checkBtn").onclick=()=>{
      const sel=$$("#mcqBody .opt").filter(b=>b.classList.contains("sel")).map(b=>+b.dataset.i).sort((a,b)=>a-b);
      const ok = sel.length===cset.length && sel.every((v,k)=>v===cset[k]);
      $("#checkBtn").disabled=true;
      grade(ok, cset);
    };
  } else {
    let answered=false;
    $$("#mcqBody .opt").forEach(btn=>{
      btn.onclick=()=>{
        if(answered)return; answered=true;
        const i=+btn.dataset.i, ci=q.correctIndex;
        if(i!==ci) btn.classList.add("sel");
        grade(i===ci, [ci]);
      };
    });
  }
  $("#nextBtn").onclick=()=>{mcqState.idx++;renderQ();};
}

function buildSearchIndex(){
  const ab=DATA.answerBank||{}, idx=[];
  (DATA.glossary||[]).forEach(g=>idx.push({type:"Definition",cls:"def",title:g.term,text:g.definition,topic:g.topic||"",tab:"search"}));
  (ab.nutrients||[]).forEach(n=>idx.push({type:"Nutrient",cls:"",title:n.name,text:`Function: ${n.function}  ·  If lacking: ${n.deficiency}`,topic:"Nutrients",tab:"vault"}));
  (ab.core||[]).forEach(c=>idx.push({type:"Key answer",cls:"",title:c.title,text:c.answer,topic:"",tab:"vault"}));
  (ab.metabolism||[]).forEach(m=>idx.push({type:"Metabolism",cls:"",title:m.macronutrient+" metabolism",text:m.answer,topic:"Metabolism",tab:"vault"}));
  (ab.digestionTables||[]).forEach(t=>idx.push({type:"Digestion table",cls:"",title:t.macronutrient+" digestion",text:(t.rows||[]).map(r=>`${r.part}: ${r.mechanical} | ${r.chemical}`).join("  ·  "),topic:"Digestive System",tab:"vault"}));
  (DATA.caseStudies||[]).forEach(c=>(c.questions||[]).forEach(q=>idx.push({type:"Case study",cls:"",title:q.q,text:q.modelAnswer,topic:c.name,tab:"vault"})));
  (DATA.saqs||[]).forEach(s=>idx.push({type:"Short answer",cls:"",title:s.question,text:s.answer,topic:s.topic,tab:"saq"}));
  (DATA.notes||[]).forEach(n=>(n.sections||[]).forEach(sec=>(sec.points||[]).forEach(p=>idx.push({type:"Note",cls:"",title:sec.heading,text:p,topic:n.topic,tab:"sheet"}))));
  (DATA.notes||[]).forEach(n=>(n.flashcards||[]).forEach(f=>idx.push({type:"Flashcard",cls:"",title:f.front,text:f.back,topic:n.topic,tab:"cards"})));
  ALLQ.forEach(q=>idx.push({type:"MCQ",cls:"",title:q.question,text:(q.options||[]).join("  ·  ")+(q.explanation?("  —  "+q.explanation):""),topic:q.topic,tab:"mcq"}));
  return idx;
}
const SEARCH_IDX = buildSearchIndex();
function reEsc(s){return s.replace(/[.*+?^${}()|[\]\\]/g,"\\$&");}
function hl(text,terms){ let t=esc(text); terms.forEach(term=>{ if(term.length<2)return; t=t.replace(new RegExp("("+reEsc(term)+")","ig"),"<mark>$1</mark>"); }); return t; }
function snippet(text,q){ if(text.length<=200) return text; const i=text.toLowerCase().indexOf(q); if(i<0) return text.slice(0,200)+"…"; const s=Math.max(0,i-70); return (s>0?"…":"")+text.slice(s,s+200)+(s+200<text.length?"…":""); }
function tabLabel(k){ const t=TABS.find(x=>x.k===k); return t?t.label.replace(/^\S+\s/,""):k; }
function renderSearch(){
  const glossN=(DATA.glossary||[]).length;
  $("#view-search").innerHTML=`<div class="card">
    <h2>🔎 Search & Glossary</h2>
    <p class="lead">Look up anything across the whole app — ${SEARCH_IDX.length} entries${glossN?`, incl. a ${glossN}-term glossary`:""}. Try <i>bile, amylase, ketosis, villi, codon, insulin</i>…</p>
    <input class="searchbox" id="globalSearch" placeholder="Search terms, definitions, questions, notes…" autocomplete="off">
    <div id="searchResults"></div>
  </div>`;
  const inp=$("#globalSearch");
  inp.oninput=()=>doSearch(inp.value);
  doSearch("");
}
function doSearch(qraw){
  const q=(qraw||"").trim().toLowerCase(), box=$("#searchResults");
  if(!box) return;
  if(!q){
    const gl=(DATA.glossary||[]).slice().sort((a,b)=>a.term.localeCompare(b.term));
    if(!gl.length){ box.innerHTML=`<p class="muted" style="margin-top:12px">Type above to search every question, answer, note and flashcard in the app.</p>`; return; }
    tutorItems = gl.map(g=>({title:g.term, text:g.definition}));
    box.innerHTML=`<p class="muted" style="margin:12px 0 4px">📖 Glossary — ${gl.length} terms (or type above to search everything):</p>`+
      gl.map((g,i)=>`<div class="sr"><div class="srh"><span class="srtype def">Definition</span><b>${esc(g.term)}</b></div><div class="srtext">${esc(g.definition)}</div><button class="srjump srtutor" data-i="${i}">🤖 Tutor me on this</button></div>`).join("");
    attachTutorBtns();
    return;
  }
  const terms=q.split(/\s+/);
  const matches=[];
  SEARCH_IDX.forEach(e=>{
    const tl=e.title.toLowerCase(), hay=tl+" "+e.text.toLowerCase();
    if(!terms.every(t=>hay.includes(t))) return;
    let score=0;
    if(tl===q) score+=100; else if(tl.startsWith(q)) score+=50; else if(tl.includes(q)) score+=25;
    if(e.cls==="def") score+=20;
    matches.push({e,score});
  });
  matches.sort((a,b)=>b.score-a.score);
  if(!matches.length){ box.innerHTML=`<p class="muted" style="margin-top:14px">No matches for "<b>${esc(qraw)}</b>". Try a shorter or different word.</p>`; return; }
  const cap=60, shown=matches.slice(0,cap);
  tutorItems = shown.map(s=>s.e);
  box.innerHTML=`<p class="muted" style="margin:12px 0 4px">${matches.length} result${matches.length>1?"s":""}${matches.length>cap?` (showing first ${cap})`:""}</p>`+
    shown.map(({e},i)=>{
      const jump=(e.tab&&e.tab!=="search")?`<button class="srjump" data-tab="${e.tab}">open in ${esc(tabLabel(e.tab))} →</button>`:"";
      return `<div class="sr"><div class="srh"><span class="srtype ${e.cls}">${e.type}</span><b>${hl(e.title,terms)}</b>${e.topic?` <span class="muted" style="font-size:12px">· ${esc(e.topic)}</span>`:""}</div><div class="srtext">${hl(snippet(e.text,q),terms)}</div><div class="row" style="gap:6px;margin-top:4px">${jump}<button class="srjump srtutor" data-i="${i}">🤖 Tutor me</button></div></div>`;
    }).join("");
  $$(".srjump:not(.srtutor)").forEach(b=>b.onclick=()=>setView(b.dataset.tab));
  attachTutorBtns();
}

const TUTOR_MODES=[
  {k:"explain", label:"Explain simply", instr:"Explain this in plain, simple English as if I'm meeting it for the first time. Use an everyday analogy, break it into small steps, and finish with a one-sentence summary I could write in an exam."},
  {k:"cram", label:"Exam cram", instr:"I just need to pass. Give me ONLY the high-yield points I'd need to answer an exam question on this, as a short bullet list, then a single \"If asked, say:\" model sentence I can memorise."},
  {k:"quiz", label:"Quiz me", instr:"Quiz me to check I understand this. Ask 5 questions one at a time (mix of multiple-choice and short-answer), wait for my answer each time, then tell me if I'm right and briefly explain. Ask question 1 now."},
  {k:"deep", label:"Deep dive", instr:"Help me genuinely understand this. Explain what it is, how it works step by step, why it matters in the human body, and how it links to the other Test 3 topics. Then check my understanding with 2 questions."},
  {k:"compare", label:"Compare & contrast", instr:"These are related ideas I keep mixing up. Lay them out in a comparison table (each one's definition, key features, and the main differences), then give me a quick tip for telling them apart in an exam."},
  {k:"mnemonic", label:"Memory tricks", instr:"Give me memory aids to lock this in for an exam — mnemonics, acronyms, or vivid associations — and state the exact facts each one helps me remember."},
];
function buildTutorPrompt(content, mode){
  const m=TUTOR_MODES.find(x=>x.k===mode)||TUTOR_MODES[0];
  const c=(content||"").trim() || "[paste your term or concept here]";
  return `You are my patient, expert tutor for a first-year Bachelor of Nursing course, "Health Science 1". I'm revising for Test 3, which covers: protein synthesis (DNA & RNA), nutrients, metabolism, and the digestive system. Keep everything at a first-year nursing level — accurate but not overwhelming — and define any jargon you use.

Here is what I need help with:
"""
${c}
"""

${m.instr}

If anything I pasted looks incorrect or muddled, gently correct it. At the end, ask if I'd like to be quizzed on it or want anything explained further.`;
}
function copyText(text, btn){
  const done=()=>{ if(btn){ const o=btn.dataset.lbl||btn.textContent; btn.dataset.lbl=o; btn.textContent="✓ Copied"; setTimeout(()=>btn.textContent=o,1400);} };
  if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(text).then(done).catch(()=>fallbackCopy(text,done)); }
  else fallbackCopy(text,done);
}
function fallbackCopy(text,cb){ const ta=document.createElement("textarea"); ta.value=text; ta.style.position="fixed"; ta.style.opacity="0"; document.body.appendChild(ta); ta.select(); try{document.execCommand("copy");}catch(e){} document.body.removeChild(ta); cb&&cb(); }
function attachTutorBtns(){ $$(".srtutor").forEach(b=>b.onclick=()=>{ const it=tutorItems[+b.dataset.i]; if(!it)return; tutorPrefill=((it.title||"")+(it.text?": "+it.text:"")).slice(0,800); renderTutor(); setView("tutor"); }); }

  inp.oninput=upd;
  $$("#tutorModes .smbtn").forEach(b=>b.onclick=()=>{ tutorMode=b.dataset.k; $$("#tutorModes .smbtn").forEach(x=>x.classList.toggle("on",x===b)); upd(); });
  $("#tutorCopy").onclick=()=>copyText(upd(), $("#tutorCopy"));

  $("#openGemini").onclick=()=>{ copyText(upd(), $("#openGemini")); window.open("https://gemini.google.com/app","_blank","noopener"); };
  upd();
  if(tutorPrefill){ tutorPrefill=""; inp.focus(); }

function startExam(){
  if(examTimer) clearInterval(examTimer);
  const n=Math.min(+$("#exN").value||25, ALLQ.length);
  const mins=+$("#exT").value||0;
  const cs=(DATA.caseStudies&&DATA.caseStudies.length)?shuffle(DATA.caseStudies)[0]:null;

function tickExam(){
  if(!examState||examState.finished){ clearInterval(examTimer); return; }
  examState.remain--;
  const t=$("#exTimer");
  if(t){ t.textContent=fmtTime(examState.remain); t.classList.toggle("low",examState.remain<=300); }
  if(examState.remain<=0){ clearInterval(examTimer); submitExam(true); }
}
function renderExamPaper(){
  const e=examState;
  let h=`<div class="examBar">
      <div class="timer ${e.mins>0&&e.remain<=300?"low":""}" id="exTimer">${e.mins>0?fmtTime(e.remain):"∞"}</div>
      <div class="kpi">${e.qs.length} MCQs${e.cs?" + 1 case study":""}</div>
      <div class="spacer" style="flex:1"></div>
      <button class="btn" id="exSubmit">Submit & mark</button>
    </div>
    <div class="card"><h2>Section A — Multiple choice</h2><p class="lead">Pick your answer(s). No feedback until you submit.</p></div>`;
  e.qs.forEach((q,qi)=>{
    const multi=q.multi&&Array.isArray(q.correctIndexes);
    h+=`<div class="exq"><div class="n">Q${qi+1}${multi?` · select all that apply (${q.correctIndexes.length})`:""}</div><div class="qtext" style="font-size:15px">${esc(q.question)}</div>`;
    q.options.forEach((o,oi)=>{ h+=`<button class="opt exopt" data-q="${qi}" data-o="${oi}">${esc(o)}</button>`; });
    h+=`</div>`;
  });
  if(e.cs){
    h+=`<div class="card"><h2>Section B — Case study</h2><p class="lead" style="font-style:italic">${esc(e.cs.scenario)}</p>
      <p class="muted">Answer each on paper (or in your head), then submit to reveal the model answers and self-mark.</p></div>`;
    (e.cs.questions||[]).forEach((q)=>{ h+=`<div class="exq csq"><div class="n">${esc(q.q)}${q.marks?` (${q.marks} mark${q.marks>1?"s":""})`:""}</div></div>`; });
  }
  $("#view-exam").innerHTML=h;
  $$(".exopt").forEach(btn=>{ btn.onclick=()=>{
    const qi=+btn.dataset.q, q=e.qs[qi], multi=q.multi&&Array.isArray(q.correctIndexes);
    if(multi){ btn.classList.toggle("sel"); }
    else { $$(`.exopt[data-q="${qi}"]`).forEach(b=>b.classList.remove("sel")); btn.classList.add("sel"); }
    e.answers[qi]=$$(`.exopt[data-q="${qi}"]`).filter(b=>b.classList.contains("sel")).map(b=>+b.dataset.o);
  };});
  $("#exSubmit").onclick=()=>{ if(confirm("Submit and mark your exam now?")) submitExam(false); };
}
function submitExam(auto){
  const e=examState; if(!e||e.finished) return; e.finished=true;
  if(examTimer) clearInterval(examTimer);
  let correct=0;
  e.qs.forEach((q,qi)=>{
    const sel=(e.answers[qi]||[]).slice().sort((a,b)=>a-b);
    const cset=((q.multi&&q.correctIndexes)?q.correctIndexes:[q.correctIndex]).slice().sort((a,b)=>a-b);
    const ok=sel.length===cset.length&&sel.length>0&&sel.every((v,k)=>v===cset[k]);
    q._ok=ok; q._cset=cset; if(ok)correct++;
  });
  e.mcqCorrect=correct;
  renderExamResults(auto);
}
function renderExamResults(auto){
  const e=examState, mcqTotal=e.qs.length;
  const csqs=(e.cs&&e.cs.questions)?e.cs.questions:[];
  const saqMax=csqs.reduce((a,q)=>a+(q.marks||2),0);
  function recalc(){
    let saq=0; csqs.forEach((q,i)=>{ if(e.selfmarks[i]!=null) saq+=e.selfmarks[i]*(q.marks||2); });
    const total=mcqTotal+saqMax, got=e.mcqCorrect+saq, pct=total?Math.round(got/total*100):0, pass=pct>=50;
    const allMarked=csqs.every((q,i)=>e.selfmarks[i]!=null);
    const head=$("#exResHead");
    if(head) head.innerHTML=`<div class="resultBig ${pass?"pass":"fail"}">${pct}%</div>
      <p class="lead">${pass?"PASS ✅ — above the 50% line":"Below 50% ❌ — keep grinding"}${allMarked||!csqs.length?"":` · <span class="muted">self-mark Section B to finalise</span>`}</p>
      <div class="kpi">MCQ ${e.mcqCorrect}/${mcqTotal}${csqs.length?` · Written (self-marked) ${saq.toFixed(1)}/${saqMax}`:""}</div>`;
    LS.set("lastExam",{pct,pass,mcqCorrect:e.mcqCorrect,mcqTotal});
  }
  let h=`<div class="card center"><h2>🎓 Results${auto?" (time up)":""}</h2><div id="exResHead"></div>
     <div class="row" style="justify-content:center;margin-top:12px"><button class="btn" id="exAgain">New mock exam</button> <button class="btn ghost" id="exReview">Show MCQ review ▾</button></div></div>`;
  if(csqs.length){
    h+=`<div class="card"><h2>Section B — self-mark vs the model answers</h2><p class="lead" style="font-style:italic">${esc(e.cs.name)}</p>`;
    csqs.forEach((q,i)=>{
      h+=`<div class="qa"><div class="q">${esc(q.q)}${q.marks?`<span class="marks">(${q.marks} mark${q.marks>1?"s":""})</span>`:""}</div>
        <div class="a">${fmtAnswer(q.modelAnswer)}</div>
        <div class="selfmark" data-c="${i}"><button class="smbtn" data-f="1">Got it ✓</button><button class="smbtn" data-f="0.5">Partly</button><button class="smbtn" data-f="0">Missed ✗</button></div></div>`;
    });
    h+=`</div>`;
  }
  h+=`<div class="card" id="exReviewBox" style="display:none"><h2>MCQ review</h2>`;
  e.qs.forEach((q,qi)=>{ h+=`<div class="qa"><div class="q">${q._ok?"✅":"❌"} Q${qi+1}. ${esc(q.question)}</div>
      <div class="a">Correct: <b>${esc(q._cset.map(i=>q.options[i]).join(", "))}</b>${q.explanation?` — ${esc(q.explanation)}`:""}</div></div>`; });
  h+=`</div>`;
  $("#view-exam").innerHTML=h;
  $$(".selfmark").forEach(sm=>{ const ci=+sm.dataset.c;
    $$(".smbtn",sm).forEach(b=>{ b.onclick=()=>{ $$(".smbtn",sm).forEach(x=>x.classList.remove("on")); b.classList.add("on"); e.selfmarks[ci]=+b.dataset.f; recalc(); }; });
  });
  $("#exAgain").onclick=()=>{ examState=null; renderExam(); window.scrollTo({top:0}); };
  $("#exReview").onclick=()=>{ const bx=$("#exReviewBox"); bx.style.display=bx.style.display==="none"?"block":"none"; };
  recalc(); window.scrollTo({top:0});
}

/* ---------- pointer tilt (3D liveliness) ---------- */
(function(){
  if(matchMedia("(prefers-reduced-motion: reduce)").matches || matchMedia("(hover:none)").matches) return;
  const MAX=4;
  const tag=root=>(root.querySelectorAll?root.querySelectorAll(".card:not(.tilt)"):[]).forEach(c=>c.classList.add("tilt"));
  tag(document);
  new MutationObserver(ms=>ms.forEach(m=>m.addedNodes.forEach(n=>n.nodeType===1&&tag(n)))).observe(document.body,{childList:true,subtree:true});
  document.addEventListener("pointermove",e=>{
    const card=e.target.closest&&e.target.closest(".tilt"); if(!card)return;
    const r=card.getBoundingClientRect();
    const px=(e.clientX-r.left)/r.width-.5, py=(e.clientY-r.top)/r.height-.5;
    card.style.setProperty("--rx",(px*MAX*2).toFixed(2)+"deg");
    card.style.setProperty("--ry",(-py*MAX*2).toFixed(2)+"deg");
  },{passive:true});
  document.addEventListener("pointerleave",e=>{
    const card=e.target.closest&&e.target.closest(".tilt");
    if(card){card.style.setProperty("--rx","0deg");card.style.setProperty("--ry","0deg");}
  },true);
})();
