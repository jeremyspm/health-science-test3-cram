<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test 3 Cram — Health Science 1</title>
<style>
  :root{
    --bg:#0e1116; --bg2:#161b22; --bg3:#1c2230; --line:#2b3340;
    --txt:#e6edf3; --mut:#9aa7b4; --acc:#4f9dff; --acc2:#7c5cff;
    --good:#2ea043; --good-bg:#0f2a16; --bad:#e5534b; --bad-bg:#2a1212;
    --warn:#d9a000; --warn-bg:#2a2410; --chip:#22304a;
    --r:14px; --sh:0 6px 24px rgba(0,0,0,.35);
  }
  [data-theme="light"]{
    --bg:#f4f6fa; --bg2:#ffffff; --bg3:#eef2f8; --line:#dde3ec;
    --txt:#161b22; --mut:#5a6675; --acc:#1666d6; --acc2:#6a40e0;
    --good:#1a7f37; --good-bg:#e6f5ec; --bad:#c5302a; --bad-bg:#fbeceb;
    --warn:#9a7400; --warn-bg:#fbf3d6; --chip:#dfe8f8; --sh:0 6px 24px rgba(20,30,50,.10);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:var(--bg);color:var(--txt);font:16px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased}
  a{color:var(--acc)}
  .wrap{max-width:920px;margin:0 auto;padding:0 16px 120px}
  header{position:sticky;top:0;z-index:30;background:linear-gradient(180deg,var(--bg) 70%,transparent);padding:14px 0 8px;backdrop-filter:blur(6px)}
  .top{display:flex;align-items:center;gap:12px;max-width:920px;margin:0 auto;padding:0 16px}
  .brand{font-weight:800;font-size:18px;letter-spacing:.2px}
  .brand small{display:block;font-weight:500;color:var(--mut);font-size:12px;letter-spacing:.3px}
  .spacer{flex:1}
  .iconbtn{background:var(--bg2);border:1px solid var(--line);color:var(--txt);border-radius:10px;padding:7px 10px;font-size:13px;cursor:pointer}
  .iconbtn:hover{border-color:var(--acc)}
  nav.tabs{display:flex;gap:6px;overflow-x:auto;padding:10px 16px 0;max-width:920px;margin:0 auto;scrollbar-width:none}
  nav.tabs::-webkit-scrollbar{display:none}
  .tab{white-space:nowrap;border:1px solid var(--line);background:var(--bg2);color:var(--mut);padding:9px 14px;border-radius:999px;cursor:pointer;font-size:14px;font-weight:600}
  .tab.active{background:var(--acc);border-color:var(--acc);color:#fff}
  .view{display:none;animation:fade .25s ease}
  .view.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1}}
  .card{background:var(--bg2);border:1px solid var(--line);border-radius:var(--r);padding:18px;margin:14px 0;box-shadow:var(--sh)}
  .card h2{margin:.1em 0 .4em;font-size:20px}
  .card h3{margin:1em 0 .3em;font-size:16px}
  .lead{color:var(--mut);font-size:14.5px}
  .pill{display:inline-block;background:var(--chip);color:var(--acc);border-radius:999px;padding:2px 10px;font-size:12px;font-weight:700;margin:2px 4px 2px 0}
  .pill.warn{background:var(--warn-bg);color:var(--warn)}
  .pill.good{background:var(--good-bg);color:var(--good)}
  .grid{display:grid;gap:12px}
  @media(min-width:640px){.grid.two{grid-template-columns:1fr 1fr}}
  .stat{background:var(--bg3);border:1px solid var(--line);border-radius:12px;padding:14px}
  .stat b{font-size:26px;display:block}
  .stat span{color:var(--mut);font-size:13px}
  ul.tight{margin:.3em 0;padding-left:1.2em}
  ul.tight li{margin:.28em 0}
  .acc{border:1px solid var(--line);border-radius:12px;margin:10px 0;overflow:hidden;background:var(--bg2)}
  .acc>summary{cursor:pointer;padding:14px 16px;font-weight:700;list-style:none;display:flex;align-items:center;gap:10px}
  .acc>summary::-webkit-details-marker{display:none}
  .acc>summary::after{content:"▸";margin-left:auto;color:var(--mut);transition:.2s}
  .acc[open]>summary::after{transform:rotate(90deg)}
  .acc .body{padding:0 16px 16px;border-top:1px solid var(--line)}
  .qa{margin:14px 0}
  .qa .q{font-weight:700}
  .qa .marks{color:var(--acc);font-size:12px;font-weight:700;margin-left:6px}
  .a{margin-top:6px;background:var(--bg3);border-left:3px solid var(--good);border-radius:8px;padding:10px 14px;font-size:14.5px}
  .a p{margin:.55em 0} .a p:first-child{margin-top:0} .a p:last-child{margin-bottom:0}
  .a ol.ans,.a ul.ans{margin:.4em 0;padding-left:1.45em} .a ol.ans li,.a ul.ans li{margin:.4em 0;padding-left:.15em}
  .a b{color:var(--txt);font-weight:700}
  table{width:100%;border-collapse:collapse;margin:8px 0;font-size:14px}
  th,td{border:1px solid var(--line);padding:8px 10px;text-align:left;vertical-align:top}
  th{background:var(--bg3);color:var(--acc)}
  /* MCQ */
  .mcqbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:10px 0}
  select,.sel{background:var(--bg2);border:1px solid var(--line);color:var(--txt);border-radius:10px;padding:8px 10px;font-size:14px}
  .btn{background:var(--acc);border:none;color:#fff;border-radius:10px;padding:9px 16px;font-weight:700;cursor:pointer;font-size:14px}
  .btn.ghost{background:var(--bg2);border:1px solid var(--line);color:var(--txt)}
  .btn:disabled{opacity:.45;cursor:default}
  .prog{height:8px;background:var(--bg3);border-radius:999px;overflow:hidden;margin:10px 0}
  .prog>i{display:block;height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2));width:0}
  .opt{display:block;width:100%;text-align:left;background:var(--bg3);border:1px solid var(--line);color:var(--txt);border-radius:10px;padding:12px 14px;margin:8px 0;cursor:pointer;font-size:15px}
  .opt:hover{border-color:var(--acc)}
  .opt.sel{border-color:var(--acc);background:var(--chip)}
  .opt.correct{background:var(--good-bg);border-color:var(--good)}
  .opt.wrong{background:var(--bad-bg);border-color:var(--bad)}
  .opt .mk{float:right;font-weight:800}
  .expl{margin:8px 0;padding:10px 12px;border-radius:10px;background:var(--bg3);border-left:3px solid var(--acc);font-size:14px;display:none}
  .expl.show{display:block}
  .qmeta{color:var(--mut);font-size:13px;margin-bottom:4px}
  .qtext{font-weight:700;font-size:17px;margin:4px 0 6px}
  /* Flashcards */
  .fc{perspective:1200px;margin:14px 0}
  .fcInner{position:relative;min-height:200px;transition:transform .5s;transform-style:preserve-3d;cursor:pointer}
  .fc.flip .fcInner{transform:rotateY(180deg)}
  .fcFace{position:absolute;inset:0;backface-visibility:hidden;border:1px solid var(--line);border-radius:16px;padding:24px;display:flex;align-items:center;justify-content:center;text-align:center;background:var(--bg2);box-shadow:var(--sh)}
  .fcBack{transform:rotateY(180deg);background:var(--bg3)}
  .fcFace .lbl{position:absolute;top:12px;left:16px;font-size:11px;letter-spacing:1px;color:var(--mut);font-weight:700}
  .fcFace .txt{font-size:19px;font-weight:600}
  .fcBack .txt{font-size:16px;font-weight:500;white-space:pre-wrap}
  .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .searchbox{width:100%;background:var(--bg2);border:1px solid var(--line);color:var(--txt);border-radius:10px;padding:11px 14px;font-size:15px;margin:6px 0}
  .muted{color:var(--mut)}
  .badge{font-size:11px;font-weight:800;letter-spacing:.4px;padding:2px 8px;border-radius:6px;background:var(--warn-bg);color:var(--warn);margin-left:8px}
  .kpi{font-size:13px;color:var(--mut)}
  .center{text-align:center}
  .big{font-size:34px;font-weight:800}
  hr{border:none;border-top:1px solid var(--line);margin:16px 0}
  .note{background:var(--warn-bg);border:1px solid var(--warn);color:var(--txt);border-radius:10px;padding:10px 12px;font-size:13.5px}
  footer{color:var(--mut);font-size:12px;text-align:center;padding:24px 0}
  /* Exam mode */
  .examBar{position:sticky;top:60px;z-index:20;display:flex;align-items:center;gap:12px;background:var(--bg2);border:1px solid var(--acc);border-radius:12px;padding:10px 14px;margin:10px 0;box-shadow:var(--sh)}
  .timer{font-variant-numeric:tabular-nums;font-weight:800;font-size:22px;min-width:64px}
  .timer.low{color:var(--bad)}
  .exq{background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin:10px 0}
  .exq .n{color:var(--acc);font-weight:800;font-size:13px;margin-bottom:4px}
  .csq .n{color:var(--txt);font-weight:700;font-size:15px}
  .selfmark{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
  .smbtn{border:1px solid var(--line);background:var(--bg3);color:var(--txt);border-radius:8px;padding:6px 12px;font-size:13px;font-weight:700;cursor:pointer}
  .smbtn.on{background:var(--acc);border-color:var(--acc);color:#fff}
  .resultBig{font-size:48px;font-weight:800;line-height:1.05}
  .pass{color:var(--good)} .fail{color:var(--bad)}
  /* Diagrams */
  .diagram{background:var(--bg3);border:1px solid var(--line);border-radius:12px;padding:14px;margin:12px 0;overflow-x:auto}
  .diagram svg{display:block;max-width:100%;height:auto;margin:0 auto}
  .dg-fill{fill:var(--bg2);stroke:var(--acc);stroke-width:2}
  .dg-acc{fill:var(--chip);stroke:var(--acc);stroke-width:2}
  .dg-txt{fill:var(--txt);font-family:inherit;font-size:13px;font-weight:700}
  .dg-sub{fill:var(--mut);font-family:inherit;font-size:10.5px;font-weight:500}
  .dg-line{stroke:var(--mut);stroke-width:1.3;fill:none}
  .dg-dash{stroke:var(--mut);stroke-width:1.3;fill:none;stroke-dasharray:4 3}
  .cap{color:var(--mut);font-size:13px;margin:2px 0 0}
  /* Search */
  .sr{border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin:8px 0;background:var(--bg2)}
  .srh{font-size:15px;line-height:1.4}
  .srtext{color:var(--mut);font-size:13.5px;margin-top:4px;white-space:pre-wrap}
  .srtype{font-size:10px;font-weight:800;letter-spacing:.4px;padding:2px 7px;border-radius:6px;text-transform:uppercase;margin-right:6px;background:var(--chip);color:var(--acc);white-space:nowrap}
  .srtype.def{background:var(--acc2);color:#fff}
  .srjump{margin-top:8px;background:none;border:1px solid var(--line);color:var(--acc);border-radius:8px;padding:4px 10px;font-size:12px;font-weight:700;cursor:pointer}
  .srjump:hover{border-color:var(--acc)}
  mark{background:var(--warn);color:#000;border-radius:3px;padding:0 2px}
  .srtutor{color:var(--acc2)!important;border-color:var(--acc2)!important}
  /* Tutor */
  .ta{width:100%;min-height:96px;background:var(--bg2);border:1px solid var(--line);color:var(--txt);border-radius:10px;padding:11px 14px;font-size:15px;font-family:inherit;resize:vertical}
  .ta:focus{outline:none;border-color:var(--acc)}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0}
  .promptout{white-space:pre-wrap;background:var(--bg3);border:1px solid var(--line);border-radius:10px;padding:12px 14px;font-size:13.5px;line-height:1.5;max-height:340px;overflow:auto;margin:8px 0}
  /* Print cheat sheet */
  #printSheet{display:none}
  @media print{
    header,footer,nav.tabs,.view{display:none !important}
    body{background:#fff;color:#000}
    #printSheet{display:block !important;color:#000;font-size:9.5px}
    #printSheet *{color:#000 !important}
    #printSheet h1{font-size:17px;margin:0 0 2px}
    #printSheet .sub{font-size:9px;margin:0 0 6px;color:#444 !important}
    #printSheet h2{font-size:11px;margin:7px 0 2px;border-bottom:1px solid #000;padding-bottom:1px}
    #printSheet .ps-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 14px}
    #printSheet ul{margin:1px 0;padding-left:13px} #printSheet li{font-size:9px;margin:1px 0;line-height:1.25}
    #printSheet p{font-size:9px;margin:2px 0;line-height:1.3}
    #printSheet table{width:100%;border-collapse:collapse;font-size:8px}
    #printSheet th,#printSheet td{border:1px solid #999;padding:1px 3px;text-align:left;vertical-align:top}
    #printSheet .box{break-inside:avoid}
    @page{margin:9mm}
  }

  /* ======================= LIQUID GLASS ======================= */
  /* §0 tokens */
  :root{
    --glass-bg:rgba(22,27,34,.62); --glass-bg-strong:rgba(22,27,34,.9); --glass-bg-soft:rgba(28,34,48,.5);
    --glass-blur:14px; --glass-sat:180%;
    --glass-rim:linear-gradient(135deg,rgba(255,255,255,.42) 0%,rgba(150,190,255,.20) 9%,rgba(255,255,255,.10) 20%,rgba(255,255,255,0) 47%,rgba(255,255,255,.05) 66%,rgba(255,210,160,.14) 89%,rgba(255,255,255,.22) 100%);
    --glass-sheen:linear-gradient(180deg,rgba(255,255,255,.08),transparent 38%),linear-gradient(118deg,transparent 34%,rgba(255,255,255,.055) 45%,transparent 54%);
    --rim-color:rgba(255,255,255,.13); --shade-color:rgba(0,0,0,.16);
    --elev-1:0 2px 8px rgba(0,0,0,.30), inset 0 1px 0 var(--rim-color);
    --elev-2:0 10px 26px -8px rgba(0,0,0,.50), 0 3px 10px rgba(0,0,0,.34), inset 0 1px 1px var(--rim-color), inset 0 -10px 22px var(--shade-color);
    --elev-3:0 22px 50px -12px rgba(0,0,0,.60), 0 6px 16px rgba(0,0,0,.42), inset 0 1px 1px var(--rim-color), inset 0 -12px 26px var(--shade-color);
    --ease-std:cubic-bezier(.4,0,.2,1); --ease-out:cubic-bezier(.22,1,.36,1); --dur-fast:130ms; --dur:220ms;
  }
  [data-theme="light"]{
    --glass-bg:rgba(255,255,255,.60); --glass-bg-strong:rgba(255,255,255,.9); --glass-bg-soft:rgba(238,242,248,.6); --glass-sat:170%;
    --glass-rim:linear-gradient(135deg,rgba(255,255,255,.95) 0%,rgba(150,185,255,.40) 9%,rgba(255,255,255,.45) 20%,rgba(255,255,255,0) 47%,rgba(255,255,255,.20) 66%,rgba(255,200,150,.30) 89%,rgba(255,255,255,.80) 100%);
    --glass-sheen:linear-gradient(180deg,rgba(255,255,255,.55),transparent 40%),linear-gradient(118deg,transparent 36%,rgba(255,255,255,.30) 46%,transparent 55%);
    --rim-color:rgba(255,255,255,.65); --shade-color:rgba(20,30,50,.07);
    --elev-1:0 2px 8px rgba(20,30,50,.08), inset 0 1px 0 var(--rim-color);
    --elev-2:0 12px 30px -10px rgba(20,30,50,.18), 0 3px 10px rgba(20,30,50,.10), inset 0 1px 1px var(--rim-color), inset 0 -10px 22px var(--shade-color);
    --elev-3:0 20px 46px -12px rgba(20,30,50,.22), 0 5px 14px rgba(20,30,50,.12), inset 0 1px 1px var(--rim-color), inset 0 -12px 26px var(--shade-color);
  }
  /* §1 living background */
  body{
    background:
      radial-gradient(60% 50% at 18% 8%, color-mix(in srgb, var(--acc) 10%, transparent), transparent 70%),
      radial-gradient(55% 50% at 85% 22%, color-mix(in srgb, var(--acc2) 9%, transparent), transparent 70%),
      var(--bg);
    background-attachment:fixed;
  }
  .aurora{position:fixed; inset:0; z-index:-1; overflow:hidden; pointer-events:none; contain:strict}
  .aurora span{position:absolute; border-radius:50%; filter:blur(90px); opacity:.30; mix-blend-mode:screen; will-change:transform}
  [data-theme="light"] .aurora span{opacity:.42; filter:blur(80px); mix-blend-mode:multiply}
  .aurora span:nth-child(1){width:620px;height:620px; top:-180px; left:-140px; background:var(--acc);  animation:auroraA 34s var(--ease-std) infinite}
  .aurora span:nth-child(2){width:560px;height:560px; bottom:-200px; right:-160px; background:var(--acc2); animation:auroraB 42s var(--ease-std) infinite}
  .aurora span:nth-child(3){width:440px;height:440px; top:38%; left:46%; background:var(--good); animation:auroraC 50s var(--ease-std) infinite}
  @keyframes auroraA{0%,100%{transform:translate3d(0,0,0) scale(1)}35%{transform:translate3d(120px,80px,0) scale(1.12) rotate(28deg)}70%{transform:translate3d(40px,170px,0) scale(.92) rotate(-22deg)}}
  @keyframes auroraB{0%,100%{transform:translate3d(0,0,0) scale(1)}40%{transform:translate3d(-130px,-70px,0) scale(1.10) rotate(-30deg)}75%{transform:translate3d(-50px,40px,0) scale(.94) rotate(24deg)}}
  @keyframes auroraC{0%,100%{transform:translate3d(-50%,-50%,0) scale(1)}50%{transform:translate3d(calc(-50% + 90px), calc(-50% - 60px),0) scale(1.15)}}
  /* §2 glass material (blurred surfaces) */
  :where(.card,.acc,.fcFace,.examBar){
    position:relative; isolation:isolate;
    background:var(--glass-bg) !important;
    -webkit-backdrop-filter:blur(var(--glass-blur)) saturate(var(--glass-sat));
    backdrop-filter:blur(var(--glass-blur)) saturate(var(--glass-sat));
    border:1px solid transparent;
    box-shadow:var(--elev-2);
  }
  :where(.card,.acc,.fcFace,.examBar,.sr)::before{
    content:""; position:absolute; inset:0; border-radius:inherit; padding:1.4px; pointer-events:none; z-index:2;
    background:var(--glass-rim);
    -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0); -webkit-mask-composite:xor;
    mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0); mask-composite:exclude;
  }
  :where(.card,.acc,.fcFace)::after{content:""; position:absolute; inset:0; border-radius:inherit; pointer-events:none; z-index:1; background:var(--glass-sheen)}
  :where(.card,.acc,.fcFace,.examBar,.sr)>*{position:relative; z-index:3}
  /* per-component */
  .card{box-shadow:var(--elev-2)}
  .acc{overflow:visible}
  .acc>summary{border-radius:12px}
  .acc .body{position:relative; z-index:3; background:transparent}
  .acc .acc{background:var(--glass-bg-strong) !important; -webkit-backdrop-filter:none; backdrop-filter:none; box-shadow:var(--elev-1)}
  .fcFace,.fcBack{background:var(--glass-bg-strong) !important}
  .examBar{box-shadow:var(--elev-2)}
  .sr{background:var(--glass-bg-strong) !important; -webkit-backdrop-filter:none; backdrop-filter:none; box-shadow:var(--elev-1); border-radius:12px}
  /* §3 inner opaque wells (no blur, recessed) */
  .stat,.a,.expl,.promptout,.diagram,.prog{box-shadow:inset 0 1px 0 var(--rim-color), inset 0 -6px 14px var(--shade-color)}
  .stat{border-radius:12px}
  /* §4 micro-interactions */
  .card,.acc,.sr{transition:transform var(--dur) var(--ease-out), box-shadow var(--dur) var(--ease-out); transform:translateY(0)}
  .card:not(.tilt):hover{transform:translateY(-2px)}
  .card:hover{box-shadow:var(--elev-3)}
  .acc:hover{transform:translateY(-1px); box-shadow:var(--elev-3)}
  .sr:hover{transform:translateY(-1px); box-shadow:var(--elev-2)}
  .fc:hover .fcFace{box-shadow:var(--elev-3)}
  .btn{
    background:linear-gradient(180deg, color-mix(in srgb, var(--acc) 88%, #fff 12%), var(--acc));
    box-shadow:inset 0 1px 0 rgba(255,255,255,.30), 0 4px 12px -2px color-mix(in srgb, var(--acc) 50%, transparent), 0 1px 2px rgba(0,0,0,.28);
    transition:transform var(--dur-fast) var(--ease-out), box-shadow var(--dur-fast) var(--ease-out), filter var(--dur-fast) var(--ease-out);
  }
  .btn:hover:not(:disabled){transform:translateY(-1px); filter:brightness(1.06); box-shadow:inset 0 1px 0 rgba(255,255,255,.34), 0 7px 18px -3px color-mix(in srgb, var(--acc) 55%, transparent), 0 2px 4px rgba(0,0,0,.30)}
  .btn:active:not(:disabled){transform:translateY(0) scale(.97); filter:brightness(.98); box-shadow:inset 0 1px 2px rgba(0,0,0,.25), 0 1px 2px rgba(0,0,0,.20)}
  .btn.ghost{background:var(--glass-bg) !important; color:var(--txt); -webkit-backdrop-filter:blur(8px) saturate(160%); backdrop-filter:blur(8px) saturate(160%); border:1px solid var(--line); box-shadow:inset 0 1px 0 var(--rim-color), 0 2px 8px rgba(0,0,0,.18)}
  .btn.ghost:hover:not(:disabled){transform:translateY(-1px); border-color:var(--acc); box-shadow:var(--elev-1)}
  .btn.ghost:active:not(:disabled){transform:translateY(0) scale(.97)}
  .iconbtn,.smbtn,.srjump{transition:transform var(--dur-fast) var(--ease-out), border-color var(--dur-fast), box-shadow var(--dur-fast)}
  .iconbtn:hover,.smbtn:hover,.srjump:hover{transform:translateY(-1px); box-shadow:var(--elev-1)}
  .iconbtn:active,.smbtn:active,.srjump:active{transform:translateY(0) scale(.96)}
  .smbtn.on{background:linear-gradient(180deg, color-mix(in srgb,var(--acc) 88%,#fff 12%), var(--acc)); box-shadow:inset 0 1px 0 rgba(255,255,255,.28), 0 2px 6px rgba(0,0,0,.22)}
  .opt{transition:transform var(--dur-fast) var(--ease-out), border-color var(--dur-fast), background var(--dur-fast), box-shadow var(--dur-fast); box-shadow:inset 0 1px 0 var(--rim-color)}
  .opt:hover{transform:translateY(-1px); box-shadow:var(--elev-1)}
  .opt:active{transform:translateY(0) scale(.99)}
  .opt.sel{box-shadow:var(--elev-1), 0 0 0 1px var(--acc) inset}

const DATA = {"quizzes": [{"id": "01", "title": "Carbohydrate Metabolism", "topic": "Metabolism", "questions": [{"type": "mcq", "question": "The primary purpose of carbohydrate metabolism in the human body is to:", "marks": 1, "options": ["store vitamins", "regulate body temperature", "produce energy", "build muscle tissue"], "correctIndex": 2, "answer": "produce energy", "explanation": "Carbohydrates are broken down to glucose, which cells oxidise to generate ATP, the body's main energy currency."}, {"type": "mcq", "question": "The main carbohydrate found in the diet that is broken down during digestion is:", "marks": 1, "options": ["starch", "fibre", "glucose", "glycogen"], "correctIndex": 0, "answer": "starch", "explanation": "Starch is the major digestible dietary carbohydrate (from plants/grains); fibre is indigestible and glycogen is an animal storage form eaten in small amounts."}, {"type": "mcq", "question": "During digestion, carbohydrates are mainly broken down into:", "marks": 1, "options": ["glycerol molecules", "amino acids", "glucose molecules", "glycogen molecules"], "correctIndex": 2, "answer": "glucose molecules", "explanation": "Dietary carbohydrates are digested into monosaccharides, predominantly glucose, which is then absorbed into the blood."}, {"type": "mcq", "question": "Excess glucose that is not immediately required for energy is stored in the liver and muscles as:", "marks": 1, "options": ["glycogen", "lactate", "starch", "ketones"], "correctIndex": 0, "answer": "glycogen", "explanation": "Surplus glucose is converted by glycogenesis into glycogen, the body's storage carbohydrate held in the liver and skeletal muscle."}, {"type": "mcq", "question": "When blood glucose levels fall between meals, which hormone helps raise blood glucose levels?", "marks": 1, "options": ["glucagon", "thyroxine", "oestrogen", "insulin"], "correctIndex": 0, "answer": "glucagon", "explanation": "Glucagon from pancreatic alpha cells stimulates glycogenolysis and gluconeogenesis to raise blood glucose, opposing insulin."}, {"type": "mcq", "question": "Which statement best describes glycolysis?", "marks": 1, "options": ["breakdown of glucose to release energy", "the conversion of protein into fat", "the conversion of fat into glucose", "the storage of glucose as glycogen"], "correctIndex": 0, "answer": "breakdown of glucose to release energy", "explanation": "Glycolysis is the breakdown of glucose into pyruvate, releasing energy as ATP."}, {"type": "mcq", "question": "Why is understanding carbohydrate metabolism important in nursing practice?", "marks": 1, "options": ["It allows nurses to prescribe insulin", "It explains how muscles increase in size", "It helps nurses understand conditions such as diabetes mellitus", "It explains how the kidneys remove waste"], "correctIndex": 2, "answer": "It helps nurses understand conditions such as diabetes mellitus", "explanation": "Diabetes mellitus is a disorder of glucose regulation, so understanding carbohydrate metabolism underpins nursing assessment and care of these patients."}, {"type": "mcq", "question": "Carbohydrate metabolism takes place primarily in which parts of the body?", "marks": 1, "options": ["mouth and large intestine", "large intestine only", "stomach and small intestine", "mouth and small intestine"], "correctIndex": 3, "answer": "mouth and small intestine", "explanation": "Carbohydrate digestion begins in the mouth with salivary amylase and is completed in the small intestine by pancreatic amylase and brush-border enzymes."}, {"type": "mcq", "question": "The enzyme amylase plays a key role in carbohydrate metabolism by:", "marks": 1, "options": ["Starting the digestion of starch", "Absorbing glucose into the bloodstream", "Breaking down proteins", "Converting glucose to glycogen"], "correctIndex": 0, "answer": "Starting the digestion of starch", "explanation": "Amylase (salivary and pancreatic) begins the breakdown of starch into smaller sugars such as maltose."}, {"type": "mcq", "question": "When blood glucose levels are high, insulin promotes:", "marks": 1, "options": ["Breakdown of glycogen", "Conversion of glucose to glycogen", "Release of glucose into the blood", "Conversion of glucose to ketones"], "correctIndex": 1, "answer": "Conversion of glucose to glycogen", "explanation": "Insulin lowers blood glucose by promoting cellular glucose uptake and glycogenesis (storing glucose as glycogen)."}, {"type": "mcq", "question": "What happens to glucose once it enters a body cell?", "marks": 1, "options": ["It is excreted by the kidneys", "It is converted directly into protein", "It can be used immediately to produce energy", "It is stored only"], "correctIndex": 2, "answer": "It can be used immediately to produce energy", "explanation": "Glucose entering a cell can be oxidised straight away via glycolysis and cellular respiration to produce ATP."}, {"type": "mcq", "question": "Which carbohydrate storage form is found primarily in the liver and skeletal muscles?", "marks": 1, "options": ["glycogen", "glucose", "starch", "cellulose"], "correctIndex": 0, "answer": "glycogen", "explanation": "Glycogen is the storage form of carbohydrate in humans, held mainly in the liver and skeletal muscle."}]}, {"id": "02", "title": "Lipid Metabolism", "topic": "Metabolism", "questions": [{"type": "mcq", "question": "The primary role of lipid metabolism in the human body is to:", "marks": 1, "options": ["Regulate blood glucose directly", "Provide short-term energy only", "Produce enzymes", "Provide long-term energy storage and insulation"], "correctIndex": 3, "answer": "Provide long-term energy storage and insulation", "explanation": "Lipids are the body's main long-term energy reserve stored in adipose tissue, which also provides insulation and cushioning."}, {"type": "mcq", "question": "Dietary lipids are mainly digested in the:", "marks": 1, "options": ["stomach", "small intestine", "large intestine", "mouth"], "correctIndex": 1, "answer": "small intestine", "explanation": "Most fat digestion occurs in the small intestine where bile emulsifies fats and pancreatic lipase breaks them down."}, {"type": "mcq", "question": "Which substance is released by the liver to help break down fats into smaller droplets?", "marks": 1, "options": ["lipase", "amylase", "gastric juice", "bile"], "correctIndex": 3, "answer": "bile", "explanation": "Bile, produced by the liver (and stored/concentrated in the gallbladder), emulsifies large fat globules into smaller droplets, increasing the surface area for lipase to act on. Note that bile emulsifies fat physically; it is not an enzyme and does not chemically digest it."}, {"type": "mcq", "question": "The main enzyme responsible for breaking down triglycerides into fatty acids is:", "marks": 1, "options": ["amylase", "trypsin", "pepsin", "lipase"], "correctIndex": 3, "answer": "lipase", "explanation": "Lipase (mainly pancreatic lipase) digests triglycerides into fatty acids and monoglycerides/glycerol. Amylase acts on carbohydrates, while trypsin and pepsin act on proteins."}, {"type": "mcq", "question": "During digestion, lipids are broken down into:", "marks": 1, "options": ["glucose and glycerol", "amino acids only", "triglycerides only", "fatty acids and glycerol"], "correctIndex": 3, "answer": "fatty acids and glycerol", "explanation": "Triglycerides are hydrolysed into fatty acids and glycerol (plus monoglycerides), the absorbable end products of lipid digestion."}, {"type": "mcq", "question": "After absorption, most lipids are transported in the body:", "marks": 1, "options": ["dissolved freely in blood plasma", "directly to the kidneys", "as lipoproteins", "attached to red blood cells"], "correctIndex": 2, "answer": "as lipoproteins", "explanation": "Because lipids are insoluble in water, they are packaged with proteins as lipoproteins (e.g. chylomicrons, LDL, HDL) for transport in the blood."}, {"type": "mcq", "question": "Excess lipids that are not immediately required for energy are mainly stored in:", "marks": 1, "options": ["blood plasma", "adipose tissue", "skeletal muscle tissue", "liver cells"], "correctIndex": 1, "answer": "adipose tissue", "explanation": "Surplus lipids are stored as triglycerides in adipose tissue, the body's primary fat-storage depot."}, {"type": "mcq", "question": "When carbohydrate intake is low, lipids can be broken down to provide:", "marks": 1, "options": ["glucose directly", "amino acids", "energy and ketone bodies", "glycogen"], "correctIndex": 2, "answer": "energy and ketone bodies", "explanation": "With low carbohydrate availability, fatty acids are oxidised for energy and the liver converts excess acetyl-CoA into ketone bodies as an alternative fuel. Note that fatty acids cannot be converted directly into glucose."}, {"type": "mcq", "question": "Which hormone promotes the storage of fat after a meal?", "marks": 1, "options": ["adrenaline", "cortisol", "insulin", "glucagon"], "correctIndex": 2, "answer": "insulin", "explanation": "Insulin, released after a meal, is an anabolic hormone that promotes fat storage (lipogenesis) and inhibits fat breakdown (lipolysis)."}, {"type": "mcq", "question": "During prolonged fasting or starvation, increased fat metabolism can lead to the production of:", "marks": 1, "options": ["lactic acid", "ketone bodies", "amino acids", "glycogen"], "correctIndex": 1, "answer": "ketone bodies", "explanation": "Prolonged fasting increases fatty acid oxidation, and the resulting excess acetyl-CoA is converted by the liver into ketone bodies, which can acidify the blood (ketoacidosis) if produced in large amounts."}]}, {"id": "03", "title": "Protein Metabolism", "topic": "Metabolism", "questions": [{"type": "mcq", "question": "The main function of protein metabolism in the human body is to:", "marks": 1, "options": ["regulate body temperature", "provide immediate energy", "build and repair body tissues", "store glucose"], "correctIndex": 2, "answer": "build and repair body tissues", "explanation": "Proteins are primarily structural and functional, supplying amino acids to build and repair tissues rather than serving as an immediate energy or storage source."}, {"type": "mcq", "question": "During digestion, dietary proteins are broken down into:", "marks": 1, "options": ["glycerols", "glucose", "fatty acids", "amino acids"], "correctIndex": 3, "answer": "amino acids", "explanation": "Proteases break peptide bonds so that proteins are digested into their building blocks, amino acids, which are then absorbed."}, {"type": "mcq", "question": "Protein digestion begins primarily in the:", "marks": 1, "options": ["mouth", "large intestine", "stomach", "small intestine"], "correctIndex": 2, "answer": "stomach", "explanation": "Chemical protein digestion starts in the stomach, where acidic gastric juice converts pepsinogen to pepsin, which begins breaking proteins into smaller peptides. (The mouth only does mechanical chewing of protein, not chemical digestion.)"}, {"type": "mcq", "question": "Which enzyme plays a major role in starting protein digestion in the stomach?", "marks": 1, "options": ["trypsin", "amylase", "lipase", "pepsin"], "correctIndex": 3, "answer": "pepsin", "explanation": "Pepsin (from pepsinogen activated by gastric acid) is the stomach's main protein-digesting enzyme, whereas trypsin acts later in the small intestine and amylase/lipase digest carbohydrate/fat."}, {"type": "mcq", "question": "After digestion, amino acids are absorbed mainly in the:", "marks": 1, "options": ["pancreas", "liver", "large intestine", "small intestine"], "correctIndex": 3, "answer": "small intestine", "explanation": "The small intestine, with its villi and microvilli, is the principal site of nutrient absorption, taking amino acids into the blood."}, {"type": "mcq", "question": "Once absorbed, amino acids are used by the body to:", "marks": 1, "options": ["store fat", "lower blood glucose", "produce hormones and enzymes", "increase oxygen levels"], "correctIndex": 2, "answer": "produce hormones and enzymes", "explanation": "Amino acids are the building blocks for synthesising body proteins such as enzymes, protein hormones, and structural tissue."}, {"type": "mcq", "question": "Excess amino acids that are not needed for protein synthesis are:", "marks": 1, "options": ["stored as protein", "excreted unchanged", "stored as glycogen", "converted to glucose or fat"], "correctIndex": 3, "answer": "converted to glucose or fat", "explanation": "The body cannot store excess amino acids, so after deamination their carbon skeletons are converted to glucose or fat for energy or storage, and the nitrogen is removed as urea."}, {"type": "mcq", "question": "The process of removing the nitrogen group from amino acids during metabolism is called:", "marks": 1, "options": ["deamination", "transamination", "oxidation", "glycolysis"], "correctIndex": 0, "answer": "deamination", "explanation": "Deamination is the removal of the amino (nitrogen-containing) group from an amino acid, producing ammonia that the liver converts to urea. (Transamination instead transfers the amino group to another molecule.)"}, {"type": "mcq", "question": "The liver plays an important role in protein metabolism by:", "marks": 1, "options": ["absorbing amino acids from food", "converting ammonia into urea", "digesting proteins", "producing insulin"], "correctIndex": 1, "answer": "converting ammonia into urea", "explanation": "The liver detoxifies the ammonia produced by deamination by converting it into urea, which the kidneys then excrete in urine."}, {"type": "mcq", "question": "When protein intake is inadequate, the body is most likely to:", "marks": 1, "options": ["stop producing enzymes", "increase insulin secretion", "store amino acids for later use", "use stored fat first, then muscle tissue"], "correctIndex": 3, "answer": "use stored fat first, then muscle tissue", "explanation": "When protein/energy intake is inadequate the body draws on fat stores first for energy and then breaks down muscle protein to supply needed amino acids."}]}, {"id": "04", "title": "More Metabolism Questions", "topic": "Metabolism", "questions": [{"type": "mcq", "question": "A synthesis reaction is best described as:", "marks": 1, "options": ["Removing waste products", "Building a more complex substance from simpler ones", "Breaking down a complex substance", "Releasing stored energy only"], "correctIndex": 1, "answer": "Building a more complex substance from simpler ones", "explanation": "Synthesis (anabolic) reactions combine simpler molecules to form a larger, more complex one."}, {"type": "mcq", "question": "Which of the following is an example of a decomposition reaction?", "marks": 1, "options": ["Proteins being broken down into amino acids", "Glucose being stored as glycogen", "Hormones binding to receptors", "Fatty acids joining to form triglycerides"], "correctIndex": 0, "answer": "Proteins being broken down into amino acids", "explanation": "Decomposition breaks a complex molecule into simpler parts, as when proteins are split into amino acids. The other options are either synthesis reactions (storing glucose as glycogen, joining fatty acids into triglycerides) or not a decomposition (hormones binding to receptors)."}, {"type": "mcq", "question": "Which statement best describes the key difference between synthesis and decomposition reactions?", "marks": 1, "options": ["One involves oxygen and the other does not", "Synthesis builds molecules; decomposition breaks them down", "One occurs only in disease", "Both require enzymes"], "correctIndex": 1, "answer": "Synthesis builds molecules; decomposition breaks them down", "explanation": "Synthesis assembles larger molecules while decomposition splits them apart, which is their defining difference. (Both can use enzymes, but that is a shared feature, not what distinguishes them.)"}, {"type": "mcq", "question": "Which reaction type is involved in glycogen formation in the liver?", "marks": 1, "options": ["Decomposition", "Oxidation", "Neutralisation", "Synthesis"], "correctIndex": 3, "answer": "Synthesis", "explanation": "Forming glycogen from glucose molecules builds a larger molecule, making it a synthesis (anabolic) reaction."}, {"type": "mcq", "question": "Decomposition reactions are especially important because they:", "marks": 1, "options": ["Maintain pH balance", "Break down nutrients to release energy", "Transport substances in blood", "Store energy for long periods"], "correctIndex": 1, "answer": "Break down nutrients to release energy", "explanation": "Decomposition (catabolic) reactions break nutrients apart, releasing the energy stored in their chemical bonds."}, {"type": "mcq", "question": "Anabolism refers to metabolic processes that:", "marks": 1, "options": ["Lower blood glucose", "Remove waste products", "Build complex molecules using energy", "Break down molecules to release energy"], "correctIndex": 2, "answer": "Build complex molecules using energy", "explanation": "Anabolism uses energy to construct complex molecules from simpler building blocks."}, {"type": "mcq", "question": "Catabolism is best described as the process of:", "marks": 1, "options": ["Storing excess nutrients", "Building proteins from amino acids", "Breaking down molecules to release energy", "Creating hormones"], "correctIndex": 2, "answer": "Breaking down molecules to release energy", "explanation": "Catabolism breaks larger molecules into smaller ones, releasing energy in the process."}, {"type": "mcq", "question": "Which example best represents an anabolic process?", "marks": 1, "options": ["Glycolysis", "Breakdown of glycogen", "Synthesis of muscle tissue", "Digestion of proteins"], "correctIndex": 2, "answer": "Synthesis of muscle tissue", "explanation": "Building muscle tissue (protein synthesis) constructs complex molecules, which is anabolic, whereas the other options are catabolic."}, {"type": "mcq", "question": "Which statement correctly compares anabolism and catabolism?", "marks": 1, "options": ["Anabolism releases energy; catabolism requires energy", "They occur in different organs only", "Anabolism builds molecules; catabolism breaks them down", "Both require no energy"], "correctIndex": 2, "answer": "Anabolism builds molecules; catabolism breaks them down", "explanation": "Anabolism constructs molecules (using energy) while catabolism breaks them down (releasing energy)."}]}, {"id": "05", "title": "DNA Protein Synthesis", "topic": "Protein Synthesis", "questions": [{"type": "mcq", "question": "DNA is best described as:", "marks": 1, "options": ["A protein that produces energy", "A molecule that stores genetic information", "A type of lipid found in cell membranes", "A hormone that regulates metabolism"], "correctIndex": 1, "answer": "A molecule that stores genetic information", "explanation": "DNA is a nucleic acid that carries and stores the genetic instructions used to build and run the cell, not a protein, lipid, or hormone."}, {"type": "mcq", "question": "The basic structural unit of DNA and RNA is called a:", "marks": 1, "options": ["triglyceride", "amino acid", "enzyme", "nucleotide"], "correctIndex": 3, "answer": "nucleotide", "explanation": "Nucleic acids are polymers of nucleotides; amino acids are the building blocks of proteins, not DNA/RNA."}, {"type": "mcq", "question": "Which components make up a nucleotide?", "marks": 1, "options": ["nitrogen base, phosphate group and deoxyribose sugar", "carbohydrates, lipids and proteins", "phosphate group, enzyme and base", "complementary base pair and sugar-phosphate backbone"], "correctIndex": 0, "answer": "nitrogen base, phosphate group and deoxyribose sugar", "explanation": "A nucleotide consists of a nitrogenous base, a phosphate group, and a pentose sugar (deoxyribose in DNA, ribose in RNA)."}, {"type": "mcq", "question": "Which nitrogenous base is found in RNA but not in DNA?", "marks": 1, "options": ["uracil", "thymine", "adenine", "cytosine"], "correctIndex": 0, "answer": "uracil", "explanation": "RNA uses uracil in place of thymine, while adenine and cytosine occur in both DNA and RNA."}, {"type": "mcq", "question": "Why is DNA important for normal growth and repair in the human body?", "marks": 1, "options": ["it removes wastes from cells", "it provides energy for cells", "it controls the synthesis of proteins", "it regulates body temperature"], "correctIndex": 2, "answer": "it controls the synthesis of proteins", "explanation": "DNA contains the genetic code that directs protein synthesis, and these proteins drive growth, repair, and cell function."}, {"type": "mcq", "question": "In nursing practice, understanding DNA and RNA is important because they:", "marks": 1, "options": ["Determine a patient's blood pressure", "Provide the basis for understanding inherited diseases and cell function", "Help nurses diagnose genetic conditions independently", "Explain how medications are administered"], "correctIndex": 1, "answer": "Provide the basis for understanding inherited diseases and cell function", "explanation": "Knowledge of DNA/RNA underpins understanding of genetic (inherited) disease and normal cell function, which informs patient care."}]}, {"id": "06", "title": "Quiz: Nutrients (Knowledge Check)", "topic": "Nutrients", "questions": [{"type": "mcq", "question": "Water is a", "marks": 1, "options": ["minor nutrient", "major nutrient", "its not considered a nutrient", "micro nutrient"], "correctIndex": 1, "answer": "major nutrient", "explanation": "Water makes up the majority of body mass and is required in large amounts, so it is classed as a major (macro) nutrient."}, {"type": "mcq", "question": "Anne puts some white table sugar into her coffee. White table sugar is an example of", "marks": 1, "options": ["disaccharides", "monosaccharides", "cellulose", "glucose", "polysaccharides"], "correctIndex": 0, "answer": "disaccharides", "explanation": "Table sugar is sucrose, a disaccharide made of glucose plus fructose."}, {"type": "mcq", "question": "When someone suffers malnutrition, they have a deficiency in particular nutrients. Marasmus is an example of malnutrition related to a lack of", "marks": 1, "options": ["lipids", "protein", "marmite", "calcium"], "correctIndex": 1, "answer": "protein", "explanation": "Marasmus is severe protein-energy malnutrition from inadequate intake of protein and overall energy (calories). Among the options given, protein is the correct answer. (Compare kwashiorkor, which is specifically protein deficiency with relatively adequate calories.)"}, {"type": "mcq", "question": "The mucus that is produced to lubricate joints is predominantly formed from", "marks": 1, "options": ["minerals like calcium", "carbohydrates", "lipids e.g oils", "protein"], "correctIndex": 3, "answer": "protein", "explanation": "Synovial mucus/lubricants are based on glycoproteins (e.g. lubricin) and proteoglycans, so they are predominantly protein-based."}, {"type": "mcq", "question": "Courtney loves coca cola (and the not the sugar free stuff!). This is a very concentrated energy source. We would refer to this as", "marks": 1, "options": ["kilofulls", "artificial sweeteners", "empty calories", "frusemide"], "correctIndex": 2, "answer": "empty calories", "explanation": "Sugary soft drinks supply lots of energy (calories) but few or no useful nutrients, so the energy is described as empty calories."}, {"type": "mcq", "question": "The axon of nerve cells is covered in", "marks": 1, "options": ["proteins", "lipids", "calcium", "glycogen"], "correctIndex": 1, "answer": "lipids", "explanation": "The myelin sheath insulating axons is rich in lipids (fatty/phospholipid material)."}, {"type": "mcq", "question": "Oils that have been solidified are known as", "marks": 1, "options": ["triglycerides", "trans fats", "glycerol", "cis fats"], "correctIndex": 1, "answer": "trans fats", "explanation": "Hardening (hydrogenating) liquid oils converts them into solid trans fats."}, {"type": "mcq", "question": "Calcium is needed for muscle contraction. In the body, one type of Troponin enzyme binds to these calcium ions to help the muscle contract. Troponin is an example of a cardiac enzyme. When Troponin levels are high this might indicate (select all that apply)", "marks": 1, "options": ["myocardial infarction", "normal muscle contraction", "myocarditis", "diabetes mellitus"], "correctIndex": 0, "answer": "myocardial infarction, myocarditis", "explanation": "Raised cardiac troponin in the blood signals heart-MUSCLE damage — seen in both myocardial infarction (heart attack) and myocarditis (inflammation of heart muscle).", "multi": true, "correctIndexes": [0, 2]}, {"type": "mcq", "question": "Salivary amylase", "marks": 1, "options": ["is made by glands in the tongue surface", "starts chemical digestion of proteins", "completes chemical digestion of carbohydrates", "starts chemical digestion of carbohydrates"], "correctIndex": 3, "answer": "starts chemical digestion of carbohydrates", "explanation": "Salivary amylase begins the chemical breakdown of starch (carbohydrate) in the mouth; it does not complete it and does not act on proteins."}, {"type": "mcq", "question": "Which nutrient is made in the large intestine and helps the liver to make proteins that help blood to clot?", "marks": 1, "options": ["Sodium = Na", "Potassium = K", "Vitamin K", "Vitamin A"], "correctIndex": 2, "answer": "Vitamin K", "explanation": "Gut bacteria in the large intestine synthesise vitamin K, which the liver uses to make clotting factors."}, {"type": "mcq", "question": "When Anne was young her mum told her she needed to eat the crusts of her bread, as this would make her hair curly. Obviously that did not work and is untrue. However, her mum also told her to eat her carrots to help Anne see in the dark. Which of the following statements is correct?", "marks": 1, "options": ["Carrots are high in vitamin A which helps make pigments in the eye that help us see in the dark", "carrots are only things reindeers eat", "carrots are high in vitamin K that helps us see in the dark", "is false. Carrots only turn out skin orange like a fake tan."], "correctIndex": 0, "answer": "Carrots are high in vitamin A which helps make pigments in the eye that help us see in the dark", "explanation": "Carrots provide beta-carotene (vitamin A), needed to make rhodopsin, the retinal pigment essential for low-light (night) vision."}, {"type": "mcq", "question": "Many cell structures and functional substances within the cells are things like collagen, enzymes and haemoglobin. These are primarily made from", "marks": 1, "options": ["carob", "lipids", "proteins", "carbohydrates"], "correctIndex": 2, "answer": "proteins", "explanation": "Collagen, enzymes and haemoglobin are all proteins, built from amino acids."}, {"type": "mcq", "question": "Triglycerides are made up of", "marks": 1, "options": ["glycerol and amino acids", "glycocalyx and fatty acids", "glycerol and fatty acids", "triaminos and glucagon"], "correctIndex": 2, "answer": "glycerol and fatty acids", "explanation": "A triglyceride is one glycerol backbone joined to three fatty acid chains."}, {"type": "mcq", "question": "Daenerys is pregnant and her baby is overdue. The midwife suggests that Daenerys and her partner Kharl could have sex which might start labor because", "marks": 1, "options": ["prostaglandins cause nerves in the vaginal walls to send messages to the uterus to contract", "sperm contain prostaglandins that when deposited by the cervix may start the uterus contracting", "the process is very uncomfortable and the baby starts kicking to get out", "semen contains prostaglandins that when deposited by the cervix may start the uterus contracting"], "correctIndex": 3, "answer": "semen contains prostaglandins that when deposited by the cervix may start the uterus contracting", "explanation": "Semen (the seminal fluid, not the sperm cells themselves) is rich in prostaglandins, which can help ripen the cervix and stimulate uterine contractions."}, {"type": "mcq", "question": "Raymond has a heart attack and needs to have a coronary bypass to get around the plaque in the blocked coronary artery. The plaque is caused by", "marks": 1, "options": ["high differential lipids", "high density lipoprotein", "low density lipoprotein", "low diffusing lipoprotein"], "correctIndex": 2, "answer": "low density lipoprotein", "explanation": "Low density lipoprotein (LDL, the 'bad' cholesterol) deposits cholesterol in artery walls, forming the atherosclerotic plaque."}, {"type": "mcq", "question": "You are working with a patient who is a very strict vegetarian who keeps getting sick over the winter times. You feel they might not be able to produce enough antibodies to fight off these off. You wonder if they are not getting the whole range of amino acids in the body. There are how many different amino acids that are essential in the diet?", "marks": 1, "options": ["12", "20", "25", "40"], "correctIndex": 0, "answer": "12", "explanation": "Of the 20 amino acids the body uses to build proteins, the standard figure is that 9 are ESSENTIAL (must be obtained from the diet) and the remaining ~11 are non-essential because the body can make them. Note that 9 (the true number of essential amino acids) is not offered as an option here, so this is a flawed item; '12' is the value this course keys, but the accurate exam fact to remember is that there are 9 essential amino acids and 20 amino acids in total."}, {"type": "mcq", "question": "A catalyst is something that speeds up reactions. A classic catalyst in the body is", "marks": 1, "options": ["testosterone", "normal flora", "salivary amylase", "erythropoietin"], "correctIndex": 2, "answer": "salivary amylase", "explanation": "Salivary amylase is an enzyme, and enzymes are the body's biological catalysts that speed up chemical reactions."}, {"type": "mcq", "question": "Freddy goes off to the pub on Friday night to celebrate his 30th birthday. After a few drinks he starts to feel a bit woozy and thinks he needs to have some food to reduce the toxic effects of the alcohol he has had. The best thing from the menu to help reduce this toxicity is", "marks": 1, "options": ["smoked salmon", "milk", "hot chips and garlic bread", "a glass of blended spinach"], "correctIndex": 2, "answer": "hot chips and garlic bread", "explanation": "Carbohydrate- and fat-rich food like hot chips and garlic bread slows gastric emptying and alcohol absorption, helping to reduce the toxic effect of the alcohol."}, {"type": "mcq", "question": "One thing that carbohydrates, lipids and proteins have in common is they form", "marks": 1, "options": ["haemoglobin", "the cell membrane of cells", "pepsin", "vitamin A"], "correctIndex": 1, "answer": "the cell membrane of cells", "explanation": "Cell membranes are built from all three macronutrient types: a phospholipid (lipid) bilayer studded with proteins and carbohydrate (glycoprotein/glycolipid) chains."}, {"type": "mcq", "question": "Daenny and Kharl welcome their new baby. When the baby is six months old, she isn't meeting growth milestones. The doctor asks Daenny and Kharl about the babys diet and determines the baby is probably low in", "marks": 1, "options": ["beriberi", "zinc", "vitamin K", "calcium"], "correctIndex": 1, "answer": "zinc", "explanation": "Zinc is essential for growth and development, so deficiency in an infant causes poor growth and failure to meet milestones (beriberi is a disease, not a nutrient)."}]}, {"id": "07", "title": "Nutrition (Knowledge Check)", "topic": "Nutrients", "questions": [{"type": "mcq", "question": "In New Zealand, the unit for measuring the amount of energy in food is the", "marks": 1, "options": ["ATP", "Joule", "Calorie", "Kilojoule"], "correctIndex": 3, "answer": "Kilojoule", "explanation": "New Zealand uses the SI-based kilojoule (kJ) to express food energy, rather than the calorie used in some other countries."}, {"type": "mcq", "question": "Select all that apply. The major nutrients are:", "marks": 1, "options": ["water", "proteins", "vitamins", "minerals", "lipids", "carbohydrates"], "correctIndex": 1, "answer": "proteins, lipids, carbohydrates", "explanation": "This quiz's key ticks the three energy-yielding macronutrients: proteins, lipids and carbohydrates. (Water is essential and some texts also call it a major nutrient, but it's unticked here; vitamins and minerals are MICROnutrients.)", "multi": true, "correctIndexes": [1, 4, 5]}, {"type": "mcq", "question": "A balanced diet is one where", "marks": 1, "options": ["has all the vitamins and minerals you need to maintain normal growth and maintenance", "you eat a variety of fruits and vegetables", "has adequate amounts of carbohydrates, lipids, minerals, vitamins and protein to maintain normal growth and maintenance", "you hold the same amount of food in each hand"], "correctIndex": 2, "answer": "has adequate amounts of carbohydrates, lipids, minerals, vitamins and protein to maintain normal growth and maintenance", "explanation": "A balanced diet supplies adequate amounts of all nutrient groups (carbohydrates, lipids, proteins, vitamins and minerals) to support normal growth and maintenance."}, {"type": "mcq", "question": "There are about 50 molecules that the body cannot make fast enough, and these have to be provided for in the diet. These molecules are known as", "marks": 1, "options": ["vitamins and minerals", "major nutrients", "essential nutrients", "minor nutrients"], "correctIndex": 2, "answer": "essential nutrients", "explanation": "Essential nutrients are those the body cannot synthesise (or cannot make fast enough), so they must be obtained from the diet."}, {"type": "mcq", "question": "A shortage of this molecule can suppress brain function, and lead to death! This molecule is:", "marks": 1, "options": ["a fatty acid", "an amino acid", "vitamin B", "glucose"], "correctIndex": 3, "answer": "glucose", "explanation": "The brain depends almost entirely on glucose for fuel, so a severe shortage (hypoglycaemia) suppresses brain function and can be fatal."}, {"type": "mcq", "question": "Glucose is an example of a", "marks": 1, "options": ["monosaccharide", "polysaccharide", "disaccharide", "cellulide"], "correctIndex": 0, "answer": "monosaccharide", "explanation": "Glucose is a single-sugar unit, making it a monosaccharide."}, {"type": "mcq", "question": "Highly refined carbs, such as lollies, and soft drinks provide concentrated energy sources. The term used to describe such foods is", "marks": 1, "options": ["\"empty calories\" or \"empty kilojoules\"", "\"essential nutrients\"", "yummy", "\"non-essential nutrients\""], "correctIndex": 0, "answer": "\"empty calories\" or \"empty kilojoules\"", "explanation": "Highly refined high-sugar foods provide energy but few other nutrients, so they are called empty calories/kilojoules."}, {"type": "mcq", "question": "The nutrient that can reduce toxicity of drugs, medications and other substances are", "marks": 1, "options": ["vitamins", "proteins", "carbohydrates", "lipids"], "correctIndex": 1, "answer": "proteins", "explanation": "Proteins (as liver enzymes and plasma binding proteins) detoxify and process drugs and other substances, reducing their toxicity."}, {"type": "mcq", "question": "Consider the structure of the plasma membrane of a cell. Which of the following choices, show all the nutrients that are needed to help build and maintain the structure?", "marks": 1, "options": ["carbohydrates and lipids", "lipids, proteins and carbohydrates", "lipids, proteins and fats", "minerals, lipids and proteins"], "correctIndex": 1, "answer": "lipids, proteins and carbohydrates", "explanation": "The plasma membrane is built from a phospholipid (lipid) bilayer with embedded proteins and surface carbohydrates (glycoproteins and glycolipids)."}, {"type": "mcq", "question": "Animal fats and dairy foods contain", "marks": 1, "options": ["saturated fats", "unsaturated fats", "trans fats", "EFAs"], "correctIndex": 0, "answer": "saturated fats", "explanation": "Animal fats and dairy products are the main dietary sources of saturated fats."}, {"type": "mcq", "question": "One of the function of lipids is to", "marks": 1, "options": ["build muscle", "help the body absorb some minerals like K, Ca, and P", "speed up reactions", "help the body absorb some vitamins like A, D, E and K"], "correctIndex": 3, "answer": "help the body absorb some vitamins like A, D, E and K", "explanation": "Dietary fat is needed to absorb the fat-soluble vitamins A, D, E and K."}, {"type": "mcq", "question": "Which of the following is NOT a function of lipids?", "marks": 1, "options": ["an easily stored concentrated source of fuel for energy", "forms an insulating layer under the skin", "provides a protective cushion around organs", "forms the framework within the dermis of the skin"], "correctIndex": 3, "answer": "forms the framework within the dermis of the skin", "explanation": "The framework of the dermis is made of the protein collagen (and elastin), not lipids; the other options are genuine lipid functions."}, {"type": "mcq", "question": "A diet rich in proteins would be one consisting of", "marks": 1, "options": ["dairy food, and fruit", "eggs, milk and fish", "a variety of fruits and vegetables", "fruits, grains and eggs"], "correctIndex": 1, "answer": "eggs, milk and fish", "explanation": "Eggs, milk and fish are all high-quality complete protein foods, making this the most protein-rich option."}, {"type": "mcq", "question": "Which of the following are incomplete proteins?", "marks": 1, "options": ["nuts and milk", "fish and milk", "green leafy veges", "legumes and nuts"], "correctIndex": 3, "answer": "legumes and nuts", "explanation": "Plant proteins such as legumes and nuts are incomplete because each lacks one or more essential amino acids, unlike animal proteins."}, {"type": "mcq", "question": "Keratin and collagen that form parts of the integumentary system are formed from eating", "marks": 1, "options": ["fats", "proteins", "vitamin E", "carbohydrates"], "correctIndex": 1, "answer": "proteins", "explanation": "Keratin and collagen are structural proteins, so they are built from the amino acids supplied by dietary protein."}, {"type": "mcq", "question": "Enzymes are examples of", "marks": 1, "options": ["fats", "minerals", "carbohydrates", "proteins"], "correctIndex": 3, "answer": "proteins", "explanation": "Enzymes are biological catalysts made of protein."}, {"type": "mcq", "question": "Amino acids that are not being used to make new proteins are", "marks": 1, "options": ["stored", "turned into enzymes", "used to make energy", "are excreted"], "correctIndex": 2, "answer": "used to make energy", "explanation": "The body cannot store surplus amino acids; the amino group is removed (deamination) and the remainder is used to make energy or converted to fat/glucose for storage."}, {"type": "mcq", "question": "To make proteins, do all the amino acids need to be present in a cell, at the same time, and in sufficient amounts?", "marks": 1, "options": ["No", "Yes", "Not sure", "Sometimes"], "correctIndex": 1, "answer": "Yes", "explanation": "Protein synthesis is all-or-none: every required amino acid must be present simultaneously and in sufficient amounts or the protein cannot be made."}, {"type": "mcq", "question": "The substances needed to help the body use necessary nutrients are called", "marks": 1, "options": ["hormones", "enzymes", "prostaglandins", "vitamins"], "correctIndex": 3, "answer": "vitamins", "explanation": "Vitamins act as helpers (often coenzymes) that enable the body to use and metabolise other nutrients."}, {"type": "mcq", "question": "Most vitamins are eaten or ingested. The vitamin that is made by the skin is", "marks": 1, "options": ["vitamin C", "vtiamin A", "vitamin D", "vitamin E"], "correctIndex": 2, "answer": "vitamin D", "explanation": "Vitamin D is synthesised in the skin when it is exposed to ultraviolet (sun) light."}, {"type": "mcq", "question": "Vitamin K is needed for", "marks": 1, "options": ["blood clotting", "immunity", "preventing night blindness", "calcium absorption into bones"], "correctIndex": 0, "answer": "blood clotting", "explanation": "Vitamin K is essential for the synthesis of clotting factors, making it necessary for normal blood clotting."}, {"type": "mcq", "question": "Select all that apply. The mineral calcium is needed in the body to:", "marks": 1, "options": ["to make bones hard", "transmit nerve impulses", "muscle contraction", "help blood clot"], "correctIndex": 0, "answer": "to make bones hard, transmit nerve impulses, muscle contraction, help blood clot", "explanation": "Calcium is needed for all four: hardening bones/teeth, transmitting nerve impulses, muscle contraction, and blood clotting.", "multi": true, "correctIndexes": [0, 1, 2, 3]}, {"type": "mcq", "question": "Iodine is the mineral needed to", "marks": 1, "options": ["helps form haemoglobin", "prevent goitre", "regulate the thyroid gland and metabolic rate", "stops night blindess"], "correctIndex": 2, "answer": "regulate the thyroid gland and metabolic rate", "explanation": "Iodine is needed to make thyroid hormones, which regulate the thyroid gland's output and the body's metabolic rate (preventing goitre is a downstream effect of adequate iodine)."}, {"type": "mcq", "question": "When the energy taken in, and the energy being used or going out of the body are balanced, a person's mass will", "marks": 1, "options": ["decrease", "increase", "stay the same", "change"], "correctIndex": 2, "answer": "stay the same", "explanation": "When energy intake equals energy output the body is in energy balance, so body mass stays the same."}, {"type": "mcq", "question": "Increases in body temperature", "marks": 1, "options": ["make you less hungry", "make you more hungry", "make you burn more food", "do not effect how much food you eat"], "correctIndex": 0, "answer": "make you less hungry", "explanation": "A rise in body temperature acts on the hypothalamic feeding centre to suppress appetite, making you feel less hungry (cold has the opposite effect)."}, {"type": "mcq", "question": "True or false? One way our body regulates food intake is by transmitting messages, via nerves, from the stretch receptors in the stomach and telling the brain how much has been eaten.", "marks": 1, "options": ["Sometimes", "False - it's only when the nutrients get into our bood and do something that we don't feel hungry anymore", "False - food intake is only a psychological response", "True, that is one reason"], "correctIndex": 3, "answer": "True, that is one reason", "explanation": "Stretch receptors in the stomach wall do send nerve signals to the brain about fullness, so this is one genuine mechanism of food-intake regulation."}]}, {"id": "09", "title": "Quiz: Digestive System Structure & Function", "topic": "Digestive System", "questions": [{"type": "mcq", "question": "Trypsin and pepsin are protein-digesting enzymes. They are released in their inactive forms to prevent them from digesting the pancreas and stomach wall respectively.", "marks": 1, "options": ["True", "False"], "correctIndex": 0, "answer": "True", "explanation": "Pepsin is secreted as pepsinogen and trypsin as trypsinogen (zymogens); secreting them inactive prevents autodigestion of the stomach and pancreas, and they are only activated within the lumen (HCl activates pepsinogen, enterokinase activates trypsinogen)."}]}, {"id": "10", "title": "Digestion (mouth to stomach)", "topic": "Digestive System", "questions": [{"type": "mcq", "question": "Ingestion is", "marks": 1, "options": ["taking food into the mouth", "what happens when you eat to much and suffer from heart burn", "getting rid of faeces or waste food", "getting the nutrients from your digestive system into the blood"], "correctIndex": 0, "answer": "taking food into the mouth", "explanation": "Ingestion is the first stage of digestion and simply means taking food into the mouth."}, {"type": "mcq", "question": "Sublingual, Submandibular and Parotid are types of", "marks": 1, "options": ["tonsils", "endocrine glands", "enzymes", "salivary glands"], "correctIndex": 3, "answer": "salivary glands", "explanation": "These are the three pairs of major salivary glands that secrete saliva into the mouth."}, {"type": "mcq", "question": "Which of the following is a digestive function of saliva", "marks": 1, "options": ["to kill bacteria", "to allow you to taste food", "to break down lipids", "to moisten food to make it easier to swallow"], "correctIndex": 3, "answer": "to moisten food to make it easier to swallow", "explanation": "Saliva moistens and lubricates food to form a bolus that is easier to swallow, while its other roles (e.g. tasting, antibacterial) are not primarily digestive."}, {"type": "mcq", "question": "The pharynx is the", "marks": 1, "options": ["throat", "voicebox", "stops food going up the nose", "blocks of the trachea to stop food going down the wrong hole"], "correctIndex": 0, "answer": "throat", "explanation": "The pharynx is the anatomical term for the throat, a shared passage for food and air."}, {"type": "mcq", "question": "The term for chewing is", "marks": 1, "options": ["Deglutition", "Agglutination", "Mastication", "Masturbation"], "correctIndex": 2, "answer": "Mastication", "explanation": "Mastication is the term for chewing, whereas deglutition means swallowing."}, {"type": "mcq", "question": "The teeth, tongue and saliva work to roll the food in the mouth up into a ball for swallowing. This ball is called a", "marks": 1, "options": ["testicle", "bowel", "callous", "bolus"], "correctIndex": 3, "answer": "bolus", "explanation": "A bolus is the soft, rounded ball of chewed food mixed with saliva that is ready to be swallowed."}, {"type": "mcq", "question": "The term that refers to the waves of muscular contraction that moves the food through the digestive system is", "marks": 1, "options": ["peristalsis", "periteosis", "pericomo", "periwinkle"], "correctIndex": 0, "answer": "peristalsis", "explanation": "Peristalsis is the rhythmic wave of smooth muscle contraction that propels food along the digestive tract."}, {"type": "mcq", "question": "The serous membranes of the stomach", "marks": 1, "options": ["protects the inner lining", "forms the hollow space to churn food", "connects the muscle layers and mucous layers", "cover the outside"], "correctIndex": 3, "answer": "cover the outside", "explanation": "The serosa is the outermost serous membrane layer that covers the outside of the stomach."}, {"type": "mcq", "question": "The ridges in the stomach are called", "marks": 1, "options": ["cilia", "ridges", "rugae", "villi"], "correctIndex": 2, "answer": "rugae", "explanation": "Rugae are the folds or ridges in the stomach lining that allow it to expand when full."}, {"type": "mcq", "question": "The gastric juice produced by the stomach of an infant contains", "marks": 1, "options": ["HCl and Rennin", "HCl and Pepsin", "Pepsin and Rennin", "HCl, Pepsin and Rennin"], "correctIndex": 3, "answer": "HCl, Pepsin and Rennin", "explanation": "Infant gastric juice contains HCl, pepsin, and rennin (the latter curdles milk to aid protein digestion in babies)."}, {"type": "mcq", "question": "Most enzymes require a neutral pH and work best at 37 degrees Celsius. However, the enzyme in the stomach requires a low pH. This is because", "marks": 1, "options": ["pepsin needs acid conditions in order to continue breaking up starch", "pepsin needs alkaline conditions to break down proteins", "HCl needs a low pH to work", "pepsin needs acidic conditions in order to break down proteins"], "correctIndex": 3, "answer": "pepsin needs acidic conditions in order to break down proteins", "explanation": "Pepsin is activated by and works optimally in the acidic environment of the stomach to begin protein digestion."}, {"type": "mcq", "question": "After the stomach churns, and the gastric juices are mixed up with the bolus, the food breaks down even more and is turned into a liquified food mass called", "marks": 1, "options": ["pylorus", "thyme", "chyme", "bile"], "correctIndex": 2, "answer": "chyme", "explanation": "Chyme is the semi-liquid mixture of partly digested food and gastric juices produced by stomach churning."}, {"type": "mcq", "question": "The mechanical and chemical changing of food composition is called", "marks": 1, "options": ["absorption", "egestion", "digestion", "ingestion"], "correctIndex": 2, "answer": "digestion", "explanation": "Digestion is the mechanical and chemical breakdown of food into smaller, absorbable components."}, {"type": "mcq", "question": "Two muscular rings control movement of food into and out of the stomach. They are called the", "marks": 1, "options": ["fundus", "rugae", "intestines", "sphincters"], "correctIndex": 3, "answer": "sphincters", "explanation": "Sphincters are the muscular rings (cardiac/oesophageal and pyloric) that control food entry into and exit from the stomach."}, {"type": "mcq", "question": "The lower part of the stomach that is shaped a bit like a 'J' is called the", "marks": 1, "options": ["peritoneum", "cardia", "fundus", "pylorus"], "correctIndex": 3, "answer": "pylorus", "explanation": "The pylorus is the lower, J-shaped region of the stomach that leads into the duodenum."}, {"type": "mcq", "question": "The oesophagus is", "marks": 1, "options": ["an accessory organ", "part of the alimentary canal", "is a mechanical digestive organ", "is part of the stomach"], "correctIndex": 1, "answer": "part of the alimentary canal", "explanation": "The oesophagus is part of the continuous tube of the alimentary canal (GI tract) connecting the pharynx to the stomach."}, {"type": "mcq", "question": "Choose the answer that lists the four layers of the wall of the alimentary canal in order from innermost to outermost", "marks": 1, "options": ["submucosa, mucosa, serosa, muscular layer", "mucosa, submucosa, muscular layer, serosa", "serosa, mucosa, muscle layer, submucosa", "serosa, muscle layer, submucosa, mucosa"], "correctIndex": 1, "answer": "mucosa, submucosa, muscular layer, serosa", "explanation": "From the lumen outward the wall layers are mucosa, submucosa, muscular layer (muscularis), then serosa."}, {"type": "mcq", "question": "Chemical digestion starts in the", "marks": 1, "options": ["mouth", "oesopahgus", "duodenum", "stomach"], "correctIndex": 0, "answer": "mouth", "explanation": "Chemical digestion begins in the mouth where salivary amylase starts breaking down starch."}, {"type": "mcq", "question": "Sometimes the sphincter muscles weaken. What is a possible effect of a weakened cardiac sphincter?", "marks": 1, "options": ["Heart attack", "Heart burn - acid reflux into the oesophagus", "Duodenal ulcers", "Uncontrollable bowel movements!"], "correctIndex": 1, "answer": "Heart burn - acid reflux into the oesophagus", "explanation": "A weak cardiac (lower oesophageal) sphincter allows acidic stomach contents to reflux into the oesophagus, causing heartburn."}, {"type": "mcq", "question": "The stomach can expand to over 100 times its empty volume. This is due partly to the", "marks": 1, "options": ["microvilli", "mucous", "haustra", "rugae"], "correctIndex": 3, "answer": "rugae", "explanation": "The rugae (folds) of the stomach lining flatten out as the stomach fills, allowing it to expand greatly."}, {"type": "mcq", "question": "Sione suffers from acid reflux and consumes many antacid tablets (like Quick Eze or Mylanta). He finds that he is unable to digest which of the following nutrients very well.", "marks": 1, "options": ["protein", "carbohydrates", "sugar", "lipids"], "correctIndex": 0, "answer": "protein", "explanation": "Antacids raise gastric pH, which inactivates pepsin and impairs the stomach's digestion of protein."}, {"type": "mcq", "question": "Which cells are responsible for producing HCl", "marks": 1, "options": ["chief", "goblet", "parietal", "mucous"], "correctIndex": 2, "answer": "parietal", "explanation": "Parietal (oxyntic) cells in the gastric glands secrete hydrochloric acid and intrinsic factor."}, {"type": "mcq", "question": "Which of the following types of epithelial cells are mostly predominant throughout the digestive tract?", "marks": 1, "options": ["simple columnar", "simple squamous", "stratified squamous", "simple cuboidal"], "correctIndex": 0, "answer": "simple columnar", "explanation": "Simple columnar epithelium lines most of the digestive tract as it is suited to absorption and secretion."}, {"type": "mcq", "question": "In addition to storage and mechanical digestion of food, the stomach:", "marks": 1, "options": ["is the place where protein digestion begins", "is the place where chemical digestion of starch occurs", "is the place where vitamin B12 is absorbed", "is the place where the intrinsic factor is produced"], "correctIndex": 0, "answer": "is the place where protein digestion begins", "explanation": "The stomach is where chemical protein digestion begins, as pepsin acts on proteins in its acidic environment. Starch digestion happens in the mouth and small intestine, and B12 is absorbed in the ileum (not the stomach). Note the stomach does also make intrinsic factor, but 'protein digestion begins' is the key function expected here."}, {"type": "mcq", "question": "The following nutrients must be digested:", "marks": 1, "options": ["carbohydrates, lipids and proteins", "the major nutrients of carbohydrates, lipids, proteins and water", "carbohydrates and lipids only", "water, minerals and vitamins"], "correctIndex": 0, "answer": "carbohydrates, lipids and proteins", "explanation": "Only the large macronutrients (carbohydrates, lipids and proteins) require chemical digestion, whereas water, minerals and vitamins are absorbed directly."}, {"type": "mcq", "question": "When peristalsis happens in reverse you will", "marks": 1, "options": ["vomit", "die", "get constipated", "get diarrhoea"], "correctIndex": 0, "answer": "vomit", "explanation": "Reverse peristalsis (antiperistalsis) propels stomach contents back up the oesophagus, resulting in vomiting."}]}, {"id": "11", "title": "Digestion (duodenum to anus)", "topic": "Digestive System", "questions": [{"type": "mcq", "question": "Which of the following is NOT an accessory digestive organ?", "marks": 1, "options": ["tongue", "liver", "gallbladder", "ileum"], "correctIndex": 3, "answer": "ileum", "explanation": "The ileum is part of the alimentary canal (small intestine) itself, whereas the tongue, liver and gallbladder are accessory organs that aid digestion without food passing through them."}, {"type": "mcq", "question": "All nutrients are absorbed through the villi and are taken to the liver for metabolic processing, or storage. The name of the blood vessel that collects and takes these nutrients to the liver is the", "marks": 1, "options": ["portage vein", "mesenteric artery", "hepatic artery", "hepatic portal vein"], "correctIndex": 3, "answer": "hepatic portal vein", "explanation": "The hepatic portal vein carries nutrient-rich blood from the digestive tract directly to the liver for processing and storage."}, {"type": "mcq", "question": "The beginning of the small intestine is called the", "marks": 1, "options": ["duodenum", "ileum", "jejunum", "illium"], "correctIndex": 0, "answer": "duodenum", "explanation": "The duodenum is the first (most proximal) segment of the small intestine, receiving chyme from the stomach."}, {"type": "mcq", "question": "When the semi digested food enters the duodenum, have the fats or lipids been digested?", "marks": 1, "options": ["of course!", "Yes", "Not sure", "No"], "correctIndex": 3, "answer": "No", "explanation": "Lipid digestion has barely begun at this point; fats are largely undigested until bile emulsifies them and pancreatic lipase acts on them in the small intestine."}, {"type": "mcq", "question": "One of the functions of the small intestine is to completely finish of the chemical digestion of macromolecules to the building blocks. The other function of the small intestine is to", "marks": 1, "options": ["absorb all the building blocks (eg.carbohydrates, lipids, proteins)", "to remove water from the semi digested food", "break down vitamins and minerals", "absorb all the building blocks (e.g. amino acids, fatty acids, glycerol, glucose etc)"], "correctIndex": 3, "answer": "absorb all the building blocks (e.g. amino acids, fatty acids, glycerol, glucose etc)", "explanation": "The small intestine absorbs the final breakdown products (amino acids, fatty acids, glycerol, glucose), not the whole intact macromolecules."}, {"type": "mcq", "question": "The liver is made of lobules. Each lobule is made up of liver cells. These are called", "marks": 1, "options": ["hepatocytes", "liverocytes", "cysticytes", "hepatograms"], "correctIndex": 0, "answer": "hepatocytes", "explanation": "Hepatocytes are the functional liver cells that make up each lobule."}, {"type": "mcq", "question": "Which of the following is NOT a function of the liver", "marks": 1, "options": ["make blood", "process blood to remove poisons", "store excess nutrients", "deaminate proteins"], "correctIndex": 0, "answer": "make blood", "explanation": "Blood cells are made in red bone marrow, not the liver; the liver detoxifies, stores nutrients and deaminates proteins."}, {"type": "mcq", "question": "As red blood cells (RBCs) do not have nuclei, they are unable to make new proteins and thus are unable to repair themselves when they get old and inflexible. The old, worn-out RBCs go to the liver where they are broken down. The haem protein in the RBC is used to form", "marks": 1, "options": ["chyme", "bile", "pancreatic juice", "rennin"], "correctIndex": 1, "answer": "bile", "explanation": "When old RBCs are broken down in the liver, the haem part is converted to bilirubin, which becomes a pigment (colour) of bile. (The globin/protein part is recycled into amino acids.)"}, {"type": "mcq", "question": "Which of the following is NOT a function of bile?", "marks": 1, "options": ["emulisfies fat", "helps neutralise the acid chyme coming out from the stomach", "changes glucose to glycogen for storage in the liver", "helps cholesterol absorption"], "correctIndex": 2, "answer": "changes glucose to glycogen for storage in the liver", "explanation": "Converting glucose to glycogen (glycogenesis) is a liver metabolic function, not a role of bile; bile emulsifies fat, neutralises acid chyme and aids cholesterol absorption."}, {"type": "mcq", "question": "Which of the following TWO statements are true, in regard to bile.", "marks": 1, "options": ["stored in the gall bladder", "made in the liver", "stored in the liver", "made in the gall bladder"], "correctIndex": 0, "answer": "stored in the gall bladder, made in the liver", "explanation": "Bile is MADE in the liver and STORED (and concentrated) in the gall bladder.", "multi": true, "correctIndexes": [0, 1]}, {"type": "mcq", "question": "Pancreatic juice", "marks": 1, "options": ["neutralises the acidy chyme", "controls blood sugar levels", "contains enzymes that break down lipids, carbohydrates, and proteins", "contains enzymes that break down fats only"], "correctIndex": 2, "answer": "contains enzymes that break down lipids, carbohydrates, and proteins", "explanation": "Pancreatic juice contains lipase, amylase and proteases (e.g. trypsin), so it digests all three macronutrient classes."}, {"type": "mcq", "question": "The structure divided into the caecum, appendix, colon, rectum, anus is the", "marks": 1, "options": ["liver", "small intestine", "pancreas", "large intestine"], "correctIndex": 3, "answer": "large intestine", "explanation": "The large intestine comprises the caecum, appendix, colon, rectum and anal canal."}, {"type": "mcq", "question": "Pancreatic amylase, lipase and trypsin are released and then
